<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bundesliga Real Simulator</title>

<style>

body{
    background:#8b1111;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:30px;
}


.main{
    display:flex;
    justify-content:center;
    gap:50px;
    flex-wrap:wrap;
}


.box{
    background:#1a0a0a;
    padding:20px;
    width:380px;
    border-radius:10px;
    box-shadow:0 5px 15px black;
}


.row{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}


label{
    display:block;
    font-size:12px;
    color:#aaa;
}


input,
select{

    background:#2b1b1b;
    color:white;
    border:1px solid #555;
    padding:8px;
    width:85px;

}


input[type="color"]{

    width:45px;
    height:35px;
    padding:0;

}



button{

    width:100%;
    padding:12px;
    margin-top:15px;
    font-weight:bold;
    cursor:pointer;

}



.update{

    background:none;
    color:#ff4444;
    border:1px solid #ff4444;

}



.start{

    width:200px;
    background:#168044;
    color:white;
    border:none;
    font-size:22px;

}



.start:disabled{

    background:#555;

}



.reset{

    background:#700000;
    color:white;
    border:none;

}



.scoreboard{

    background:#222;
    border:3px solid #444;
    width:600px;

}



.teams{

    display:flex;
    height:130px;

}



.team{

    width:200px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:45px;
    font-weight:bold;

}



.middle{

    flex:1;

}



.score{

    height:70px;
    background:white;
    color:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:42px;
    font-weight:bold;
    transition:.3s;

}



.time{

    height:60px;
    background:#ccc;
    color:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;

}



.percent{

    display:flex;
    background:#111;
    padding:15px;

}



.percent div{

    flex:1;
    text-align:center;

}



.small{

    color:#888;
    font-size:12px;

}



.status{

    background:#111;
    text-align:center;
    padding:12px;
    font-size:22px;
    font-weight:bold;

}



.ticker{

    display:flex;
    background:#050505;
    min-height:150px;
    padding:15px;

}



.homeTicker{

    width:50%;
    text-align:left;

}



.awayTicker{

    width:50%;
    text-align:right;

}



.goal{

    color:#00ff66;
    font-weight:bold;
    font-size:18px;
    animation:goal .4s;

}



@keyframes goal{

from{

transform:scale(1.4);

}

to{

transform:scale(1);

}

}



</style>

</head>


<body>


<div class="main">


<div>


<div class="box">


<div class="row">


<div>
<label>Heim</label>
<input id="homeName" value="FCB">
</div>


<div>
<label>Sieg %</label>
<input id="homePct" type="number" value="67">
</div>


<div>
<label>Farbe</label>
<input id="homeColor" type="color" value="#64b931">
</div>


</div>



<div class="row">


<div>
<label>Remis</label>
<input disabled value="X">
</div>


<div>
<label>Remis %</label>
<input id="drawPct" type="number" value="13">
</div>


</div>



<div class="row">


<div>
<label>Gast</label>
<input id="awayName" value="SGE">
</div>


<div>
<label>Sieg %</label>
<input id="awayPct" type="number" value="20">
</div>


<div>
<label>Farbe</label>
<input id="awayColor" type="color" value="#ff3333">
</div>


</div>



<button class="update" onclick="updateBoard()">

Aktualisieren

</button>



<label style="margin-top:15px">

Schriftfarbe

</label>


<select id="fontColor" onchange="changeFontColor()">

<option value="white">
Weiß
</option>


<option value="black">
Schwarz
</option>


</select>



<button class="reset" onclick="resetGame()">

RESET

</button>



</div>



<button id="start" class="start" onclick="startGame()">

START

</button>


</div>
<div class="scoreboard">


<div class="teams">


<div id="homeView" class="team" style="background:#64b931">
FCB
</div>


<div class="middle">


<div id="score" class="score">
0:0
</div>


<div id="time" class="time">
0'
</div>


</div>


<div id="awayView" class="team" style="background:#ff3333">
SGE
</div>


</div>



<div class="percent">


<div>

<span class="small">
Heim
</span>

<br>

<span id="hp">
67%
</span>

</div>



<div>

<span class="small">
Remis
</span>

<br>

<span id="dp">
13%
</span>

</div>



<div>

<span class="small">
Gast
</span>

<br>

<span id="ap">
20%
</span>

</div>


</div>



<div id="status" class="status">
⚽ ANPFIFF
</div>



<div class="ticker">


<div id="homeTicker" class="homeTicker"></div>


<div id="awayTicker" class="awayTicker"></div>


</div>



</div>


</div>





<script>


let running=false;




function updateBoard(){


let home=document.getElementById("homeName").value;

let away=document.getElementById("awayName").value;



document.getElementById("homeView").innerHTML=home;

document.getElementById("awayView").innerHTML=away;



document.getElementById("homeView").style.background=
document.getElementById("homeColor").value;



document.getElementById("awayView").style.background=
document.getElementById("awayColor").value;




document.getElementById("hp").innerHTML=
document.getElementById("homePct").value+"%";


document.getElementById("dp").innerHTML=
document.getElementById("drawPct").value+"%";


document.getElementById("ap").innerHTML=
document.getElementById("awayPct").value+"%";


}







function changeFontColor(){


let color=document.getElementById("fontColor").value;


document.body.style.color=color;


document.getElementById("status").style.color=color;


document.getElementById("homeTicker").style.color=color;


document.getElementById("awayTicker").style.color=color;


}








function resetGame(){


running=false;



document.getElementById("score").innerHTML="";

document.getElementById("time").innerHTML="";

document.getElementById("status").innerHTML="";



document.getElementById("homeTicker").innerHTML="";

document.getElementById("awayTicker").innerHTML="";



document.getElementById("homeView").innerHTML="";

document.getElementById("awayView").innerHTML="";



document.getElementById("hp").innerHTML="";

document.getElementById("dp").innerHTML="";

document.getElementById("ap").innerHTML="";



document.getElementById("start").disabled=false;


}








function poisson(lambda){


let L=Math.exp(-lambda);

let p=1;

let k=0;


do{

k++;

p*=Math.random();


}

while(p>L);



return k-1;


}








function createResult(){


let homePercent=
Number(document.getElementById("homePct").value);


let awayPercent=
Number(document.getElementById("awayPct").value);



let drawPercent=
Number(document.getElementById("drawPct").value);




let homeXg=(50+(homePercent/2)+7)/45;

let awayXg=(50+(awayPercent/2))/60;




let home=poisson(homeXg);

let away=poisson(awayXg);





if(Math.random()*100 < drawPercent){

let draws=[
[0,0],
[1,1],
[2,2]
];


let d=draws[Math.floor(Math.random()*draws.length)];


home=d[0];

away=d[1];

}




if(Math.random()<0.10){


let t=home;

home=away;

away=t;


}



return{

home:home,
away:away

};


}








function startGame(){


if(running)
return;


running=true;



let button=document.getElementById("start");

button.disabled=true;



let score=document.getElementById("score");

let time=document.getElementById("time");

let status=document.getElementById("status");



let homeTicker=document.getElementById("homeTicker");

let awayTicker=document.getElementById("awayTicker");



score.innerHTML="0:0";

time.innerHTML="0'";

status.innerHTML="⚽ ANPFIFF";



homeTicker.innerHTML="";

awayTicker.innerHTML="";



let result=createResult();



let goals=[];



for(let i=0;i<result.home;i++){


goals.push({

team:"home",

minute:Math.floor(Math.random()*90)+1

});


}



for(let i=0;i<result.away;i++){


goals.push({

team:"away",

minute:Math.floor(Math.random()*90)+1

});


}



goals.sort((a,b)=>a.minute-b.minute);




let minute=0;

let homeScore=0;

let awayScore=0;



let timer=setInterval(()=>{


minute++;


time.innerHTML=minute+"'";



if(minute==45){

status.innerHTML="⏸ HALBZEIT";

}



if(minute==46){

status.innerHTML="▶ 2. HALBZEIT";

}





goals.forEach(goal=>{


if(goal.minute==minute){



if(goal.team=="home"){


homeScore++;


homeTicker.innerHTML+=

"<div class='goal'>"+
minute+
"' ⚽ "+
document.getElementById("homeName").value+
"</div>";



}

else{


awayScore++;


awayTicker.innerHTML+=

"<div class='goal'>"+
minute+
"' ⚽ "+
document.getElementById("awayName").value+
"</div>";



}



score.innerHTML=
homeScore+":"+awayScore;



}



});





if(minute>=90){



clearInterval(timer);



score.innerHTML=
result.home+":"+result.away;


time.innerHTML="90+3'";


status.innerHTML="🏁 ENDE";


running=false;

button.disabled=false;



}



},160);



}





updateBoard();


</script>


</body>
</html>
