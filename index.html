<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Ergebnis-Rechner & Simulator</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; 
            background: #000000 !important; 
            color: #ffffff !important; 
            padding: 20px; 
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #f5f5f7;
            margin-bottom: 25px;
        }
        .box { 
            background: #1a1a1a !important; 
            border: 1px solid #2d2d2d !important;
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
        }
        .input-row { 
            display: flex !important; 
            justify-content: space-between !important; 
            margin-bottom: 12px; 
            align-items: flex-end !important; 
            gap: 15px;
        }
        .field-group {
            display: flex !important;
            flex-direction: column !important;
            text-align: left;
        }
        .field-group label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: bold;
        }
        input[type="text"] { 
            width: 140px; 
            padding: 8px; 
            background: #2b2b2b !important; 
            color: #ffffff !important; 
            border: 1px solid #404040 !important; 
            border-radius: 6px;
            font-weight: bold;
        }
        input[type="text"]:disabled { background: #1f1f1f !important; color: #777777 !important; border: 1px solid #2a2a2a !important; }
        input[type="number"] { 
            width: 65px; 
            padding: 8px; 
            background: #2b2b2b !important; 
            color: #ffffff !important; 
            border: 1px solid #404040 !important; 
            border-radius: 6px; 
            font-weight: bold;
            text-align: center;
        }
        input[type="color"] { width: 45px; height: 34px; border: 1px solid #404040 !important; border-radius: 6px; cursor: pointer; background: transparent; padding: 0; }

        .btn-container {
            display: flex !important;
            gap: 10px;
            margin-top: 15px;
        }
        #spin-btn { 
            flex: 3 !important;
            padding: 16px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            border-radius: 8px; 
            border: none; 
            background: #2f855a !important; 
            color: white !important; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #spin-btn:hover { background: #276749 !important; }
        #spin-btn:disabled { background: #4a5568 !important; cursor: not-allowed; opacity: 0.6; }

        #reset-btn {
            flex: 1 !important;
            padding: 16px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            border: 1px solid #404040;
            background: #2b2b2b !important;
            color: #ef4444 !important;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #reset-btn:hover { background: #3f3f46 !important; border-color: #ef4444; }

        #error { color: #f56565; font-weight: bold; margin-bottom: 15px; display: none; font-size: 14px; text-align: center; }

        .dashboard {
            background: #1a1a1a !important;
            border: 1px solid #2d2d2d !important;
            border-radius: 12px;
            padding: 15px;
            display: flex !important;
            justify-content: space-around !important;
            margin-bottom: 20px;
        }
        .dash-item { text-align: center; flex: 1; padding: 5px; }
        .dash-item:not(:last-child) { border-right: 1px solid #2d2d2d !important; }
        .dash-name { font-size: 12px; color: #a0aec0; text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
        .dash-pct { font-size: 22px; font-weight: bold; }

        .scoreboard-bundesliga {
            height: 150px;
            background: #000000;
            border: 4px solid #b8860b !important; 
            box-shadow: 0 0 15px rgba(184, 134, 11, 0.4);
            display: flex !important;
            flex-direction: row !important;
            overflow: hidden;
        }
        .team-block {
            flex: 1 !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            padding: 10px !important;
            box-sizing: border-box !important;
        }
        #block-home { background-color: #dd0000; }
        #block-away { background-color: #1a1a1a; }

        .team-name {
            font-size: 42px !important;
            font-weight: 900 !important;
            color: #ffffff !important;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            font-family: Arial, sans-serif;
        }

        .center-block {
            width: 160px !important;
            background: #ffffff !important; 
            display: flex !important;
            flex-direction: column !important;
            box-sizing: border-box !important;
            border-left: 2px solid #000 !important;
            border-right: 2px solid #000 !important;
        }
        .score-row {
            height: 80px !important;
            line-height: 80px !important;
            font-size: 50px !important;
            font-weight: 900 !important;
            color: #000000 !important;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 100%) !important;
            border-bottom: 2px solid #666 !important;
            text-align: center;
        }
        .time-row {
            flex: 1 !important;
            line-height: 65px !important;
            font-size: 36px !important;
            font-weight: bold !important;
            color: #000000 !important;
            background: #cccccc !important; 
            font-family: Arial, sans-serif;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sport Ergebnis-Rechner & Simulator</h1>
    
    <div class="box">
        <div id="error">⚠️ Die Prozentwerte müssen zusammen genau 100% ergeben!</div>
        <div class="input-row">
            <div class="field-group"><label>Heim-Name</label><input type="text" id="name1" value="FCB"></div>
            <div class="field-group"><label>Chance</label><span><input type="number" id="pct1" value="68"> %</span></div>
            <div class="field-group"><label>Farbe</label><input type="color" id="col1" value="#dd0000"></div>
        </div>
        <div class="input-row">
            <div class="field-group"><label>Remis</label><input type="text" value="Unentschieden" disabled></div>
            <div class="field-group"><label>Chance</label><span><input type="number" id="pct2" value="20"> %</span></div>
            <div class="field-group"><label>Farbe</label><input type="color" id="col2" value="#718096"></div>
        </div>
        <div class="input-row">
            <div class="field-group"><label>Gast-Name</label><input type="text" id="name3" value="SGE"></div>
            <div class="field-group"><label>Chance</label><span><input type="number" id="pct3" value="12"> %</span></div>
            <div class="field-group"><label>Farbe</label><input type="color" id="col3" value="#1a1a1a"></div>
        </div>
        
        <div class="btn-container">
            <button id="spin-btn">Spiel simulieren</button>
            <button id="reset-btn">Reset</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="dash-item"><div class="dash-name">Heim</div><div class="dash-pct" id="dash-val1">68%</div></div>
        <div class="dash-item"><div class="dash-name">Remis</div><div class="dash-pct" id="dash-val2">20%</div></div>
        <div class="dash-item"><div class="dash-name">Gast</div><div class="dash-pct" id="dash-val3">12%</div></div>
    </div>

    <div class="scoreboard-bundesliga">
        <div class="team-block" id="block-home"><div class="team-name" id="display-name-home">FCB</div></div>
        <div class="center-block">
            <div class="score-row" id="result-score">? - ?</div>
            <div class="time-row" id="result-time">90:00</div>
        </div>
        <div class="team-block" id="block-away"><div class="team-name" id="display-name-away">SGE</div></div>
    </div>
    
    <div id="result-ticker" style="margin-top: 15px; font-weight: bold; font-size: 16px; color: #aaa;">Bereit für Simulation</div>
</div>

<script>
    // Hochprofessionelle, fehlerisolierte Steuerzentrale
    const torePoolHeim = ["1:0", "2:0", "2:1", "3:0", "3:1", "3:2", "4:0"];
    const torePoolRemis = ["0:0", "1:1", "2:2"];
    const torePoolGast = ["0:1", "0:2", "1:2", "0:3", "1:3", "2:3", "0:4"];
    let tickerInterval = null;
    let isRunning = false;

    function liveUpdateDashboard() {
        const spinBtn = document.getElementById('spin-btn');
        const errorDiv = document.getElementById('error');
        
        const p1 = parseInt(document.getElementById('pct1').value) || 0;
        const p2 = parseInt(document.getElementById('pct2').value) || 0;
        const p3 = parseInt(document.getElementById('pct3').value) || 0;

        if ((p1 + p2 + p3) !== 100) {
            errorDiv.style.display = 'block';
            spinBtn.disabled = true;
            return;
