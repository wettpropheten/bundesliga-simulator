#teamCards{


display:grid;

repeat(3,1fr);

}

<script>


// =====================================
// MANNSCHAFTSKARTEN ERSTELLEN
// =====================================



function createTeamCards(){



let area=document.getElementById("teamCards");



area.innerHTML="";





Object.keys(teams).forEach(id=>{


let t=teams[id];



area.innerHTML +=`



<div class="teamCard">



<h3>

${t.short}

<br>

${t.name}

</h3>





<label>

Siegchance %

</label>

<input type="number"

value="${t.winChance}"

onchange="

teams['${id}'].winChance=

Number(this.value)

">






<label>

Tor Tendenz

</label>


<input type="number"

value="${t.goalTrend}"

min="0"

max="4"

onchange="

teams['${id}'].goalTrend=

Number(this.value)

">






<label>

Form

</label>


<input class="formField"

value="${t.form.join(" ")}"

onchange="

teams['${id}'].form=

this.value.split(" ")

">






<label>

Heim Form

</label>


<input class="formField"

value="${t.homeForm.join(" ")}"

onchange="

teams['${id}'].homeForm=

this.value.split(" ")

">






<label>

Auswärts Form

</label>


<input class="formField"

value="${t.awayForm.join(" ")}"

onchange="

teams['${id}'].awayForm=

this.value.split(" ")

">






<label>

xGoals

</label>


<input type="number"

step="0.01"

value="${t.xGoals}"

onchange="

teams['${id}'].xGoals=

Number(this.value)

">






<label>

Wahrscheinlichkeit %

</label>


<input type="number"

value="${t.probability}"

onchange="

teams['${id}'].probability=

Number(this.value)

">





</div>


`;



});



}





</script><!-- =====================================

<script>


// =====================================
// DROPDOWNS FÜLLEN
// =====================================



function loadTeams(){



let home=document.getElementById("homeSelect");

let away=document.getElementById("awaySelect");



home.innerHTML="";

away.innerHTML="";





Object.keys(teams).forEach(id=>{


let t=teams[id];



home.innerHTML+=`

<option value="${id}">

${t.short} - ${t.name}

</option>

`;



away.innerHTML+=`

<option value="${id}">

${t.short} - ${t.name}

</option>

`;



});





home.value="BVB";

away.value="FCB";



updateMatchData();


}









// =====================================
// HEIM / GAST DATEN ÜBERNEHMEN
// =====================================



function updateMatchData(){



let home=

teams[

document.getElementById("homeSelect").value

];



let away=

teams[

document.getElementById("awaySelect").value

];






document.getElementById("homeDisplay").innerHTML=

home.short+"<br>"+home.name;




document.getElementById("awayDisplay").innerHTML=

away.short+"<br>"+away.name;







let homePower=

home.winChance+

(home.xGoals*10);



let awayPower=

away.winChance+

(away.xGoals*10);






let total=

homePower+awayPower+20;





let h=

Math.round(

(homePower+10)/total*100

);



let a=

Math.round(

awayPower/total*100

);





let d=

100-h-a;







document.getElementById("homeChance").innerHTML=

h+" %";



document.getElementById("drawChance").innerHTML=

d+" %";



document.getElementById("awayChance").innerHTML=

a+" %";






document.getElementById("xgDisplay").innerHTML=

home.xGoals.toFixed(2)

+

" : "

+

away.xGoals.toFixed(2);



}









document.getElementById("homeSelect")

.addEventListener(

"change",

updateMatchData

);



document.getElementById("awaySelect")

.addEventListener(

"change",

updateMatchData

);









// Start Aufbau


window.addEventListener("load",()=>{


createTeamCards();


loadTeams();


});



</script>

<script>


// =====================================
// SPIELVARIABLEN
// =====================================


let timer=null;

let minute=0;

let homeScore=0;

let awayScore=0;



let gameStats={


homeShots:0,

awayShots:0,

homeCorners:0,

awayCorners:0,

homeCards:0,

awayCards:0


};








// =====================================
// SPIEL START
// =====================================


function startGame(){



resetGame();



timer=setInterval(()=>{


playMinute();


},700);



}









// =====================================
// MINUTE
// =====================================


function playMinute(){



minute++;



document.getElementById("minute").innerHTML=

minute+"'";





let home=

teams[homeSelect.value];

let away=

teams[awaySelect.value];





let homeXG=

home.xGoals/90;



let awayXG=

away.xGoals/90;







if(Math.random()<homeXG){


homeScore++;


addEvent(

home.name,

"TOR"

);


}






if(Math.random()<awayXG){


awayScore++;


addEvent(

away.name,

"TOR"

);


}







if(Math.random()<0.35)

gameStats.homeShots++;


if(Math.random()<0.35)

gameStats.awayShots++;







if(Math.random()<0.12)

gameStats.homeCorners++;


if(Math.random()<0.12)

gameStats.awayCorners++;






if(Math.random()<0.04){


gameStats.homeCards++;


addEvent(

home.name,

"GELBE KARTE"

);


}



if(Math.random()<0.04){


gameStats.awayCards++;


addEvent(

away.name,

"GELBE KARTE"

);


}





updateStats();






if(minute>=90){


clearInterval(timer);


addEvent("","SPIEL ENDE");


}



}









// =====================================
// LIVETICKER EINTRAG
// =====================================



function addEvent(team,event){



let home=

teams[homeSelect.value];



let left="";

let right="";



if(team===home.name){


left=event+" "+team;


}

else if(team!==""){


right=event+" "+team;


}





let row=document.createElement("div");


row.className="tickerRow";



row.innerHTML=

`

<div>${left}</div>

<div>${minute}'</div>

<div>${right}</div>

`;



document.getElementById("ticker")

.appendChild(row);



}









// =====================================
// STATISTIK
// =====================================



function updateStats(){



document.getElementById("homeGoals").innerHTML=

homeScore;



document.getElementById("awayGoals").innerHTML=

awayScore;





document.getElementById("shots").innerHTML=

gameStats.homeShots

+

" : "

+

gameStats.awayShots;





document.getElementById("corners").innerHTML=

gameStats.homeCorners

+

" : "

+

gameStats.awayCorners;





document.getElementById("cards").innerHTML=

gameStats.homeCards

+

" : "

+

gameStats.awayCards;



}









// =====================================
// RESET
// =====================================


function resetGame(){



clearInterval(timer);



minute=0;

homeScore=0;

awayScore=0;



gameStats={

homeShots:0,

awayShots:0,

homeCorners:0,

awayCorners:0,

homeCards:0,

awayCards:0

};



document.getElementById("homeGoals").innerHTML="0";

document.getElementById("awayGoals").innerHTML="0";

document.getElementById("minute").innerHTML="00:00";


document.getElementById("ticker").innerHTML="";


updateStats();



}



</script>
