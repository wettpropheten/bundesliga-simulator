<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wettpropeten Simulator</title>


<style>


*{
box-sizing:border-box;
}


body{

margin:0;

padding:20px;

font-family:Arial,Helvetica,sans-serif;

background:
linear-gradient(135deg,#06101d,#075c35);

color:white;

}



.container{

max-width:1500px;

margin:auto;

}



h1{

text-align:center;

font-size:42px;

text-shadow:0 10px 30px black;

}



.layout{

display:grid;

grid-template-columns:330px 1fr;

gap:25px;

}



.glass{

background:
rgba(255,255,255,.12);

border:
1px solid rgba(255,255,255,.25);

border-radius:25px;

padding:25px;

backdrop-filter:blur(15px);

box-shadow:0 25px 60px black;

}



label{

display:block;

margin-top:15px;

}



input,
select{

width:100%;

padding:12px;

border-radius:10px;

border:none;

background:#111;

color:white;

}



button{

width:100%;

padding:14px;

margin-top:12px;

border-radius:12px;

border:none;

background:#009447;

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

}



.pause{

background:#c58b00;

}



.reset{

background:#b00020;

}



/* MATCHCENTER */


.arena{

padding:35px;

border-radius:30px;

background:

linear-gradient(
145deg,
rgba(255,255,255,.18),
rgba(0,0,0,.45)
);

box-shadow:

inset 0 0 40px black,
0 20px 50px black;

}



.teams{

display:flex;

justify-content:space-between;

align-items:center;

}



.team{

text-align:center;

}



.team img{

width:120px;

height:120px;

object-fit:contain;

filter:drop-shadow(0 15px 15px black);

}



.team h3{

font-size:24px;

}



.score{

font-size:90px;

font-weight:bold;

}



.clock{

font-size:40px;

color:#00ff66;

text-align:center;

}



/* TICKER */


.ticker{

margin-top:30px;

height:420px;

overflow:auto;

background:rgba(0,0,0,.75);

border-radius:20px;

padding:15px;

}



.event{

display:grid;

grid-template-columns:1fr 70px 1fr;

padding:14px;

border-bottom:1px solid rgba(255,255,255,.2);

font-size:18px;

}



.home{

text-align:left;

font-weight:bold;

}



.time{

text-align:center;

color:#00ff66;

font-weight:bold;

}



.away{

text-align:right;

font-weight:bold;

}



/* MANNSCHAFTSKARTEN */


.cards{

margin-top:30px;

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

}



.card{

background:rgba(0,0,0,.35);

padding:20px;

border-radius:20px;

}



.card img{

width:80px;

height:80px;

object-fit:contain;

display:block;

margin:auto;

}



@media(max-width:900px){


.layout{

grid-template-columns:1fr;

}



.cards{

grid-template-columns:1fr;

}


}



</style>


</head>

// =======================================
// TEIL 3
// AUSWAHLFELDER + LOGOS + NAMEN
// =======================================



const homeSelect =
document.getElementById("homeSelect");


const awaySelect =
document.getElementById("awaySelect");




// Mannschaften in Dropdown laden


Object.keys(teams).forEach(name=>{


let homeOption =
document.createElement("option");


homeOption.value=name;

homeOption.textContent=name;


homeSelect.appendChild(homeOption);





let awayOption =
document.createElement("option");


awayOption.value=name;

awayOption.textContent=name;


awaySelect.appendChild(awayOption);



});





// Startwerte


homeSelect.value =
"Bayern München";


awaySelect.value =
"Borussia Dortmund";







// =======================================
// MATCHCENTER AKTUALISIEREN
// =======================================


function updateMatch(){



let home =
teams[homeSelect.value];


let away =
teams[awaySelect.value];





// Namen


document.getElementById("homeName").innerHTML =
homeSelect.value;



document.getElementById("awayName").innerHTML =
awaySelect.value;






// Logos


document.getElementById("homeLogo").src =
home.logo;



document.getElementById("awayLogo").src =
away.logo;



}







// Wechsel Heimteam


homeSelect.onchange=function(){


updateMatch();


};






// Wechsel Gastteam


awaySelect.onchange=function(){


updateMatch();


};






// =======================================
// TEIL 4
// MANNSCHAFTSKARTEN
// ALLE 18 TEAMS
// =======================================



function createCards(){



let box =
document.getElementById("cards");



box.innerHTML="";






Object.keys(teams).forEach(name=>{



let t =
teams[name];





box.innerHTML += `

"

>

Niederlage %
</label>

type="number"

value="${t.loss}"

onchange="

teams['${name}'].loss=Number(this.value)

"

>







<label>
xG Stärke
</label>



<input

type="number"

step="0.1"

value="${t.xg}"

onchange="

"

>

Tore 0-1 %

<input

<label>

<input

"

// =======================================
// TEIL 6-8
// KOMPLETTE MATCH ENGINE
// WAHRSCHEINLICHKEIT + SIMULATION
// =======================================


let timer = null;

let minute = 0;

let homeScore = 0;

let awayScore = 0;

let paused = false;

let turbo = false;

let stoppageTime = 0;
  
let matchEnded = false;


// =======================================
// TEAMSTÄRKE
// =======================================


function teamStrength(team){


let strength = 0;


// Siegchance

strength += team.win * 1.5;


// xG Angriff

strength += team.xg * 20;


// Niederlagen schwächen

strength -= team.loss * 0.5;



return strength;


}





// =======================================
// TORWAHRSCHEINLICHKEIT
// =======================================


function goalChance(team, opponent, home){


let strengthDiff =
teamStrength(team)-teamStrength(opponent);


// niedrigere Basis
let chance = 0.008;


// Stärke-Effekt kleiner
chance += strengthDiff / 4000;


// xG realistischer
chance += team.xg / 600;


// Heimvorteil kleiner
if(home){

chance += 0.002;

}


// Grenzen

if(chance < 0.003){

chance = 0.003;

}


if(chance > 0.035){

chance = 0.035;

}


return chance;

}





// =======================================
// TORART
// =======================================


function goalType(team){


let r =
Math.random()*100;



if(r < team.goals.low){


return "normales Tor ⚽";


}


else if(
r < team.goals.low + team.goals.mid
){


return "schönes Tor 🔥";


}


else{


return "Traumtor 🚀";


}


}





// =======================================
// LIVETICKER
// =======================================


function addEvent(side,text){



let box =
document.getElementById("ticker");



let row =
document.createElement("div");



row.className="event";



let left="";

let right="";



if(side==="home"){

left=text;

}



if(side==="away"){

right=text;

}



if(side==="system"){

right=text;

}



row.innerHTML=`

<div class="home">
${left}
</div>


<div class="time">
${minute}'
</div>


<div class="away">
${right}
</div>

`;



box.appendChild(row);


box.scrollTop =
box.scrollHeight;


}





// =======================================
// TOR
// =======================================


function scoreGoal(side){



let team;



if(side==="home"){


homeScore++;


team =
teams[homeSelect.value];


addEvent(
"home",
"⚽ TOR - "+goalType(team)
);



}



else{


awayScore++;


team =
teams[awaySelect.value];


addEvent(
"away",
"⚽ TOR - "+goalType(team)
);



}



document.getElementById("homeGoals").innerHTML =
homeScore;



document.getElementById("awayGoals").innerHTML =
awayScore;



}






// =======================================
// SPIELMINUTE
// =======================================


function simulateMinute(){


if(paused || matchEnded)

return;



minute++;



let displayMinute = minute;


if(minute > 90){

displayMinute =
"90+"+(minute-90);

}
else{

displayMinute =
String(minute).padStart(2,"0");

}


document.getElementById("minute").innerHTML =
displayMinute;



let home =
teams[homeSelect.value];

let away =
teams[awaySelect.value];



let homeChance =
goalChance(home,away,true);


let awayChance =
goalChance(away,home,false);



if(Math.random() < homeChance){

scoreGoal("home");

}


if(Math.random() < awayChance){

scoreGoal("away");

}



// Karten
if(Math.random()<0.008){

addEvent(
"home",
"🟨 GELBE KARTE"
);

}


if(Math.random()<0.008){

addEvent(
"away",
"🟨 GELBE KARTE"
);

}



// Halbzeit
if(minute===45){

addEvent(
"system",
"⏱ HALBZEIT"
);

}


// Nachspielzeit bestimmen
if(minute===90){

let extra = 2;

if(Math.random()<0.50)
extra++;

if(Math.random()<0.30)
extra++;

if(Math.random()<0.15)
extra++;

if(Math.random()<0.05)
extra++;

stoppageTime = extra;


addEvent(
"system",
"⏱ Nachspielzeit: +"+stoppageTime+" Minuten"
);

}



// Abpfiff nach 90+Nachspielzeit
if(
minute >= 90 + stoppageTime
){

matchEnded=true;


clearInterval(timer);

timer=null;


addEvent(
"system",
"🏁 ABPFIFF"
);

}


}







// =======================================
// RESET SPIEL
// =======================================


function resetGame(){

minute=0;

homeScore=0;

awayScore=0;

stoppageTime=0;

matchEnded=false;


document.getElementById("minute").innerHTML="00'";

document.getElementById("homeGoals").innerHTML="0";

document.getElementById("awayGoals").innerHTML="0";



document.getElementById("ticker").innerHTML=`

<div class="event">

<div class="home">
SYSTEM
</div>


<div class="time">
00'
</div>


<div class="away">
Spiel bereit
</div>

</div>

`;



}







// =======================================
// START
// =======================================


function startSimulation(){



if(timer)

return;



resetGame();


paused=false;



addEvent(
"system",
"▶ ANPFIFF"
);



timer=setInterval(

simulateMinute,

turbo ? 100 : 1000

);



}







// =======================================
// PAUSE
// =======================================


function pauseSimulation(){


paused =
!paused;


}







// =======================================
// ZEITRAFFER
// =======================================


function turboSimulation(){


turbo=true;



if(timer){


clearInterval(timer);


timer=setInterval(

simulateMinute,

100

);


}

else{


startSimulation();


}


}







// =======================================
// RESET BUTTON
// =======================================


function resetSimulation(){


clearInterval(timer);


timer=null;


paused=false;


turbo=false;



resetGame();



}

</script>
