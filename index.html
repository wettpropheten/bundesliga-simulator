<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bundesliga Real Simulator</title>

<style>

body{
    background:#8b1111;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:30px;
}


.main{
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
}


.box{
    background:#180909;
    padding:20px;
    border-radius:12px;
    width:380px;
    box-shadow:0 5px 20px black;
}


.row{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}


label{
    display:block;
    color:#aaa;
    font-size:12px;
}


input{
    width:90px;
    padding:8px;
    background:#2b1b1b;
    border:1px solid #555;
    color:white;
}


button{
    width:100%;
    padding:12px;
    margin-top:15px;
    font-weight:bold;
    cursor:pointer;
}


.update{
    background:none;
    color:#ff4444;
    border:1px solid #ff4444;
}


.start{
    background:#168044;
    color:white;
    font-size:22px;
    width:200px;
}


.start:disabled{
    background:#555;
}



.scoreboard{

    width:560px;
    background:#222;
    border:3px solid #555;

}



.teams{

    height:140px;
    display:flex;

}


.team{

    width:190px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:45px;
    font-weight:bold;

}


.middle{

    flex:1;

}


.score{

    height:75px;
    background:white;
    color:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:42px;
    font-weight:bold;
    transition:.3s;

}


.time{

    height:65px;
    background:#ccc;
    color:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;

}



.percent{

    display:flex;
    background:#111;
    padding:15px;

}


.percent div{

    flex:1;
    text-align:center;

}


.small{

    color:#888;
    font-size:12px;

}



.events{

    background:#090909;
    min-height:120px;
    padding:15px;
    font-size:18px;

}



.goal{

    color:#00ff66;
    font-weight:bold;
    animation:goal .5s;

}



@keyframes goal{

from{
transform:scale(1.5);
}

to{
transform:scale(1);
}

}



</style>

</head>


<body>


<div class="main">


<div>


<div class="box">


<div class="row">

<div>
<label>Heimteam</label>
<input id="homeName" value="FCB">
</div>


<div>
<label>Stärke</label>
<input id="homeStrength" type="number" value="85">
</div>


</div>



<div class="row">

<div>
<label>Gastteam</label>
<input id="awayName" value="SGE">
</div>


<div>
<label>Stärke</label>
<input id="awayStrength" type="number" value="70">
</div>


</div>


<button class="update" onclick="updateBoard()">
Berechnen
</button>


</div>



<button id="start" class="start" onclick="startGame()">
START
</button>


</div>





<div class="scoreboard">


<div class="teams">


<div id="homeView" class="team" style="background:#64b931">
FCB
</div>


<div class="middle">

<div id="score" class="score">
0:0
</div>


<div id="time" class="time">
0'
</div>


</div>


<div id="awayView" class="team" style="background:#ff3333">
SGE
</div>


</div>



<div class="percent">


<div>
<span class="small">Heim Sieg</span>
<br>
<span id="homeProb">0%</span>
</div>


<div>
<span class="small">Remis</span>
<br>
<span id="drawProb">0%</span>
</div>


<div>
<span class="small">Gast Sieg</span>
<br>
<span id="awayProb">0%</span>
</div>


</div>



<div class="events" id="events">
Spiel startet...
</div>


</div>


</div>


<script>
    let running = false;


// Bundesliga-basierte Berechnung
// Stärke 0-100 beeinflusst Siegchance
function calculateProbability(){

    let home = Number(document.getElementById("homeStrength").value);
    let away = Number(document.getElementById("awayStrength").value);


    let diff = home - away;


    // Heimvorteil Bundesliga ca. 10 Punkte
    let homePower = home + 10;
    let awayPower = away;


    let total = homePower + awayPower;


    let homeChance = homePower / total;
    let awayChance = awayPower / total;


    let drawChance = 0.26 - Math.abs(diff)*0.002;


    if(drawChance < 0.12)
        drawChance = 0.12;



    homeChance = homeChance * (1-drawChance);
    awayChance = awayChance * (1-drawChance);



    return {

        home:Math.round(homeChance*100),
        draw:Math.round(drawChance*100),
        away:Math.round(awayChance*100)

    };


}





function updateBoard(){


    let home=document.getElementById("homeName").value;
    let away=document.getElementById("awayName").value;



    document.getElementById("homeView").innerHTML=home;

    document.getElementById("awayView").innerHTML=away;



    let p=calculateProbability();



    document.getElementById("homeProb").innerHTML=p.home+"%";
    document.getElementById("drawProb").innerHTML=p.draw+"%";
    document.getElementById("awayProb").innerHTML=p.away+"%";

}





// erzeugt realistisches Ergebnis
function createResult(){


    let p=calculateProbability();


    let r=Math.random()*100;


    let result;


    if(r < p.home){

        result="home";

    }
    else if(r < p.home+p.draw){

        result="draw";

    }
    else{

        result="away";

    }



    let homeStrength =
    Number(document.getElementById("homeStrength").value);


    let awayStrength =
    Number(document.getElementById("awayStrength").value);



    // Tore über durchschnittliche Bundesliga-Werte

    let homeGoals=Math.floor(Math.random()*4);

    let awayGoals=Math.floor(Math.random()*4);



    if(result==="home"){


        if(homeGoals<=awayGoals)
            homeGoals=awayGoals+1;


    }



    if(result==="away"){


        if(awayGoals<=homeGoals)
            awayGoals=homeGoals+1;


    }



    if(result==="draw"){


        awayGoals=homeGoals;


    }




    // Begrenzung
    if(homeGoals>5) homeGoals=5;
    if(awayGoals>5) awayGoals=5;



    return {

        home:homeGoals,
        away:awayGoals

    };


}







function startGame(){


    if(running)
        return;


    running=true;


    let button=document.getElementById("start");
    button.disabled=true;



    let score=document.getElementById("score");
    let time=document.getElementById("time");
    let events=document.getElementById("events");



    score.innerHTML="0:0";
    time.innerHTML="0'";


    events.innerHTML="";



    let final=createResult();



    let goals=[];



    for(let i=0;i<final.home;i++){

        goals.push({

            team:"home",
            minute:Math.floor(Math.random()*85)+1

        });

    }




    for(let i=0;i<final.away;i++){

        goals.push({

            team:"away",
            minute:Math.floor(Math.random()*85)+1

        });

    }



    goals.sort((a,b)=>a.minute-b.minute);



    let minute=0;



    let homeScore=0;
    let awayScore=0;



    let timer=setInterval(()=>{


        minute++;


        time.innerHTML=minute+"'";



        goals.forEach(goal=>{


            if(goal.minute===minute){



                if(goal.team==="home"){

                    homeScore++;

                    events.innerHTML +=
                    "<div class='goal'>⚽ TOR "+document.getElementById("homeName").value+
                    " ("+minute+"')</div>";

                }
                else{


                    awayScore++;


                    events.innerHTML +=
                    "<div class='goal'>⚽ TOR "+document.getElementById("awayName").value+
                    " ("+minute+"')</div>";

                }



                score.style.transform="scale(1.3)";


                setTimeout(()=>{

                    score.style.transform="scale(1)";

                },300);



                score.innerHTML=
                homeScore+":"+awayScore;



            }



        });




        if(minute>=90){


            clearInterval(timer);



            score.innerHTML=
            final.home+":"+final.away;


            time.innerHTML="90'";


            events.innerHTML +=
            "<br><b>🏁 Abpfiff</b>";



            running=false;

            button.disabled=false;


        }




    },150);



}





updateBoard();

</script>


</body>
</html>
