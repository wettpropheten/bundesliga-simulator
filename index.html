<!DOCTYPE html>
<html lang="de">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bundesliga Manager PRO 4.0</title>


<style>

*{
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}


body{

margin:0;

background:
radial-gradient(circle at top,#1f2937,#020617);

color:white;

}



.container{

width:95%;
max-width:1500px;
margin:auto;

}



h1,h2{

text-align:center;

letter-spacing:1px;

}



.box{

background:

rgba(255,255,255,0.08);

border:

1px solid rgba(255,255,255,.15);

border-radius:25px;

padding:25px;

margin:20px 0;

box-shadow:

0 20px 50px rgba(0,0,0,.6);

backdrop-filter:

blur(15px);

}



/* =====================
MATCHCENTER
===================== */


.scoreboard{


display:grid;

grid-template-columns:

1fr 220px 1fr;

align-items:center;

gap:20px;

text-align:center;

}



.club{


font-size:22px;

}



.club img{


width:90px;

height:90px;

object-fit:contain;

display:block;

margin:auto;

}



.goals{


font-size:70px;

font-weight:bold;

color:#39df72;

}



.clock{


font-size:45px;

color:#39df72;

font-weight:bold;

}



.status{


margin-top:10px;

color:#ccc;

}




.matchStats{


display:grid;

grid-template-columns:

repeat(4,1fr);

gap:15px;

margin-top:25px;

}



.statCard{


background:#050505;

padding:15px;

border-radius:18px;

text-align:center;

}



.statCard span{


display:block;

font-size:25px;

color:#39df72;

font-weight:bold;

}




/* =====================
TICKER
===================== */


.ticker{


height:250px;

overflow:auto;

background:#050505;

padding:15px;

border-radius:20px;

}



.event{


padding:12px;

border-bottom:

1px solid #333;

}



/* =====================
BUTTONS
===================== */


button{


background:#39df72;

border:none;

padding:14px 22px;

border-radius:15px;

font-weight:bold;

cursor:pointer;

margin:5px;

}



button:hover{

transform:scale(1.05);

}



.secondary{

background:#222;

color:white;

}



/* =====================
CARDS
===================== */


.cards{


display:grid;

grid-template-columns:

repeat(6,1fr);

gap:15px;

}



.teamCard{


background:#080808;

border-radius:22px;

padding:20px;

text-align:center;

border:

1px solid #333;

}



.teamCard img{


height:70px;

width:70px;

object-fit:contain;

}



.teamCard h3{


color:#39df72;

}



@media(max-width:900px){

.scoreboard{

grid-template-columns:1fr;

}


.cards{

grid-template-columns:
repeat(2,1fr);

}


.matchStats{

grid-template-columns:
repeat(2,1fr);

}

}


</style>


</head>

// =================================

function saveDatabase(){


localStorage.setItem(

"bundesligaPRO4",

JSON.stringify(teams)

);


}





function loadDatabase(){


let data=

localStorage.getItem(
"bundesligaPRO4"
);

}

// =================================
// SIEGWAHRSCHEINLICHKEIT
// =================================



function calculateProbability(){


let home=

teams[
document.getElementById(
"homeSelect"
).value
];


let away=

teams[
document.getElementById(
"awaySelect"
).value
];



let homePower=

home.attack+
home.defense+
(home.xg*20)
+
(home.morale/5);



let awayPower=

away.attack+
away.defense+
(away.xg*20)
+
(away.morale/5);



let diff=

homePower-awayPower;



let homeChance=

50+(diff/5);



if(homeChance>75)
homeChance=75;


if(homeChance<15)
homeChance=15;



let awayChance=

100-homeChance-20;



document.getElementById(
"matchStatus"
).innerHTML=

`

🏠 Sieg ${Math.round(homeChance)}%

&nbsp;

🤝 20%

&nbsp;

✈ Sieg ${Math.round(awayChance)}%

`;



}

// =================================

// =================================


let timer=null;

let speed=1000;



function addEvent(text){


let ticker=

document.getElementById(
"ticker"
);


let div=document.createElement(
"div"
);


div.className="event";


div.innerHTML=text;


ticker.prepend(div);


}







// =================================
// SPIEL START
// =================================



function startGame(){



clearInterval(timer);



match.home=

document.getElementById(
"homeSelect"
).value;


match.away=

document.getElementById(
"awaySelect"
).value;



match.minute=0;


match.homeGoals=0;

match.awayGoals=0;


match.homeShots=0;

match.awayShots=0;


match.homeCorners=0;

match.awayCorners=0;


match.homeXG=0;

match.awayXG=0;




document.getElementById(
"homeGoals"
).innerHTML="0";


document.getElementById(
"awayGoals"
).innerHTML="0";


document.getElementById(
"ticker"
).innerHTML="";



addEvent(
"00' ⚽ Anpfiff"
);



match.running=true;



timer=setInterval(

playMinute,

speed

);



}









// =================================
// MINUTE SIMULATION
// =================================



function playMinute(){



match.minute++;



document.getElementById(
"clock"
).innerHTML=

match.minute+"'";





let home=

teams[match.home];


let away=

teams[match.away];




// Heimstärke + Qualität


let homeChance=

(home.xg/90)
*
1.8
*
home.homeStrength;



let awayChance=

(away.xg/90)
*
1.8;





// Zufallsfaktor
// erlaubt Überraschungen



let randomHome=

Math.random();


let randomAway=

Math.random();





if(randomHome < homeChance){


match.homeShots++;


match.homeXG+=0.18;



if(Math.random()<0.30){


match.homeGoals++;


document.getElementById(
"homeGoals"
).innerHTML=

match.homeGoals;



addEvent(

match.minute+
"' ⚽ TOR für "+
home.short

);



}

else{


addEvent(

match.minute+
"' Schuss "+
home.short

);


}



}





if(randomAway < awayChance){


match.awayShots++;


match.awayXG+=0.16;



if(Math.random()<0.30){


match.awayGoals++;


document.getElementById(
"awayGoals"
).innerHTML=

match.awayGoals;



addEvent(

match.minute+
"' ⚽ TOR für "+
away.short

);



}

else{


addEvent(

match.minute+
"' Schuss "+
away.short

);


}



}






// Ecken


if(Math.random()<0.07){


match.homeCorners++;


}



if(Math.random()<0.07){


match.awayCorners++;


}




// Karten


if(Math.random()<0.04){


addEvent(

match.minute+
"' 🟨 Gelbe Karte"

);


}





updateStats();






if(match.minute>=90){


finishGame();


}



}








// =================================
// STATISTIK
// =================================


function updateStats(){



document.getElementById(
"shots"
).innerHTML=

match.homeShots+
" - "+
match.awayShots;



document.getElementById(
"corners"
).innerHTML=

match.homeCorners+
" - "+
match.awayCorners;



document.getElementById(
"xg"
).innerHTML=

match.homeXG.toFixed(2)
+
" - "
+
match.awayXG.toFixed(2);



let poss=

50+
(
teams[match.home].attack-
teams[match.away].attack
)/4;



document.getElementById(
"possession"
).innerHTML=

Math.round(poss)
+
" - "
+
(100-Math.round(poss));


}









// =================================
// SPIELENDE
// =================================



function finishGame(){


clearInterval(timer);



addEvent(

"90' 🏁 Abpfiff"

);



updateSeason();


}




// =================================
// TABELLE AKTUALISIEREN
// =================================



function updateSeason(){



let home=

teams[match.home];


let away=

teams[match.away];



home.played++;

away.played++;



home.goals+=match.homeGoals;

away.goals+=match.awayGoals;




if(match.homeGoals >
match.awayGoals){


home.points+=3;


addEvent(
"🏆 "+match.home+" gewinnt"
);


}



else if(
match.awayGoals >
match.homeGoals
){


away.points+=3;


addEvent(
"🏆 "+match.away+" gewinnt"
);


}



else{


home.points++;

away.points++;


addEvent(
"🤝 Unentschieden"
);


}





saveDatabase();


renderCards();



}

"awayGoals"

).innerHTML=

"<div class='event'>Neues Spiel bereit</div>";
