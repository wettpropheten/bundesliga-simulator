<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bundesliga Simulator PRO 8.0 - MATCHCENTER ONLY</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-glow: rgba(99, 102, 241, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-success: #10b981;
            --accent-danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 1fr 1fr;
            }
            .full-width {
                grid-column: span 2;
            }
        }

        /* 3D Glassmorphism Panel */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.1),
                        0 0 30px var(--glass-glow);
            transform: perspective(1000px) translateZ(0);
            transition: transform 0.3s ease;
        }

        h2 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Input Editor */
        .json-textarea {
            width: 100%;
            height: 280px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #67e8f9;
            font-family: 'Courier New', Courier, monospace;
            padding: 12px;
            font-size: 0.85rem;
            resize: none;
        }

        .btn {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            border: none;
            color: white;
            padding: 12px 24px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
            transition: all 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        /* Matchcenter Core UI */
        .stadium-info {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }

        .team-box {
            flex: 1;
            text-align: center;
        }

        .team-logo-placeholder {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .team-name {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .score-box {
            font-size: 3.5rem;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
            padding: 0 20px;
            background: linear-gradient(to bottom, #fff 40%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .match-clock {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-danger);
            background: rgba(239, 68, 68, 0.1);
            padding: 4px 16px;
            border-radius: 20px;
            width: fit-content;
            margin: 10px auto 25px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Probabilities Indicator */
        .prob-container {
            margin-top: 15px;
        }
        .prob-header {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 6px;
            text-align: center;
        }
        .prob-bar {
            display: flex;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
        }
        .prob-segment {
            height: 100%;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: bold;
        }
        .prob-home { background: #4f46e5; }
        .prob-draw { background: #64748b; }
        .prob-away { background: #06b6d4; }

        .prob-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-top: 6px;
            color: var(--text-muted);
        }

        /* Speed Controls */
        .controls-row {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }
        .btn-speed {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 6px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .btn-speed.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* Live Ticker UI */
        .ticker-box {
            height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse;
            gap: 8px;
            padding-right: 4px;
        }

        .ticker-entry {
            display: flex;
            gap: 12px;
            background: rgba(255,255,255,0.01);
            border: 1px solid transparent;
            padding: 10px 14px;
            border-radius: 12px;
            animation: fadeIn 0.3s ease forwards;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .ticker-entry.goal {
            background: rgba(16, 185, 129, 0.08);
            border-color: rgba(16, 185, 129, 0.2);
        }
        .ticker-entry.card {
            background: rgba(234, 179, 8, 0.08);
            border-color: rgba(234, 179, 8, 0.2);
        }

        .ticker-minute {
            font-weight: 800;
            color: var(--accent);
            min-width: 35px;
            font-variant-numeric: tabular-nums;
        }

        /* Analysis Stats */
        .stats-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 10px;
        }
        .stat-row {
            display: grid;
            grid-template-columns: 1fr 60px 1fr;
            align-items: center;
            text-align: center;
            font-size: 0.9rem;
        }
        .stat-val-home { text-align: left; font-weight: bold; }
        .stat-val-away { text-align: right; font-weight: bold; }
        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .quality-stars {
            color: #eab308;
            letter-spacing: 2px;
            font-size: 1.1rem;
        }

        /* Utilities */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- DATA INPUT EDITOR -->
    <div class="glass-panel">
        <h2><span>📝 Spieldaten (JSON)</span></h2>
        <textarea id="jsonInput" class="json-textarea"></textarea>
        <div class="controls-row">
            <button class="btn-speed active" id="speedNormal" onclick="setSpeed(1000, 'Normal')">Normal (1s = 1m)</button>
