// Zufallswert nach Poisson-Verteilung
function poisson(lambda){

let L=Math.exp(-lambda);

let p=1;

let k=0;


do{

k++;

p*=Math.random();


}while(p>L);


return k-1;

}





// Form berechnen

function formBonus(team){


let wert=0;


team.form.forEach(f=>{


if(f=="S")
wert+=1;


if(f=="U")
wert+=0;


if(f=="N")
wert-=1;


});


return wert/5;


}







// Wahrscheinlichkeiten automatisch berechnen


function berechneWahrscheinlichkeit(){



let home=
teams[
document.getElementById("homeTeam").value
];


let away=
teams[
document.getElementById("awayTeam").value
];



let heimKraft=

home.strength
+
home.homeBonus
+
formBonus(home);



let gastKraft=

away.strength
+
formBonus(away);



let unterschied=

heimKraft-gastKraft;



let heim=

50+unterschied*1.5;


let gast=

25-unterschied*0.8;


let remis=

100-heim-gast;



// Grenzen

heim=Math.max(15,Math.min(85,heim));

gast=Math.max(5,Math.min(50,gast));

remis=100-heim-gast;



document.getElementById("homeProb").value=
heim.toFixed(0);



document.getElementById("drawProb").value=
remis.toFixed(0);



document.getElementById("awayProb").value=
gast.toFixed(0);



return{


heim:heim,

remis:remis,

gast:gast


};



}








// Ergebnis erstellen


function erstelleErgebnis(){



let home=

teams[
homeTeam.value
];


let away=

teams[
awayTeam.value
];



let wahrscheinlichkeit=

berechneWahrscheinlichkeit();





let zufall=

Math.random()*100;



let ergebnis;



// Erwartete Tore


let heimTore=

1.35

+

(home.attack-away.defense)/35

+

home.homeBonus/5;



let gastTore=

1.05

+

(away.attack-home.defense)/35;





// Wetter / Zufall


heimTore*=

0.85+

Math.random()*0.3;


gastTore*=

0.85+

Math.random()*0.3;



heimTore=Math.max(
0.2,
heimTore
);


gastTore=Math.max(
0.2,
gastTore
);





if(zufall < wahrscheinlichkeit.heim){


// Heim gewinnt

let h=

poisson(heimTore);

let a=

poisson(gastTore);



if(h<=a)
h=a+1;



ergebnis={

home:h,

away:a

};



}



else if(
zufall <
wahrscheinlichkeit.heim+
wahrscheinlichkeit.remis
){


// Unentschieden


let tor=

Math.floor(
Math.random()*3
);



ergebnis={

home:tor,

away:tor

};



}



else{


// Gast gewinnt


let h=

poisson(heimTore);


let a=

poisson(gastTore);



if(a<=h)
a=h+1;



ergebnis={

home:h,

away:a

};



}





// unrealistische Ergebnisse reduzieren


if(ergebnis.home>5)
ergebnis.home=5;


if(ergebnis.away>5)
ergebnis.away=5;



return ergebnis;


}

function wetterEffekt(){

let wetter=[

"Sonne",
"Regen",
"Wind",
"Schnee",
"Normal"

];


return wetter[
Math.floor(
Math.random()*wetter.length
)

}









function formStärke(team){


let wert=0;


team.form.forEach(function(f){



if(f=="S")
wert+=2;


if(f=="U")
wert+=0;


if(f=="N")
wert-=2;



});



return wert;


}









function zuschauerBonus(team){



let auslastung=

team.capacity/85000;



return auslastung*3;


}

heim,
gast
){

let a=teams[gast];





// Grundwerte


let heimPower=


h.attack

+

(h.strength/2)

+

h.homeBonus

+

formStärke(h)

+

zuschauerBonus(h);





let gastPower=


a.attack

+

(a.strength/2)

+

formStärke(a);






// Defensive einrechnen

heimPower

-

(a.defense/2);





let gastChance=


gastPower

-

(h.defense/2);






// Wetter

wetterEffekt();



if(
wetter=="Regen"
){


heimChance*=0.95;

gastChance*=0.95;


}



if(
wetter=="Wind"
){


heimChance*=0.9;

gastChance*=0.9;


}







// Ballbesitz


let ball=

50+

(
heimChance-gastChance
)
*
0.25;



ball=Math.max(
30,
Math.min(
70,
ball
)
);






// Torchancen


let heimChancen=

Math.round(

heimChance/8

);



let gastChancen=

Math.round(

gastChance/8

);






// Tore aus Chancen


let heimTore=0;


let gastTore=0;





for(
let i=0;
i<heimChancen;
i++
){


if(Math.random()<0.16)

heimTore++;


}





for(
let i=0;
i<gastChancen;
i++
){


if(Math.random()<0.14)

gastTore++;


}





// Begrenzen


heimTore=Math.min(
5,
heimTore
);



gastTore=Math.min(
5,
gastTore
);








return{


heimTore:heimTore,


gastTore:gastTore,


ballBesitzHeim:
Math.round(ball),

// SAISON SYSTEM
// =====================================


let saison={

spieltag:1,

jahr:2026,

aktiv:false

};



let tabelle=[];







function erstelleLiga(){



tabelle=[];



Object.keys(teams).forEach(function(t){



tabelle.push({


id:t,

name:teams[t].short,

punkte:0,

spiele:0,

siege:0,

remis:0,

niederlagen:0,

tore:0,

gegentore:0


});



});



}










function findeTeam(id){



return tabelle.find(

x=>x.id==id

);



}








function verbucheErgebnis(

heim,

gast,

hTore,

gTore

){



let h=

findeTeam(heim);



let g=

findeTeam(gast);




h.spiele++;

g.spiele++;


h.tore+=hTore;

g.tore+=gTore;


h.gegentore+=gTore;

g.gegentore+=hTore;






if(hTore>gTore){


h.punkte+=3;

h.siege++;


g.niederlagen++;


}


else if(gTore>hTore){


g.punkte+=3;

g.siege++;


h.niederlagen++;


}


else{


h.punkte++;

g.punkte++;


h.remis++;

g.remis++;


}



}









function sortiereTabelle(){



tabelle.sort(function(a,b){



if(
b.punkte!=a.punkte
)

return b.punkte-a.punkte;



return

(b.tore-b.gegentore)

-

(a.tore-a.gegentore);



});



}









function zeigeLigatabelle(){



sortiereTabelle();



let html=

`

<h2>
🏆 Bundesliga Tabelle
</h2>


<table width="100%">


<tr>

<th>
Platz
</th>

<th>
Team
</th>

<th>
Sp
</th>

<th>
Punkte
</th>

<th>
Tore
</th>

</tr>


`;




tabelle.forEach(function(t,index){



html+=


`

<tr>

<td>
${index+1}
</td>


<td>
${t.name}
</td>


<td>
${t.spiele}
</td>


<td>
${t.punkte}
</td>


<td>
${t.tore}:${t.gegentore}
</td>


</tr>


`;



});



html+="</table>";





let box=document.getElementById(
"ligaAnzeige"
);



if(!box){


box=document.createElement("div");


box.id="ligaAnzeige";


box.className="box";


document.body.appendChild(box);



}



box.innerHTML=html;



}

function spieleSpieltag(){



let clubs=

Object.keys(teams);



clubs.sort(()=>Math.random()-0.5);




for(
let i=0;
i<clubs.length;
i+=2
){



let h=clubs[i];

let g=clubs[i+1];



let ergebnis=

berechneDrueckKick(
h,
g
);



verbucheErgebnis(

h,

g,

ergebnis.heimTore,

ergebnis.gastTore

);



}



saison.spieltag++;



zeigeLigatabelle();



speichern();



}










function neueSaison(){



erstelleLiga();


saison.spieltag=1;


saison.aktiv=true;


zeigeLigatabelle();



alert(
"⚽ Neue Bundesliga Saison gestartet"
);



}









// =====================================
// SPEICHERN
// =====================================


function speichern(){



let daten={



teams:teams,


tabelle:tabelle,


saison:saison



};



localStorage.setItem(

"BundesligaManager",

JSON.stringify(daten)

);



}









function laden(){



let daten=

localStorage.getItem(
"BundesligaManager"
);



if(!daten)

return;



daten=

JSON.parse(daten);



Object.assign(
teams,
daten.teams
);



tabelle=daten.tabelle;


saison=daten.saison;



zeigeLigatabelle();



alert(
"💾 Spielstand geladen"
);



}
