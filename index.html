<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Ergebnis-Rechner & Simulator</title>
    <style>
        /* Globale Stile basierend auf deinem Design */
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #ffffff;
            color: #ffffff;
            box-sizing: border-box;
        }

        *, *:before, *:after {
            box-sizing: inherit;
        }

        /* Haupt-Container für den oberen Bereich */
        .top-section {
            display: flex;
            gap: 40px;
            margin-bottom: 30px;
            align-items: flex-start;
        }

        /* ==================== LINKE BOX (STEUERUNG) ==================== */
        .sidebar-controls {
            width: 380px;
            background-color: #000000;
            border: 2px solid #334155;
            padding: 20px;
            border-radius: 4px;
        }

        .sidebar-controls h2 {
            font-size: 18px;
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            line-height: 1.3;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 20px;
        }

        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-group label {
            font-size: 10px;
            text-transform: uppercase;
            color: #94a3b8;
            font-weight: bold;
        }

        .sidebar-controls select {
            background-color: #1e293b;
            color: #ffffff;
            border: 1px solid #475569;
            padding: 10px;
            font-size: 14px;
            border-radius: 4px;
            width: 100%;
            cursor: pointer;
            outline: none;
        }

        /* Buttons auf der rechten Seite der linken Box */
        .button-group {
            width: 140px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 10px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            width: 100%;
            background-color: #334155;
            color: #ffffff;
            transition: background 0.2s;
        }

        .btn-update {
            background-color: #991b1b;
            color: #ffffff;
        }
        .btn-update:hover { background-color: #7f1d1d; }
        .btn:hover { background-color: #475569; }

        /* ==================== RECHTE BOX (ANZEIGE) ==================== */
        .display-panel {
            flex: 1;
            max-width: 600px;
            background-color: #1e1e1e;
            border: 2px solid #334155;
            border-radius: 4px;
            overflow: hidden;
        }

        .score-banner {
            background-color: #4a4a4a;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .score-box {
            background-color: #d1d5db;
            width: 160px;
            height: 90px;
            color: #000000;
            font-size: 36px;
            font-family: monospace;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px 4px 0 0;
        }

        .probability-header {
            background-color: #000000;
            display: flex;
            text-align: center;
            border-bottom: 1px solid #334155;
            padding: 8px 0;
        }
        .prob-col-title {
            flex: 1;
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .probability-bar {
            background-color: #0f172a;
            display: flex;
            padding: 15px 0;
            text-align: center;
        }

        .prob-col {
            flex: 1;
        }

        .prob-percentage {
            font-size: 28px;
            font-weight: bold;
        }

        .ticker-panel {
            background-color: #000000;
            height: 140px;
            padding: 15px;
            overflow-y: auto;
            border-top: 2px solid #334155;
            font-size: 13px;
            color: #cbd5e1;
        }

        /* ==================== UNTERES RASTER (18 TEAMS) ==================== */
        .grid-title {
            color: #000000;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 30px;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 15px;
        }

        .grid-box {
            background-color: #064e3b; /* Dunkelgrün aus deinem Screenshot */
            border: 1px solid #047857;
            height: 65px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            padding: 5px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        .grid-box:hover {
            background-color: #047857;
            transform: scale(1.03);
        }

        .grid-box span.team-name {
            display: block;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .grid-box span.team-strength {
            font-size: 10px;
            color: #a7f3d0;
            font-weight: normal;
            margin-top: 3px;
        }

        /* ==================== POPUP MODAL FÜR DATENPFLEGE ==================== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-box {
            background-color: #1e293b;
            border: 2px solid #475569;
            border-radius: 8px;
            padding: 20px;
            width: 300px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
        }

        .modal-box h4 {
            margin-top: 0;
            color: #38bdf8;
            text-transform: uppercase;
            font-size: 14px;
            border-bottom: 1px solid #334155;
            padding-bottom: 8px;
        }

        .modal-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 15px;
        }

        .modal-field label {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .modal-field input {
            background-color: #0f172a;
            border: 1px solid #475569;
            color: #ffffff;
            padding: 8px;
            border-radius: 4px;
            outline: none;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="top-section">
        
        <!-- LINKE STEUERUNGSBOX -->
        <div class="sidebar-controls">
            <h2>Sport Ergebnis-Rechner &<br>Simulator</h2>
            
            <div style="display: flex; gap: 20px;">
                <!-- Inputs Links -->
                <div style="flex: 1;">
                    <div class="input-group" style="margin-bottom: 15px;">
                        <label>Heim-Name</label>
                        <select id="select-heim" onchange="calculateProbabilities()"></select>
                    </div>

                    <div class="input-group" style="margin-bottom: 15px;">
                        <label>Remis</label>
                        <select disabled>
                            <option>Unentschieden</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Gast-Name</label>
                        <select id="select-gast" onchange="calculateProbabilities()"></select>
                    </div>
                </div>

                <!-- Buttons Rechts -->
                <div class="button-group">
                    <button class="btn btn-update" onclick="calculateProbabilities()">Aktualisieren</button>
                    <button class="btn" onclick="resetSimulator()">Reset</button>
                    <button class="btn" onclick="startSimulation()">Start</button>
                </div>
            </div>
        </div>

        <!-- RECHTE ANZEIGEBOX -->
        <div class="display-panel">
            <div class="score-banner">
                <div class="score-box" id="live-score">0 : 0</div>
            </div>

            <div class="probability-header">
                <div class="prob-col-title">Heim</div>
                <div class="prob-col-title">Remis</div>
                <div class="prob-col-title">Gast</div>
            </div>

            <div class="probability-bar">
                <div class="prob-col"><div class="prob-percentage" id="ui-prob-heim">33%</div></div>
                <div class="prob-col"><div class="prob-percentage" id="ui-prob-remis">(R) 33%</div></div>
