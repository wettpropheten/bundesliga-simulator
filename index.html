<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Bundesliga Match Simulator 3D</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;
padding:20px;

font-family:Arial,Helvetica,sans-serif;

background:
linear-gradient(135deg,#06101d,#075c35);

color:white;

}



.container{

max-width:1500px;
margin:auto;

}



h1{

text-align:center;

font-size:42px;

text-shadow:
0 10px 30px black;

}



.layout{

display:grid;

grid-template-columns:330px 1fr;

gap:25px;

}



.glass{

background:

rgba(255,255,255,.12);

border:

1px solid rgba(255,255,255,.25);

border-radius:25px;

padding:25px;

backdrop-filter:blur(15px);

box-shadow:

0 25px 60px black;

}





label{

display:block;

margin-top:15px;

}



input,
select{

width:100%;

padding:12px;

border-radius:10px;

border:none;

background:#111;

color:white;

margin-top:5px;

}



button{

width:100%;

padding:14px;

margin-top:12px;

border-radius:12px;

border:none;

font-weight:bold;

font-size:16px;

background:#009447;

color:white;

cursor:pointer;

}



.pause{

background:#c58b00;

}


.reset{

background:#b00020;

}




/* MATCHCENTER */


.matchcenter{

perspective:1000px;

}



.arena{

background:

linear-gradient(
145deg,
rgba(255,255,255,.18),
rgba(0,0,0,.35)
);

padding:35px;

border-radius:30px;

box-shadow:

inset 0 0 40px black,
0 20px 50px black;

transform:

rotateX(3deg);

}



.teams{

display:flex;

justify-content:space-between;

align-items:center;

}



.team{

text-align:center;

}



.team img{

width:120px;

height:120px;

object-fit:contain;

filter:

drop-shadow(
0 15px 15px black
);

}



.team h3{

font-size:24px;

}



.score{

font-size:90px;

font-weight:bold;

}



.clock{

font-size:40px;

color:#00ff66;

text-align:center;

}




/* TICKER */


.ticker{

margin-top:30px;

height:420px;

overflow:auto;

background:

rgba(0,0,0,.75);

border-radius:20px;

padding:15px;

}



.event{

display:grid;

grid-template-columns:

1fr 70px 1fr;

padding:14px;

border-bottom:

1px solid rgba(255,255,255,.15);

font-size:18px;

}



.home{

text-align:left;

font-weight:bold;

}



.time{

text-align:center;

color:#00ff66;

font-weight:bold;

}



.away{

text-align:right;

font-weight:bold;

}





/* KARTEN */


.cards{

margin-top:30px;

display:grid;

grid-template-columns:

repeat(3,1fr);

gap:20px;

}



.card{

background:

rgba(0,0,0,.35);

padding:20px;

border-radius:20px;

}



.card img{

width:80px;

height:80px;

object-fit:contain;

display:block;

margin:auto;

}





@media(max-width:900px){

.layout{

grid-template-columns:1fr;

}


.cards{

grid-template-columns:1fr;

}


}



</style>


</head>



<body>


<div class="container">


<h1>
⚽ Bundesliga Match Simulator PRO 3D
</h1>



<div class="layout">



<!-- EINSTELLUNG -->


<div class="glass">


<h2>
⚙️ Einstellungen
</h2>



<label>
Heim Mannschaft
</label>


<select id="homeSelect">

</select>




<label>
Gast Mannschaft
</label>


<select id="awaySelect">

</select>




<label>
Stadion
</label>


<input id="stadium"
value="Allianz Arena">



<label>
Heim Logo URL
</label>


<input id="homeLogoInput"
placeholder="https://...">



<label>
Gast Logo URL
</label>


<input id="awayLogoInput"
placeholder="https://...">



<button onclick="startSimulation()">
▶ START
</button>



<button class="pause" onclick="pauseSimulation()">
⏸ PAUSE
</button>



<button onclick="turboSimulation()">
⚡ ZEITRAFFER
</button>



<button class="reset" onclick="resetSimulation()">
🔄 RESET
</button>



</div>





<!-- SPIEL -->


<div class="glass matchcenter">


<div class="arena">



<div class="teams">



<div class="team">


<img id="homeLogo">


<h3 id="homeName">
Heim
</h3>


</div>




<div>


<div class="score">


<span id="homeGoals">
0
</span>

:

<span id="awayGoals">
0
</span>


</div>



<div class="clock">


<span id="minute">
00
</span>'


</div>


</div>





<div class="team">


<img id="awayLogo">


<h3 id="awayName">
Gast
</h3>


</div>


</div>




<div class="ticker" id="ticker">


<div class="event">


<div class="home">
SYSTEM
</div>


<div class="time">
00'
</div>


<div class="away">
Spiel bereit
</div>


</div>


</div>




</div>


</div>


</div>





<h2>
🏆 Mannschaftskarten
</h2>



<div class="cards" id="cards">


</div>




<script>


// DATENBANK KOMMT IN TEIL 2
// =======================================
// BUNDESLIGA DATENBANK
// =======================================


const teams={


"Bayern München":{

},


"Bayer 04 Leverkusen":{

goals:{low:25,mid:50,high:25}
},


"RB Leipzig":{

form:"SSSUS",

awayForm:"SSUN",
goals:{low:30,mid:50,high:20}
},


"VfB Stuttgart":{

form:"SSSNS",

awayForm:"SUNS",
goals:{low:35,mid:50,high:15}
},


"Eintracht Frankfurt":{
logo:"",
win:45,
draw:30,
loss:25,
xg:1.50,
form:"SSUNS",
homeForm:"SSSS",
awayForm:"SUNS",
goals:{low:35,mid:50,high:15}
},


"SC Freiburg":{

form:"SUSNS",

},


"1. FSV Mainz 05":{

form:"SSUNN",

},


"Werder Bremen":{

form:"SUSNS",

},


"Borussia Mönchengladbach":{

draw:30,

form:"SUNSN",

goals:{low:45,mid:45,high:10}
},


"TSG Hoffenheim":{
logo:"",

form:"SUNNS",
homeForm:"SSUN",

},


"1. FC Union Berlin":{
logo:"",
win:35,
draw:30,
loss:35,
xg:1.05,
form:"SSUNN",

goals:{low:50,mid:40,high:10}
},


"1. FC Köln":{
logo:"",
win:35,
draw:30,
loss:35,
xg:1.10,
form:"SUSNN",

goals:{low:45,mid:45,high:10}
},


"FC Augsburg":{
logo:"",
win:30,
draw:30,
loss:40,
xg:1.05,
form:"SSUNN",
homeForm:"SSUN",

goals:{low:50,mid:40,high:10}
},


"FC Schalke 04":{
logo:"",
win:30,
draw:30,
loss:40,
xg:1.00,
form:"SUSNN",
homeForm:"SSUN",
awayForm:"UNNN",
goals:{low:50,mid:40,high:10}
},


"SC Paderborn 07":{
logo:"",
win:25,
draw:30,
loss:45,
xg:0.95,
form:"SUNNN",
homeForm:"SUNN",
awayForm:"UNNN",
goals:{low:55,mid:35,high:10}
},


"SV Elversberg":{
logo:"",
win:25,
draw:30,
loss:45,
xg:0.90,
form:"SUNNN",
homeForm:"SUNN",
awayForm:"UNNN",
goals:{low:55,mid:35,high:10}
},


"Hamburger SV":{
logo:"",
win:35,
draw:30,
loss:35,
xg:1.15,
form:"SSUNN",
homeForm:"SSUN",
awayForm:"UNNN",
goals:{low:45,mid:45,high:10}
}


};




// =======================================
// DROPDOWNS
// =======================================


const homeSelect=document.getElementById("homeSelect");
const awaySelect=document.getElementById("awaySelect");



Object.keys(teams).forEach(name=>{


let a=document.createElement("option");
a.value=name;
a.textContent=name;
homeSelect.appendChild(a);



let b=document.createElement("option");
b.value=name;
b.textContent=name;
awaySelect.appendChild(b);



});



homeSelect.value="Bayern München";
awaySelect.value="Borussia Dortmund";




// =======================================
// MANNSCHAFTSKARTEN
// =======================================


function createCards(){


let box=document.getElementById("cards");


box.innerHTML="";



Object.keys(teams).forEach(name=>{


let t=teams[name];


box.innerHTML+=`

<div class="card">


<h3>${name}</h3>


<img id="img_${name}" src="${t.logo}">


<label>
Wappen URL
</label>

<input 
value="${t.logo}"
placeholder="Logo Link"
onchange="
teams['${name}'].logo=this.value;
document.getElementById('img_${name}').src=this.value;
">


<label>
Sieg %
</label>

<input type="number"
value="${t.win}"
onchange="teams['${name}'].win=Number(this.value)"
>


<label>
Remis %
</label>

<input type="number"
value="${t.draw}"
onchange="teams['${name}'].draw=Number(this.value)"
>


<label>
Niederlage %
</label>

<input type="number"
value="${t.loss}"
onchange="teams['${name}'].loss=Number(this.value)"
>


<label>
xG Stärke
</label>

<input type="number"
step="0.1"
value="${t.xg}"
onchange="teams['${name}'].xg=Number(this.value)"
>


</div>


`;


});


}



createCards();
// =======================================
// REALISTISCHE MATCH ENGINE
// =======================================


let timer=null;

let minute=0;

let homeScore=0;

let awayScore=0;

let paused=false;

let turbo=false;



function getHomeTeam(){

return teams[homeSelect.value];

}


function getAwayTeam(){

return teams[awaySelect.value];

}





// =======================================
// FORM
// =======================================


function formPower(text){

let value=0;


for(let c of text){


if(c==="S")
value+=3;


if(c==="U")
value+=1;


if(c==="N")
value-=2;


}


return value;

}





// =======================================
// MANNSCHAFTSSTÄRKE
// =======================================


function power(team,home){


let p=

team.xg*20

+

formPower(team.form)

+

formPower(
home ?
team.homeForm:
team.awayForm
);



if(home)
p+=5;


return p;

}





// =======================================
// TICKER
// =======================================


function addEvent(side,text){


let box=document.getElementById("ticker");


let row=document.createElement("div");


row.className="event";


let left="";

let right="";



if(side==="home"){

left=homeSelect.value;

}


if(side==="away"){

right=awaySelect.value;

}



if(side==="both"){

left="";

right=text;

}



if(side==="system"){

right=text;

}




row.innerHTML=`

<div class="home">

${left}

</div>


<div class="time">

${minute}'

</div>


<div class="away">

${right}

</div>


`;



box.appendChild(row);


box.scrollTop=box.scrollHeight;


}





// =======================================
// TOR
// =======================================


function goal(side){


if(side==="home"){


homeScore++;

addEvent(
"home",
"⚽ TOR"
);


}


else{


awayScore++;


addEvent(
"away",
"⚽ TOR"
);


}



document.getElementById("homeGoals").innerHTML=homeScore;

document.getElementById("awayGoals").innerHTML=awayScore;


}





// =======================================
// TORWAHRSCHEINLICHKEIT
// =======================================


function goalChance(team,powerValue){



let chance=

(team.xg/90)*0.55;



chance*=

powerValue/50;



// begrenzen

if(chance>0.08)

chance=0.08;



return chance;


}





// =======================================
// MINUTE
// =======================================


function simulateMinute(){


if(paused)
return;



minute++;



document.getElementById("minute")
.innerHTML=
minute;



let home=getHomeTeam();

let away=getAwayTeam();



let hp=power(home,true);

let ap=power(away,false);



let homeGoal=

goalChance(home,hp);



let awayGoal=

goalChance(away,ap);





if(Math.random()<homeGoal){

goal("home");

}



if(Math.random()<awayGoal){

goal("away");

}





// Karten realistisch


if(Math.random()<0.025){

addEvent(
"home",
"🟨 Gelbe Karte"
);

}



if(Math.random()<0.025){

addEvent(
"away",
"🟨 Gelbe Karte"
);

}





if(minute===45){

addEvent(
"system",
"⏱ HALBZEIT"
);

}





if(minute>=90){


clearInterval(timer);

timer=null;


addEvent(
"system",
"🏁 ABPFIFF"
);


}


}







// =======================================
// START
// =======================================


function startSimulation(){


if(timer)
return;



resetGame();



addEvent(
"system",
"▶ ANPFIFF"
);



timer=setInterval(

simulateMinute,

turbo ? 100 : 1000

);


}





// =======================================
// ZEITRAFFER
// =======================================


function turboSimulation(){


turbo=true;


if(timer){

clearInterval(timer);


timer=setInterval(
simulateMinute,
100
);


}


else{

startSimulation();

}


}





// =======================================
// PAUSE
// =======================================


function pauseSimulation(){


paused=!paused;



addEvent(
"system",
paused ?
"⏸ PAUSE":
"▶ WEITER"
);


}





// =======================================
// RESET
// =======================================


function resetGame(){


minute=0;

homeScore=0;

awayScore=0;



document.getElementById("minute")
.innerHTML="00";


document.getElementById("homeGoals")
.innerHTML="0";


document.getElementById("awayGoals")
.innerHTML="0";



document.getElementById("ticker")
.innerHTML="";


}
// =======================================
// MATCHCENTER AKTUALISIEREN
// =======================================


function updateMatch(){


let home=getHomeTeam();

let away=getAwayTeam();



// Namen


document.getElementById("homeName")
.innerHTML=
homeSelect.value;



document.getElementById("awayName")
.innerHTML=
awaySelect.value;




// Logos aus Mannschaftskarten


document.getElementById("homeLogo")
.src=
home.logo || "";



document.getElementById("awayLogo")
.src=
away.logo || "";



}





// =======================================
// DROPDOWN ÄNDERUNG
// =======================================


homeSelect.onchange=function(){

updateMatch();

}



awaySelect.onchange=function(){

updateMatch();

}





// =======================================
// LOGO EINGABE LINKS
// =======================================


document.getElementById("homeLogoInput")
.onchange=function(){


teams[homeSelect.value].logo=this.value;


updateMatch();


};




document.getElementById("awayLogoInput")
.onchange=function(){


teams[awaySelect.value].logo=this.value;


updateMatch();


};





// =======================================
// START ANZEIGE
// =======================================


window.onload=function(){

updateMatch();

};
// =======================================
// FINALER FEINSCHLIFF
// =======================================


// Standard Logos falls leer

function logoCheck(){


let homeLogo=document.getElementById("homeLogo");

let awayLogo=document.getElementById("awayLogo");



if(homeLogo.src===""){

homeLogo.style.opacity="0.3";

}


if(awayLogo.src===""){

awayLogo.style.opacity="0.3";

}


}




// =======================================
// START BUTTON SICHERHEIT
// =======================================


function startSimulation(){


if(timer)
return;



resetGame();


paused=false;


turbo=false;



addEvent(
"system",
"▶ ANPFIFF"
);



timer=setInterval(

simulateMinute,

1000

);


}






// =======================================
// TURBO VERBESSERT
// =======================================


function turboSimulation(){


turbo=true;



if(timer){


clearInterval(timer);


timer=setInterval(

simulateMinute,

100

);


}

else{


startSimulation();


}



}






// =======================================
// 3D MATCHCENTER EFFEKT
// =======================================


let arena=document.querySelector(".arena");



if(arena){


arena.onmousemove=function(e){


let x=e.offsetX / arena.offsetWidth;

let y=e.offsetY / arena.offsetHeight;



arena.style.transform=

`
rotateX(${3-y*6}deg)
rotateY(${x*6-3}deg)
`;



};



arena.onmouseleave=function(){


arena.style.transform=

"rotateX(3deg) rotateY(0deg)";


};


}






// =======================================
// ERSTER AUFRUF
// =======================================


updateMatch();

logoCheck();
</script>


</body>

</html>
