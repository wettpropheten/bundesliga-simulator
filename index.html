<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bundesliga Simulator PRO</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;
padding:20px;

font-family:Arial,Helvetica,sans-serif;

background:
linear-gradient(135deg,#032b12,#00853f);

color:white;

}



h1{

text-align:center;

font-size:42px;

}



.subtitle{

text-align:center;

color:#ddd;

margin-bottom:30px;

}




.box{

background:#111;

border-radius:20px;

padding:20px;

margin:20px auto;

max-width:1500px;

box-shadow:0 0 25px black;

}





.selection{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}




select,
input{

width:100%;

padding:10px;

margin-top:8px;

background:#222;

color:white;

border:1px solid #555;

border-radius:8px;

font-size:16px;

}



.teamCard{

background:#181818;

border:2px solid #00aa55;

border-radius:15px;

padding:15px;

margin-top:15px;

line-height:1.8;

}



.stadium{

background:
linear-gradient(#087b35,#045522);

border:3px solid #00ff66;

}





.scoreboard{

display:flex;

justify-content:center;

align-items:center;

gap:50px;

font-size:30px;

font-weight:bold;

}



.score{

background:white;

color:black;

font-size:60px;

padding:20px 40px;

border-radius:20px;

}





.stats{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:15px;

text-align:center;

}



.stats div{

background:#222;

padding:20px;

border-radius:15px;

font-size:20px;

}




button{

width:100%;

padding:15px;

margin-top:10px;

background:#009944;

color:white;

border:none;

border-radius:10px;

font-size:18px;

font-weight:bold;

cursor:pointer;

}



button:hover{

background:#00cc55;

}



#events{

height:300px;

overflow:auto;

background:#050505;

padding:15px;

border-radius:15px;

}



.editor{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

}



.editorCard{

background:#191919;

padding:15px;

border-radius:15px;

border:1px solid #555;

}



.form{

display:flex;

gap:5px;

}



@media(max-width:900px){

.selection,
.editor,
.stats{

grid-template-columns:1fr;

}


.scoreboard{

flex-direction:column;

}


}

</style>


</head>



<body>


<h1>
⚽ Bundesliga Simulator PRO
</h1>


<div class="subtitle">
Realistische Simulation mit eigenen Mannschaftswerten
</div>
<!-- ============================= -->
<!-- HEIM UND GAST AUSWAHL -->
<!-- ============================= -->


<section class="box selection">


<div>


<h2>🏠 Heim Mannschaft</h2>


<select id="homeTeam" onchange="updateTeams()">

</select>



<div id="homeCard" class="teamCard">

</div>


</div>





<div>


<h2>✈️ Gast Mannschaft</h2>


<select id="awayTeam" onchange="updateTeams()">

</select>



<div id="awayCard" class="teamCard">

</div>


</div>


</section>







<!-- ============================= -->
<!-- SPIELANZEIGE -->
<!-- ============================= -->


<section class="box stadium">


<h2 style="text-align:center">

🏟 LIVE SPIEL

</h2>



<div class="scoreboard">


<div id="homeName">

Heim

</div>



<div class="score">


<span id="homeGoals">

0

</span>


:


<span id="awayGoals">

0

</span>


</div>




<div id="awayName">

Gast

</div>


</div>





<h2 style="text-align:center">

Minute:

<span id="minute">

00

</span>

'

</h2>



</section>







<!-- ============================= -->
<!-- STATISTIK -->
<!-- ============================= -->


<section class="box stats">


<div>

📊 Ballbesitz

<br>

<span id="possession">

50 : 50

</span>


</div>




<div>

🎯 Schüsse

<br>

<span id="shots">

0 : 0

</span>


</div>




<div>

🚩 Ecken

<br>

<span id="corners">

0 : 0

</span>


</div>




<div>

🟨 Karten

<br>

<span id="cards">

0 : 0

</span>


</div>



</section>







<!-- ============================= -->
<!-- STEUERUNG -->
<!-- ============================= -->


<section class="box">


<button onclick="startSimulation()">

▶ SPIEL STARTEN

</button>



<button onclick="resetSimulation()">

🔄 RESET

</button>



<button onclick="saveData()">

💾 DATEN SPEICHERN

</button>



</section>







<!-- ============================= -->
<!-- LIVE TICKER -->
<!-- ============================= -->


<section class="box">


<h2>

📢 Spielverlauf

</h2>



<div id="events">

</div>


</section>








<!-- ============================= -->
<!-- MANNSCHAFTS DATEN -->
<!-- ============================= -->


<section class="box">


<h2 style="text-align:center">

⚙️ Mannschaftswerte bearbeiten

</h2>



<div id="editor" class="editor">


</div>


</section>
<script>


// =====================================
// MANNSCHAFTSDATEN
// =====================================


let teams = {


FCB:{

},

},

away:5,

},



RBL:{

strength:84,

form:["S","U","S","N","S"]
},



VFB:{
name:"VfB Stuttgart",
strength:82,
attack:84,

defense:80,
goalkeeper:81,
home:5,

form:["S","S","U","N","S"]
},



SGE:{
name:"Eintracht Frankfurt",
strength:80,

form:["S","U","N","S","U"]
},



SCF:{

},



SVW:{

form:["N","S","U","S","N"]
},



BMG:{
name:"Borussia Mönchengladbach",
strength:75,
attack:76,
midfield:75,
defense:73,
goalkeeper:74,
home:5,
away:3,
form:["U","N","S","N","U"]
},



M05:{
name:"Mainz 05",
strength:74,
attack:73,
midfield:74,
defense:75,
goalkeeper:75,
home:5,
away:3,
form:["S","U","N","U","S"]
},



FCU:{
name:"Union Berlin",
strength:74,
attack:72,
midfield:74,
defense:76,
goalkeeper:78,
home:6,

form:["N","U","S","N","S"]
},



TSG:{
name:"Hoffenheim",
strength:74,
attack:76,
midfield:74,
defense:72,
goalkeeper:73,
home:4,
away:4,
form:["U","S","N","U","N"]
},



FCA:{
name:"Augsburg",
strength:72,
attack:72,
midfield:71,
defense:72,
goalkeeper:72,
home:5,

form:["N","U","S","N","U"]
},



HSV:{
name:"Hamburger SV",
strength:71,
attack:72,
midfield:71,
defense:69,
goalkeeper:71,
home:5,

form:["S","U","S","N","U"]
},



KOE:{
name:"1. FC Köln",
strength:71,
attack:70,
midfield:70,
defense:72,
goalkeeper:72,
home:5,
away:3,
form:["U","N","S","U","N"]
},



S04:{
name:"Schalke 04",
strength:70,
attack:71,
midfield:70,
defense:69,
goalkeeper:70,
home:6,
away:3,
form:["S","N","U","N","S"]
},



SCP:{
name:"SC Paderborn",
strength:68,
attack:67,
midfield:68,
defense:69,
goalkeeper:68,
home:4,
away:3,
form:["N","U","S","N","U"]
},



ELV:{
name:"SV Elversberg",
strength:67,
attack:67,
midfield:67,
defense:67,
goalkeeper:67,
home:4,
away:3,
form:["S","N","U","N","S"]
}


};



// =====================================
// GRAFIK MIT DATEN VERBINDEN
// =====================================


let matchTimer;

let minute = 0;

let homeScore = 0;

let awayScore = 0;



let stats = {

homeShots:0,
awayShots:0,

homeCorners:0,
awayCorners:0,

homeCards:0,
awayCards:0

};








function loadTeams(){


let home=document.getElementById("homeTeam");

let away=document.getElementById("awayTeam");



Object.keys(teams).forEach(id=>{


home.innerHTML +=

`
<option value="${id}">
${id} - ${teams[id].name}
</option>
`;



away.innerHTML +=

`
<option value="${id}">
${id} - ${teams[id].name}
</option>
`;



});



createEditor();

updateTeams();


}








function createEditor(){


let editor=document.getElementById("editor");


editor.innerHTML="";



Object.keys(teams).forEach(id=>{


let t=teams[id];



editor.innerHTML +=


`

<div class="editorCard">


<h3>
${id}<br>
${t.name}
</h3>


<label>
Stärke
</label>

<input type="number"
value="${t.strength}"
onchange="teams.${id}.strength=Number(this.value)">



<label>
Angriff
</label>

<input type="number"
value="${t.attack}"
onchange="teams.${id}.attack=Number(this.value)">



<label>
Mittelfeld
</label>

<input type="number"
value="${t.midfield}"
onchange="teams.${id}.midfield=Number(this.value)">



<label>
Defensive
</label>

<input type="number"
value="${t.defense}"
onchange="teams.${id}.defense=Number(this.value)">



<label>
Torwart
</label>

<input type="number"
value="${t.goalkeeper}"
onchange="teams.${id}.goalkeeper=Number(this.value)">



<label>
Heimstärke
</label>

<input type="number"
value="${t.home}"
onchange="teams.${id}.home=Number(this.value)">



<label>
Auswärtsstärke
</label>

<input type="number"
value="${t.away}"
onchange="teams.${id}.away=Number(this.value)">



</div>


`;



});


}








function updateTeams(){


let h=

teams[document.getElementById("homeTeam").value];


let a=

teams[document.getElementById("awayTeam").value];



document.getElementById("homeName").innerHTML=

h.name;



document.getElementById("awayName").innerHTML=

a.name;




document.getElementById("homeCard").innerHTML=


`

<h3>${h.name}</h3>

Stärke: ${h.strength}<br>

Angriff: ${h.attack}<br>

Mittelfeld: ${h.midfield}<br>

Defensive: ${h.defense}<br>

Torwart: ${h.goalkeeper}<br>

Heimbonus: ${h.home}<br>

Form: ${h.form.join(" ")}

`;





document.getElementById("awayCard").innerHTML=


`

<h3>${a.name}</h3>

Stärke: ${a.strength}<br>

Angriff: ${a.attack}<br>

Mittelfeld: ${a.midfield}<br>

Defensive: ${a.defense}<br>

Torwart: ${a.goalkeeper}<br>

Auswärts: ${a.away}<br>

Form: ${a.form.join(" ")}

`;



}







function formPoints(team){


let value=0;


team.form.forEach(x=>{


if(x=="S") value+=2;


if(x=="N") value-=2;


});


return value;

}








function calculateTeam(team,isHome){


return (

team.strength*0.30

+

team.attack*0.20

+

team.midfield*0.20

+

team.defense*0.15

+

team.goalkeeper*0.10

+

formPoints(team)

+

(isHome ? team.home : team.away)

);


}
// =====================================
// SIMULATION
// =====================================



function startSimulation(){


clearInterval(matchTimer);



minute=0;

homeScore=0;

awayScore=0;


stats={

homeShots:0,
awayShots:0,

homeCorners:0,
awayCorners:0,

homeCards:0,
awayCards:0

};



document.getElementById("events").innerHTML="";



document.getElementById("homeGoals").innerHTML=0;

document.getElementById("awayGoals").innerHTML=0;



matchTimer=setInterval(simulateMinute,120);


}








function simulateMinute(){


minute++;


document.getElementById("minute").innerHTML=minute;



let h=

teams[document.getElementById("homeTeam").value];


let a=

teams[document.getElementById("awayTeam").value];



let homePower=

calculateTeam(h,true);


let awayPower=

calculateTeam(a,false);





// -----------------------------
// Ballbesitz
// -----------------------------


let total=

homePower+awayPower;


let homePoss=

Math.round((homePower/total)*100);


document.getElementById("possession").innerHTML=

homePoss+" : "+(100-homePoss);






// -----------------------------
// Heim Torchance
// -----------------------------


if(Math.random()<0.18){


stats.homeShots++;



let chance=

(homePower/(homePower+awayPower))*0.28;



if(Math.random()<chance){


homeScore++;


addEvent(

"⚽ "+minute+
"' Tor für "+h.name

);


}


}






// -----------------------------
// Gast Torchance
// -----------------------------


if(Math.random()<0.16){


stats.awayShots++;



let chance=

(awayPower/(homePower+awayPower))*0.25;



if(Math.random()<chance){


awayScore++;


addEvent(

"⚽ "+minute+
"' Tor für "+a.name

);


}


}






// -----------------------------
// Ecken
// -----------------------------


if(Math.random()<0.22){

stats.homeCorners++;

}


if(Math.random()<0.20){

stats.awayCorners++;

}






// -----------------------------
// Karten
// -----------------------------


if(Math.random()<0.035){


stats.homeCards++;


addEvent(

"🟨 "+minute+
"' Gelbe Karte "+h.name

);


}



if(Math.random()<0.035){


stats.awayCards++;


addEvent(

"🟨 "+minute+
"' Gelbe Karte "+a.name

);


}






updateStats();







if(minute>=90){


clearInterval(matchTimer);



addEvent(

"🏁 Spiel beendet"

);


}



}









function updateStats(){



document.getElementById("homeGoals").innerHTML=

homeScore;



document.getElementById("awayGoals").innerHTML=

awayScore;





document.getElementById("shots").innerHTML=

stats.homeShots+
" : "+
stats.awayShots;





document.getElementById("corners").innerHTML=

stats.homeCorners+
" : "+
stats.awayCorners;





document.getElementById("cards").innerHTML=

stats.homeCards+
" : "+
stats.awayCards;



}









function addEvent(text){


let box=

document.getElementById("events");



box.innerHTML +=

text+
"<br>";



box.scrollTop=box.scrollHeight;


}








function resetSimulation(){


clearInterval(matchTimer);


minute=0;


homeScore=0;

awayScore=0;



document.getElementById("minute").innerHTML="00";


document.getElementById("homeGoals").innerHTML="0";


document.getElementById("awayGoals").innerHTML="0";


document.getElementById("events").innerHTML="";



updateStats();


}








function saveData(){


localStorage.setItem(

"bundesligaSimulator",

JSON.stringify(teams)

);



alert("Mannschaftsdaten gespeichert");


}








window.onload=loadTeams;

</script>


</body>

</html>
