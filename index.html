<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bundesliga Match Simulator PRO</title>


<style>

*{
box-sizing:border-box;
}

body{

margin:0;
padding:15px;

font-family:Arial,Helvetica,sans-serif;

background:
linear-gradient(135deg,#07111f,#075c32);

color:white;

}


.container{

max-width:1400px;

margin:auto;

}


h1{

text-align:center;

font-size:34px;

text-shadow:
0 5px 15px black;

}


.layout{

display:grid;

grid-template-columns:
330px 1fr;

gap:20px;

}


.glass{

background:
rgba(255,255,255,.12);

border-radius:20px;

padding:20px;

border:1px solid rgba(255,255,255,.25);

backdrop-filter:blur(12px);

box-shadow:
0 15px 40px black;

}



h2{

border-bottom:
1px solid rgba(255,255,255,.3);

padding-bottom:8px;

}


label{

display:block;

margin-top:12px;

}


input,
select{

width:100%;

padding:10px;

margin-top:5px;

border-radius:8px;

border:none;

background:#111;

color:white;

}



button{

width:100%;

padding:13px;

margin-top:10px;

border:none;

border-radius:10px;

background:#009447;

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

}


button:hover{

transform:scale(1.03);

}


.pause{

background:#d28b00;

}


.reset{

background:#b00020;

}


/* MATCHCENTER */


.matchcenter{

text-align:center;

}


.teams{

display:flex;

justify-content:space-between;

align-items:center;

}


.team img{

width:90px;

height:90px;

object-fit:contain;

filter:
drop-shadow(0 5px 10px black);

}



.team h3{

font-size:22px;

}


.score{

font-size:70px;

font-weight:bold;

}



.clock{

font-size:35px;

color:#00ff66;

margin-top:10px;

}




/* LIVETICKER */


.ticker{

height:520px;

overflow:auto;

background:

rgba(0,0,0,.75);

border-radius:15px;

margin-top:25px;

padding:15px;

}



.event{

display:grid;

grid-template-columns:

1fr 70px 1fr;

padding:10px;

border-bottom:

1px solid rgba(255,255,255,.15);

font-size:17px;

}


.left{

text-align:left;

font-weight:bold;

}


.time{

text-align:center;

color:#00ff66;

font-weight:bold;

}


.right{

text-align:right;

font-weight:bold;

}





/* MANNSCHAFTSKARTEN */


.cards{

margin-top:30px;

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:15px;

}



.card{

background:

rgba(0,0,0,.35);

padding:15px;

border-radius:15px;

}



.card img{

width:70px;

height:70px;

object-fit:contain;

display:block;

margin:auto;

}



@media(max-width:900px){

.layout{

grid-template-columns:1fr;

}


.cards{

grid-template-columns:1fr;

}


}



</style>

</head>

<script>


// =======================================
// SIMULATIONS ENGINE
// =======================================


let timer=null;

let minute=0;

let homeScore=0;

let awayScore=0;

let paused=false;



function getHomeTeam(){

return teams[homeSelect.value];

}


function getAwayTeam(){

return teams[awaySelect.value];

}





// =======================================
// FORM AUSWERTUNG
// =======================================


function formValue(form){


let value=0;


for(let x of form){


if(x==="S")
value+=3;


if(x==="U")
value+=1;


if(x==="N")
value-=2;


}


return value;


}





// =======================================
// SPIELSTÄRKE
// =======================================


function teamPower(team,home){


let power=

(team.xg*20)

+

formValue(team.form)

+

formValue(
home ?
team.homeForm:
team.awayForm
);



return power;


}





// =======================================
// LIVETICKER
// =======================================


function addEvent(side,text){


let box=document.getElementById("ticker");


let row=document.createElement("div");


row.className="event";



row.innerHTML=`

<div class="left">

${side==="home" ? homeSelect.value : ""}

</div>


<div class="time">

${minute}'

</div>


<div class="right">

${text}

${side==="away" ? " "+awaySelect.value:""}

</div>

`;



box.appendChild(row);


box.scrollTop=
box.scrollHeight;


}





// =======================================
// TOR BERECHNUNG
// =======================================


function scoreGoal(side){


if(side==="home"){

homeScore++;

addEvent(
"home",
"⚽ TOR"
);


}

else{


awayScore++;


addEvent(
"away",
"⚽ TOR"
);


}



document.getElementById("homeGoals")
.innerHTML=homeScore;


document.getElementById("awayGoals")
.innerHTML=awayScore;


}





// =======================================
// WAHRSCHEINLICHKEIT SPIELAUSGANG
// =======================================


function matchResult(){


let home=getHomeTeam();

let away=getAwayTeam();



let total=

home.win+
home.draw+
home.loss;



let r=Math.random()*total;



if(r<home.win)

return "home";



if(r<home.win+home.draw)

return "draw";



return "away";


}





// =======================================
// TORANZAHL AUS TORTENDENZ
// =======================================


function expectedGoals(){


let home=getHomeTeam();

let away=getAwayTeam();



let avg=

(home.xg+away.xg);



let result=[];



for(let i=0;i<Math.round(avg);i++){

if(Math.random()<0.65)

result.push(i);

}


return result.length;



}






// =======================================
// EINE SPIELMINUTE
// =======================================


function simulateMinute(){


if(paused)
return;



minute++;


document.getElementById("minute")
.innerHTML=
minute;



let home=getHomeTeam();

let away=getAwayTeam();



let homePower=
teamPower(home,true);


let awayPower=
teamPower(away,false);



let total=
homePower+awayPower;



// normale Aktionen


let action=Math.random();



if(action<0.18){


addEvent(
"home",
"Angriff über außen"
);


}


else if(action<0.35){


addEvent(
"away",
"Konterchance"
);


}


else if(action<0.45){


addEvent(
"",
"Schuss aufs Tor"
);


}





// Tore abhängig von xG


let homeChance=

(home.xg/90)*0.45;



let awayChance=

(away.xg/90)*0.45;



// Stärke einbauen


homeChance*=

homePower/awayPower;



awayChance*=

awayPower/homePower;




if(Math.random()<homeChance){

scoreGoal("home");

}



if(Math.random()<awayChance){

scoreGoal("away");

}





// Karten


if(Math.random()<0.025){


addEvent(
"home",
"🟨 Gelbe Karte"
);


}


if(Math.random()<0.025){


addEvent(
"away",
"🟨 Gelbe Karte"
);


}





// Halbzeit


if(minute===45){


addEvent(
"",
"⏱ HALBZEIT"
);


}



// Ende


if(minute>=90){


clearInterval(timer);

timer=null;


addEvent(
"",
"🏁 ABPFIFF"
);



finishGame();


}



}






// =======================================
// START
// =======================================


function startSimulation(){


if(timer)
return;



resetScores();



addEvent(
"",
"▶ ANPFIFF"
);



timer=setInterval(

simulateMinute,

1000

);


}





function resetScores(){


homeScore=0;

awayScore=0;

minute=0;


document.getElementById("homeGoals")
.innerHTML="0";


document.getElementById("awayGoals")
.innerHTML="0";


document.getElementById("minute")
.innerHTML="00";


}






// =======================================
// PAUSE
// =======================================


function pauseSimulation(){


paused=!paused;



addEvent(
"",
paused ?

"⏸ PAUSE":

"▶ WEITER"

);


}






// =======================================
// RESET
// =======================================


function resetSimulation(){


clearInterval(timer);

timer=null;


resetScores();


document.getElementById("ticker")
.innerHTML="";


addEvent(
"",
"Spiel bereit"
);


}





// =======================================
// SPIELENDE ANALYSE
// =======================================


function finishGame(){


let home=getHomeTeam();

let away=getAwayTeam();



addEvent(
"",
"🏆 Endstand "+

home.name+

" "+

homeScore+

" : "+

awayScore+

" "+

away.name

);


}

<script>


// =======================================
// MATCHCENTER AKTUALISIEREN
// =======================================


function updateMatch(){


let home=getHomeTeam();

let away=getAwayTeam();



// Namen


document.getElementById("homeName")
.innerHTML=
homeSelect.value;



document.getElementById("awayName")
.innerHTML=
awaySelect.value;





// Wappen aus Mannschaftskarte


document.getElementById("homeLogo")
.src=
home.logo;



document.getElementById("awayLogo")
.src=
away.logo;






// Falls eigene URL im Einstellungsfenster


let homeURL=

document.getElementById("homeLogoInput")
.value;



let awayURL=

document.getElementById("awayLogoInput")
.value;




if(homeURL!=""){

document.getElementById("homeLogo")
.src=homeURL;

home.logo=homeURL;

}



if(awayURL!=""){

document.getElementById("awayLogo")
.src=awayURL;

away.logo=awayURL;

}



addEvent(

"",
"🔄 Matchdaten aktualisiert"

);



}





// =======================================
// DROPDOWN ÄNDERUNG
// =======================================


homeSelect.onchange=function(){

updateMatch();

}



awaySelect.onchange=function(){

updateMatch();

}





// =======================================
// ERSTER START
// =======================================


window.onload=function(){


updateMatch();


};





// =======================================
// TASTEN SICHERHEIT
// =======================================


document.querySelectorAll("button")
.forEach(button=>{


button.addEventListener(
"click",
function(){


});


});




<script>


// =======================================
// REALISTISCHE TORWAHRSCHEINLICHKEIT
// =======================================


function calculateFinalGoals(team){


let xg=team.xg;


let goals=0;



for(let i=0;i<8;i++){


let chance=xg/8;



if(Math.random()<chance){

goals++;

}


}



return goals;


}





// =======================================
// SPIELANALYSE
// =======================================


function matchAnalysis(){


let home=getHomeTeam();

let away=getAwayTeam();



let homeShots=Math.floor(
home.xg*6+
Math.random()*8
);



let awayShots=Math.floor(
away.xg*6+
Math.random()*8
);



let total=
homeScore+
awayScore;



let rating;



if(total>=5){

rating="★★★★★";

}

else if(total>=3){

rating="★★★★☆";

}

else{

rating="★★★☆☆";

}




let box=document.getElementById("ticker");



box.innerHTML+=`


<div class="event">

<div class="left">

ANALYSE

</div>


<div class="time">

90'

</div>


<div class="right">

<br>

Endergebnis:
<br>

<b>
${home.name}
${homeScore}
:
${awayScore}
${away.name}
</b>

<br><br>


Expected Goals:
<br>

${home.xg.toFixed(2)}
:
${away.xg.toFixed(2)}

<br><br>


Torschüsse:
<br>

${homeShots}
:
${awayShots}


<br><br>


Spielbewertung:
<br>

${rating}


</div>


</div>


`;



box.scrollTop=
box.scrollHeight;



}





// =======================================
// NACH 90 MINUTEN
// =======================================


function finishGame(){


let extra=
Math.floor(Math.random()*5)+1;



addEvent(
"",
"⏱ Nachspielzeit +"+extra+" Minuten"
);



setTimeout(()=>{


addEvent(
"",
"🏁 ABPFIFF"
);



matchAnalysis();



},extra*300);



}






// =======================================
// TURBO FUNKTION (OPTIONAL)
// =======================================


function turboSimulation(){


clearInterval(timer);


timer=setInterval(

simulateMinute,

200

);


}


</script>
