<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bundesliga Simulator PRO 3.0</title>


<style>

*{
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}


body{

margin:0;

background:
linear-gradient(
135deg,
#030303,
#101827
);

color:white;

}



.container{

width:95%;
max-width:1500px;
margin:auto;

}



h1,h2{

text-align:center;

}



.box{

background:
rgba(255,255,255,.06);

border:
1px solid rgba(255,255,255,.12);

border-radius:25px;

padding:25px;

margin:20px 0;

box-shadow:
0 20px 50px black;

backdrop-filter:
blur(15px);

}



/* ==========================
MATCHCENTER
========================== */


.matchGrid{

display:grid;

grid-template-columns:
1fr 180px 1fr;

align-items:center;

gap:20px;

text-align:center;

}



.teamSide{

font-size:25px;

}



.teamSide strong{

display:block;

font-size:65px;

color:#39df72;

}



.clock{

font-size:45px;

color:#39df72;

font-weight:bold;

}



.status{

margin-top:10px;

}



.stats{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:15px;

margin-top:30px;

}



.statBox{

background:#080808;

padding:15px;

border-radius:15px;

text-align:center;

}



.statBox b{

display:block;

font-size:25px;

color:#39df72;

}



/* ==========================
TICKER
========================== */


.ticker{

background:#050505;

border-radius:20px;

padding:20px;

height:220px;

overflow:auto;

}



.event{

padding:10px;

border-bottom:
1px solid #333;

}




/* ==========================
CONTROLS
========================== */


.controls{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:15px;

}



select,
input{

padding:12px;

background:#111;

color:white;

border:none;

border-radius:12px;

}



button{

background:#39df72;

border:none;

padding:14px;

border-radius:15px;

font-weight:bold;

cursor:pointer;

}



button:hover{

transform:scale(1.04);

}




/* ==========================
TEAM CARDS
========================== */


.cards{

display:grid;

grid-template-columns:
repeat(6,1fr);

gap:15px;

}



.card{

background:#080808;

padding:18px;

border-radius:20px;

text-align:center;

border:
1px solid #222;

}



.card h3{

color:#39df72;

}



@media(max-width:900px){


.matchGrid{

grid-template-columns:1fr;

}


.cards{

grid-template-columns:
repeat(2,1fr);

}


.stats{

grid-template-columns:
repeat(2,1fr);

}


.controls{

grid-template-columns:1fr;

}


}



</style>


</head>

// =================================
// STARTDATEN LADEN
// =================================


let homeGoals=0;
let awayGoals=0;

let matchMinute=0;


let matchRunning=false;


let matchEvents=[];



// =================================
// TEAMKARTEN ERSTELLEN
// =================================


function renderTeamCards(){


let box=document.getElementById(
"teamCards"
);


box.innerHTML="";



Object.keys(teams).forEach(team=>{


let t=teams[team];



box.innerHTML+=`

<div class="card">


<h3>
${t.short}
</h3>


<b>
${team}
</b>


<p>
⚔ Angriff:
${t.attack}
</p>


<p>
🛡 Defensive:
${t.defense}
</p>


<p>
📈 xG:
${t.xg.toFixed(2)}
</p>


<p>
🔥 Form:
${t.form}
</p>


<p>
🏆 Punkte:
${t.points}
</p>


<p>
👔 Trainer:
${t.trainer}
</p>


<button onclick="openEditor('${team}')">

✏ Bearbeiten

</button>


</div>

`;



});



}





// =================================
// DROPDOWN LADEN
// =================================



function loadTeams(){


let home=document.getElementById(
"homeTeam"
);


let away=document.getElementById(
"awayTeam"
);



home.innerHTML="";

away.innerHTML="";



Object.keys(teams).forEach(team=>{


home.innerHTML+=`

<option>
${team}
</option>

`;


away.innerHTML+=`

<option>
${team}
</option>

`;



});



home.selectedIndex=0;

away.selectedIndex=1;



updateMatchTeams();



}





// =================================
// MATCHCENTER TEAMS AKTUALISIEREN
// =================================



function updateMatchTeams(){


let home=document.getElementById(
"homeTeam"
).value;


let away=document.getElementById(
"awayTeam"
).value;



if(!teams[home] || !teams[away])
return;



document.getElementById(
"homeShort"
).innerHTML=

teams[home].short;



document.getElementById(
"awayShort"
).innerHTML=

teams[away].short;



document.getElementById(
"homeName"
).innerHTML=

home;



document.getElementById(
"awayName"
).innerHTML=

away;



calculateOdds();


}





document.getElementById(
"homeTeam"
)
.addEventListener(
"change",
updateMatchTeams
);



document.getElementById(
"awayTeam"
)
.addEventListener(
"change",
updateMatchTeams
);





// =================================
// EDITOR
// =================================



let editTeam=null;



function openEditor(team){


editTeam=team;


let t=teams[team];



let name=prompt(
"Vereinsname",
team
);



if(!name)
return;



let attack=prompt(
"Angriff",
t.attack
);



let defense=prompt(
"Defensive",
t.defense
);



let xg=prompt(
"xG",
t.xg
);



let form=prompt(
"Form",
t.form
);



teams[name]={

...t,

attack:Number(attack),

defense:Number(defense),

xg:Number(xg),

form:form

};



if(name!==team){

delete teams[team];

}



saveTeams();



renderTeamCards();


loadTeams();


}





// =================================
// SPEICHERN
// =================================



function saveTeams(){


localStorage.setItem(

"bundesliga_manager_data",

JSON.stringify(teams)

);


}




function loadSavedTeams(){


let saved=

localStorage.getItem(
"bundesliga_manager_data"
);



if(saved){


teams=
JSON.parse(saved);


}



}






// =================================
// WAHRSCHEINLICHKEITEN
// =================================



function calculateOdds(){


let homeName=

document.getElementById(
"homeTeam"
).value;



let awayName=

document.getElementById(
"awayTeam"
).value;



let h=teams[homeName];

let a=teams[awayName];



let homePower=

(h.attack+
h.defense+
h.xg*20)
*
h.homeStrength;



let awayPower=

(a.attack+
a.defense+
a.xg*20);



let difference=

homePower-awayPower;



let homeWin=

50+(difference/4);



if(homeWin>75)
homeWin=75;


if(homeWin<15)
homeWin=15;



let awayWin=

100-homeWin-20;



let draw=20;



let oddsBox=

document.getElementById(
"status"
);



oddsBox.innerHTML=

`

🏠 ${Math.round(homeWin)}%

&nbsp;

🤝 ${draw}%

&nbsp;

✈ ${Math.round(awayWin)}%

`;



}




// =================================
// TABELLE ERZEUGEN
// =================================



function createLeagueTable(){


let ranking=

Object.keys(teams)
.sort(
(a,b)=>

teams[b].points-
teams[a].points

);



return ranking.map(
(team,index)=>{


let t=teams[team];


return `

<tr>

<td>
${index+1}
</td>

<td>
${t.short} ${team}
</td>

<td>
${t.played}
</td>

<td>
${t.points}
</td>

<td>
${t.goals}
</td>


</tr>

`;


}
).join("");



}

// =================================
// MATCH SIMULATION SYSTEM
// =================================


let matchTimer=null;


let matchData={

home:"",
away:"",

homeGoals:0,
awayGoals:0,

homeShots:0,
awayShots:0,

homeCorners:0,
awayCorners:0,

homeXG:0,
awayXG:0,

homePossession:50,
awayPossession:50

};





function addTicker(text){


let box=document.getElementById(
"ticker"
);


let div=document.createElement(
"div"
);


div.className="event";


div.innerHTML=text;



box.prepend(div);


}






// =================================
// SPIEL START
// =================================



function startMatch(){



clearInterval(matchTimer);



let home=document.getElementById(
"homeTeam"
).value;


let away=document.getElementById(
"awayTeam"
).value;



matchData.home=home;

matchData.away=away;


matchData.homeGoals=0;

matchData.awayGoals=0;


matchData.homeShots=0;

matchData.awayShots=0;


matchData.homeCorners=0;

matchData.awayCorners=0;


matchData.homeXG=0;

matchData.awayXG=0;



matchMinute=0;


matchRunning=true;



document.getElementById(
"homeScore"
).innerHTML="0";


document.getElementById(
"awayScore"
).innerHTML="0";



document.getElementById(
"ticker"
).innerHTML="";



addTicker(

"00' ⚽ Spiel gestartet"

);



matchTimer=setInterval(
playMinute,
800
);



}







// =================================
// EINZELNE MINUTE
// =================================



function playMinute(){



matchMinute++;



document.getElementById(
"matchClock"
).innerHTML=

matchMinute+"'";





let home=teams[
matchData.home
];


let away=teams[
matchData.away
];




// Ballbesitz


let possession=

50+

(
(home.attack-away.attack)
/4
);



if(possession>65)
possession=65;


if(possession<35)
possession=35;



matchData.homePossession=
Math.round(possession);


matchData.awayPossession=
100-
matchData.homePossession;




document.getElementById(
"possession"
).innerHTML=

matchData.homePossession
+
" - "
+
matchData.awayPossession;





// Chance berechnen


let homeChance=

(home.xg/90)
*
(home.attack/100)
*
home.homeStrength;



let awayChance=

(away.xg/90)
*
(away.attack/100);





if(Math.random()<homeChance){


matchData.homeShots++;


let goal=Math.random()<0.32;



matchData.homeXG+=0.25;



if(goal){


matchData.homeGoals++;


scoreUpdate();


addTicker(

matchMinute+
"' ⚽ TOR "+
matchData.home+
"!"

);



}

else{


addTicker(

matchMinute+
"' Schuss "
+
matchData.home

);


}


}





if(Math.random()<awayChance){


matchData.awayShots++;


let goal=Math.random()<0.30;



matchData.awayXG+=0.22;



if(goal){


matchData.awayGoals++;


scoreUpdate();



addTicker(

matchMinute+
"' ⚽ TOR "+
matchData.away+
"!"

);



}

else{


addTicker(

matchMinute+
"' Schuss "
+
matchData.away

);


}


}






// Ecken


if(Math.random()<0.08){


matchData.homeCorners++;


addTicker(

matchMinute+
"' 🚩 Ecke "
+
matchData.home

);


}



if(Math.random()<0.08){


matchData.awayCorners++;


addTicker(

matchMinute+
"' 🚩 Ecke "
+
matchData.away

);


}





// Karten


if(Math.random()<0.04){


addTicker(

matchMinute+
"' 🟨 Gelbe Karte"

);


}





updateStats();





if(matchMinute>=90){


finishMatch();


}



}








// =================================
// ANZEIGE AKTUALISIEREN
// =================================


function scoreUpdate(){


document.getElementById(
"homeScore"
).innerHTML=

matchData.homeGoals;



document.getElementById(
"awayScore"
).innerHTML=

matchData.awayGoals;



}





function updateStats(){



document.getElementById(
"shots"
).innerHTML=

matchData.homeShots
+
" - "
+
matchData.awayShots;



document.getElementById(
"corners"
).innerHTML=

matchData.homeCorners
+
" - "
+
matchData.awayCorners;



document.getElementById(
"liveXG"
).innerHTML=

matchData.homeXG.toFixed(2)
+
" - "
+
matchData.awayXG.toFixed(2);



}






// =================================
// SPIELENDE
// =================================



function finishMatch(){


clearInterval(matchTimer);


matchRunning=false;



addTicker(

"90' 🏁 Abpfiff"

);



updateSeasonAfterMatch();


}




// =================================
// SAISON UPDATE
// =================================



function updateSeasonAfterMatch(){



let h=teams[
matchData.home
];


let a=teams[
matchData.away
];



h.played++;

a.played++;


h.goals+=matchData.homeGoals;

a.goals+=matchData.awayGoals;




if(matchData.homeGoals>
matchData.awayGoals){


h.points+=3;


}


else if(
matchData.awayGoals>
matchData.homeGoals
){


a.points+=3;


}

else{


h.points++;

a.points++;


}



saveTeams();



showMOTM();


}





// =================================
// MAN OF THE MATCH
// =================================



function showMOTM(){



let players=[


matchData.home+" Kapitän",

matchData.home+" Stürmer",

matchData.away+" Torwart",

matchData.away+" Spielmacher"


];



let motm=

players[
Math.floor(
Math.random()*players.length
)
];



addTicker(

"🏆 Man of the Match: "
+
motm

);



}




// =================================
// ENDE
// =================================


</script>
