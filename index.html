<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bundesliga Simulator PRO 2.0</title>


<style>


*{
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}


body{

margin:0;

background:
linear-gradient(
135deg,
#050505,
#111827
);

color:white;

min-height:100vh;

}



h1,h2{

text-align:center;

}


.container{

width:95%;

max-width:1400px;

margin:auto;

}



.box{

background:

rgba(255,255,255,0.06);

border:

1px solid rgba(255,255,255,0.12);

border-radius:25px;

padding:25px;

margin:20px 0;

box-shadow:

0 20px 50px rgba(0,0,0,.5);

backdrop-filter:

blur(15px);

}




.mainGrid{


display:grid;

grid-template-columns:

330px 1fr;

gap:25px;


}




.control input,
.control select{


width:100%;

padding:12px;

margin:8px 0;

border-radius:12px;

border:none;

background:#111;

color:white;


}




button{


background:#39df72;

color:black;

border:none;

padding:14px 25px;

border-radius:15px;

font-weight:bold;

cursor:pointer;

margin-top:10px;

}



button:hover{

transform:scale(1.03);

}




.matchDisplay{


text-align:center;

padding:40px;


}



.score{


font-size:70px;

font-weight:bold;

color:#39df72;


}



.teamName{


font-size:30px;

margin:20px;

}





.cards{


display:grid;

grid-template-columns:

repeat(6,1fr);

gap:18px;


}




.teamCard{


background:#080808;

border-radius:20px;

padding:18px;

text-align:center;

border:

1px solid #222;

transition:.3s;


}



.teamCard:hover{


transform:

translateY(-8px);


box-shadow:

0 15px 30px black;


}



.teamCard h3{

color:#39df72;

margin:5px;


}



.stat{


margin:8px 0;

font-size:14px;


}



.editBtn{


background:#222;

color:white;

width:100%;


}




.editor{


display:none;

position:fixed;

top:50%;

left:50%;

transform:

translate(-50%,-50%);

background:#080808;

border:

1px solid #39df72;

padding:30px;

border-radius:25px;

width:350px;

z-index:10;


}



.editor input{

width:100%;

padding:10px;

margin:6px 0;

background:#111;

border:none;

color:white;

border-radius:10px;


}



.overlay{


display:none;

position:fixed;

inset:0;

background:

rgba(0,0,0,.7);

z-index:5;


}



@media(max-width:900px){

.mainGrid{

grid-template-columns:1fr;

}


.cards{

grid-template-columns:

repeat(2,1fr);

}


}



</style>


</head>


<body>


<div class="container">



<h1>
⚽ Bundesliga Simulator PRO 2.0
</h1>



<section class="box mainGrid">


<div class="control">


<h2>
⚙ Einstellungen
</h2>


<label>
Heimteam
</label>

<select id="homeTeam"></select>



<label>
Gastteam
</label>

<select id="awayTeam"></select>



<label>
Spieltempo
</label>

<select id="tempo">

<option value="1">
Normal
</option>

<option value="2">
Schnell
</option>

<option value="4">
Turbo
</option>

</select>



<label>
Heimvorteil</label>

<input 
type="number"
id="homeAdv"
value="5"
>



<button onclick="simulateMatch()">

▶ SPIEL STARTEN

</button>



</div>




<div class="matchDisplay">


<h2>
🏟 Matchcenter
</h2>


<div id="displayHome"
class="teamName">
FCB
</div>


<div class="score"
id="score">

0 : 0

</div>



<div id="displayAway"
class="teamName">

BVB

</div>



<div id="probability">

Wahrscheinlichkeit

</div>



</div>


</section>





<section class="box">


<h2>
🏆 Mannschaftsdaten
</h2>



<div id="teamCards"
class="cards">


</div>


</section>





<div class="overlay" id="overlay"></div>



<div class="editor" id="editor">


<h2>
Team Editor
</h2>


<input id="editName"
placeholder="Vereinsname">


<input id="editShort"
placeholder="Kürzel">


<input id="editAttack"
placeholder="Angriff">


<input id="editDefense"
placeholder="Defensive">


<input id="editXG"
placeholder="xG">


<input id="editForm"
placeholder="Form">


<input id="editPoints"
placeholder="Punkte">


<button onclick="saveTeam()">

💾 Speichern

</button>


<button onclick="closeEditor()">

Schließen

</button>



</div>

let teams=

JSON.parse(
localStorage.getItem("bundesligaTeams")
)
||

  // ================================
// TEAM KARTEN SYSTEM
// ================================


function renderTeams(){


let box=document.getElementById(
"teamCards"
);


box.innerHTML="";


Object.keys(teams).forEach(team=>{


let t=teams[team];



box.innerHTML+=`

<div class="teamCard">


<h3>
${t.short}
</h3>


<b>
${team}
</b>



<div class="stat">
⚔ Angriff:
${t.attack}
</div>


<div class="stat">
🛡 Defensive:
${t.defense}
</div>


<div class="stat">
📈 xG:
${t.xg.toFixed(2)}
</div>


<div class="stat">
🔥 Form:
${t.form}
</div>


<div class="stat">
🏆 Punkte:
${t.points}
</div>



<button 
class="editBtn"
onclick="openEditor('${team}')">

✏ Bearbeiten

</button>


</div>

`;



});


}




// ================================
// DROPDOWN SYSTEM
// ================================


function loadDropdowns(){


let home=document.getElementById(
"homeTeam"
);


let away=document.getElementById(
"awayTeam"
);



home.innerHTML="";

away.innerHTML="";



Object.keys(teams).forEach(team=>{


home.innerHTML+=`

<option>
${team}
</option>

`;


away.innerHTML+=`

<option>
${team}
</option>

`;



});



home.selectedIndex=0;

away.selectedIndex=1;



updateMatchDisplay();


}




// ================================
// EDITOR ÖFFNEN
// ================================


function openEditor(team){


editTeam=team;


let t=teams[team];



document.getElementById(
"editName"
).value=team;


document.getElementById(
"editShort"
).value=t.short;


document.getElementById(
"editAttack"
).value=t.attack;


document.getElementById(
"editDefense"
).value=t.defense;


document.getElementById(
"editXG"
).value=t.xg;


document.getElementById(
"editForm"
).value=t.form;


document.getElementById(
"editPoints"
).value=t.points;




document.getElementById(
"editor"
).style.display="block";


document.getElementById(
"overlay"
).style.display="block";



}



// ================================
// TEAM SPEICHERN
// ================================


function saveTeam(){



let old=editTeam;



let newName=

document.getElementById(
"editName"
).value;



let data={


short:
document.getElementById(
"editShort"
).value,


attack:
Number(
document.getElementById(
"editAttack"
).value
),


defense:
Number(
document.getElementById(
"editDefense"
).value
),


xg:
Number(
document.getElementById(
"editXG"
).value
),


form:
document.getElementById(
"editForm"
).value,


points:
Number(
document.getElementById(
"editPoints"
).value
),


played:
teams[old].played,


goals:
teams[old].goals


};





delete teams[old];


teams[newName]=data;



localStorage.setItem(
"bundesligaTeams",
JSON.stringify(teams)
);



closeEditor();


renderTeams();

loadDropdowns();


}



// ================================
// EDITOR SCHLIESSEN
// ================================


function closeEditor(){


document.getElementById(
"editor"
).style.display="none";


document.getElementById(
"overlay"
).style.display="none";


}




// ================================
// MATCH DISPLAY
// ================================



function updateMatchDisplay(){


let home=
document.getElementById(
"homeTeam"
).value;


let away=
document.getElementById(
"awayTeam"
).value;



if(!home || !away)
return;



document.getElementById(
"displayHome"
).innerHTML=

teams[home].short;



document.getElementById(
"displayAway"
).innerHTML=

teams[away].short;



calculateProbability();


}




document.getElementById(
"homeTeam"
).addEventListener(
"change",
updateMatchDisplay
);



document.getElementById(
"awayTeam"
).addEventListener(
"change",
updateMatchDisplay
);




// ================================
// WAHRSCHEINLICHKEIT
// ================================



function calculateProbability(){


let home=
teams[
document.getElementById(
"homeTeam"
).value
];


let away=
teams[
document.getElementById(
"awayTeam"
).value
];



let strength=

home.attack+
home.defense+
home.xg*10
-

(
away.attack+
away.defense+
away.xg*10
);



let h=
50+
strength/5;



if(h>85)
h=85;


if(h<15)
h=15;



let a=

100-h-20;



if(a<5)
a=5;



let draw=

100-h-a;



document.getElementById(
"probability"
).innerHTML=

`

🏠 Heim:
${Math.round(h)}%

&nbsp;&nbsp;

🤝 Remis:
${Math.round(draw)}%

&nbsp;&nbsp;

✈ Gast:
${Math.round(a)}%

`;



}





// ================================
// SPIEL SIMULATION
// ================================


let currentMatch={

homeGoals:0,

awayGoals:0

};



function randomGoal(chance){


return Math.random()<chance;

}



function simulateMatch(){


let homeName=

document.getElementById(
"homeTeam"
).value;



let awayName=

document.getElementById(
"awayTeam"
).value;



let home=teams[homeName];

let away=teams[awayName];



let tempo=

Number(
document.getElementById(
"tempo"
).value
);



let homePower=

(home.attack+home.xg*20)/100;


let awayPower=

(away.attack+away.xg*20)/100;



let hg=0;

let ag=0;



for(let i=0;i<90*tempo;i++){



if(randomGoal(
homePower/1000
))

hg++;



if(randomGoal(
awayPower/1000
))

ag++;



}




currentMatch.homeGoals=hg;

currentMatch.awayGoals=ag;



document.getElementById(
"score"
).innerHTML=

hg+" : "+ag;



updateSeason(
homeName,
awayName,
hg,
ag
);



}




// ================================
// SAISON UPDATE
// ================================


function updateSeason(
home,
away,
hg,
ag
){



teams[home].played++;

teams[away].played++;


teams[home].goals+=hg;

teams[away].goals+=ag;



if(hg>ag){

teams[home].points+=3;

}


else if(ag>hg){

teams[away].points+=3;

}


else{


teams[home].points++;

teams[away].points++;


}



localStorage.setItem(
"bundesligaTeams",
JSON.stringify(teams)
);



renderTeams();



}

// ================================
// POST MATCH ANALYSE
// ================================


function postMatchAnalysis(){


let home=
document.getElementById(
"homeTeam"
).value;


let away=
document.getElementById(
"awayTeam"
).value;



let h=teams[home];

let a=teams[away];



let quality=
h.attack+
a.attack+
h.xg*10+
a.xg*10;



let text="";



if(quality<220){

text="Defensiv geprägt";

}

else if(quality<300){

text="Ausgeglichenes Spiel";

}

else{

text="Offensives Spektakel";

}



return text;


}





// ================================
// TABELLE
// ================================



function createTable(){


let table=Object.keys(teams)
.sort(
(a,b)=>

teams[b].points-
teams[a].points
);



let html=`


<table style="
width:100%;
border-collapse:collapse;
background:#080808;
">

<tr>

<th>
Platz
</th>

<th>
Team
</th>

<th>
Spiele
</th>

<th>
Punkte
</th>

<th>
Tore
</th>

</tr>


`;



table.forEach((team,index)=>{


let t=teams[team];



html+=`

<tr>

<td>
${index+1}
</td>


<td>
${t.short} ${team}
</td>


<td>
${t.played}
</td>


<td>
${t.points}
</td>


<td>
${t.goals}
</td>


</tr>

`;


});



html+=`

</table>

`;



return html;


}





// ================================
// HISTORIE
// ================================


let history=

JSON.parse(
localStorage.getItem(
"matchHistory"
)
)
||
[];





function saveHistory(
home,
away,
hg,
ag
){



history.unshift({


home:home,

away:away,

score:

hg+":"+ag,

date:

new Date()
.toLocaleDateString()



});



localStorage.setItem(
"matchHistory",
JSON.stringify(history)
);



}





function showHistory(){



let text="";



history.forEach(game=>{


text+=`

<div style="
padding:10px;
border-bottom:1px solid #333;
">

⚽

${game.home}

<b>
${game.score}
</b>

${game.away}

<br>

📅 ${game.date}

</div>


`;



});



return text ||
"Keine Spiele vorhanden";

}




// ================================
// ANALYSE BEREICH EINBLENDEN
// ================================



function showAnalysis(){


let box=document.getElementById(
"analysisArea"
);



if(!box)
return;



box.innerHTML=`

<h2>
🏁 Post Match Analyse
</h2>


<div class="teamCard">


<h3>
Spielqualität
</h3>


<p>
${postMatchAnalysis()}
</p>


</div>



<div class="teamCard">


<h3>
xG Bewertung
</h3>


<p>

${teams[
document.getElementById(
"homeTeam"
).value
].xg.toFixed(2)}

:

${teams[
document.getElementById(
"awayTeam"
).value
].xg.toFixed(2)}

</p>


</div>


`;



}





// ================================
// SIMULATION ERWEITERUNG
// ================================


let oldSimulation=

simulateMatch;



simulateMatch=function(){


oldSimulation();



let home=

document.getElementById(
"homeTeam"
).value;


let away=

document.getElementById(
"awayTeam"
).value;



saveHistory(
home,
away,
currentMatch.homeGoals,
currentMatch.awayGoals
);



showAnalysis();



};





// ================================
// START
// ================================


window.onload=function(){


renderTeams();


loadDropdowns();


createTable();


};





</script>
