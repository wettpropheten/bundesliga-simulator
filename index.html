<style>


*{
box-sizing:border-box;

body{

margin:0;

padding:20px;

background:

linear-gradient(
135deg,
#07111f,
#0b6b35

.container{

margin:auto;

h1{

0 5px 20px black;

.layout{

display:grid;

gap:25px;

}



.glass{

background:

border:

padding:25px;

input,

margin-top:5px;

border-radius:10px;

}



button{

width:100%;

padding:15px;

margin-top:12px;

border:none;

border-radius:12px;

font-size:16px;

font-weight:bold;

cursor:pointer;

}



button:hover{

.pause{

}



.reset{

.matchcenter{

text-align:center;

}



.teams{

justify-content:center;

.team img{

height:100px;

filter:

drop-shadow(
0 10px 10px black

}



.score{

.clock{

/* LIVETICKER */


.ticker{


height:500px;


overflow:auto;


background:

rgba(0,0,0,.8);


border-radius:20px;


padding:20px;


margin-top:30px;


}



.eventRow{


display:grid;


grid-template-columns:

1fr 80px 2fr;



padding:12px;



border-bottom:

1px solid rgba(255,255,255,.15);



font-size:18px;



}



.eventTeam{


font-weight:bold;

}



.eventMinute{


text-align:center;

color:#00ff66;

font-weight:bold;

}



.eventText{


text-align:left;

}




.cards{


margin-top:30px;


display:grid;


grid-template-columns:

repeat(3,1fr);


gap:20px;


}




.teamCard{


background:

rgba(0,0,0,.35);


padding:20px;


border-radius:20px;


}





@media(max-width:900px){

.layout{

grid-template-columns:1fr;

}

.cards{

grid-template-columns:1fr;

}


}



</style>

// ==================================
// MATCH SIMULATION ENGINE
// ==================================


let timer=null;

let minute=0;

let homeScore=0;

let awayScore=0;

let paused=false;




// ================================
// TEAM AUSWAHL
// ================================


function getHomeTeam(){

return teams[homeSelect.value];

}



function getAwayTeam(){

return teams[awaySelect.value];

}





// ================================
// FORM BERECHNUNG
// ================================


function calculateForm(form){


if(!form)
return 0;


let wert=0;


for(let x of form){


if(x==="S")
wert+=3;


if(x==="U")
wert+=1;


if(x==="N")
wert-=1;


}


return wert;


}





// ================================
// SPIELSTÄRKE AUS DATEN
// ================================


function calculatePower(team,isHome){


let power=

(team.xg*30)

+

calculateForm(team.form)

+

calculateForm(
isHome ?
team.homeForm:
team.awayForm
);



return power;


}





// ================================
// LIVETICKER

function addEvent(team,text){



let box=document.getElementById("ticker");



let row=document.createElement("div");


row.className="eventRow";



row.innerHTML=`

<div class="eventTeam">

${team}

</div>


<div class="eventMinute">

${minute}'

</div>


<div class="eventText">

${text}

</div>

`;



box.appendChild(row);


box.scrollTop=
box.scrollHeight;



}





// ================================
// TOR
// ================================


function goal(team){


if(team==="home"){


homeScore++;


addEvent(

homeSelect.value,

"⚽ TOR"

);


}


else{


awayScore++;


addEvent(

awaySelect.value,

"⚽ TOR"

);


}



document.getElementById("homeGoals")
.innerHTML=homeScore;


document.getElementById("awayGoals")
.innerHTML=awayScore;



}





// ================================
// MINUTE SIMULATION
// ================================


function simulateMinute(){


if(paused)
return;



minute++;



document.getElementById("minute")
.innerHTML=
minute;



let home=getHomeTeam();

let away=getAwayTeam();




let homePower=
calculatePower(home,true);


let awayPower=
calculatePower(away,false);



let total=
homePower+awayPower;



let homeChance=
(homePower/total)*0.12;



let awayChance=
(awayPower/total)*0.12;




// normale Ereignisse


let event=Math.random();



if(event<0.20){


addEvent(

homeSelect.value,

"Angriff über außen"

);


}


else if(event<0.35){


addEvent(

awaySelect.value,

"Ballgewinn und Konter"

);


}


else if(event<0.45){


addEvent(

"",

"Schuss aufs Tor"

);


}






// Tore


if(Math.random()<homeChance){


goal("home");


}



if(Math.random()<awayChance){


goal("away");


}





// Halbzeit


if(minute===45){


addEvent(

"",

"⏱ HALBZEIT"

);


}






// Ende


if(minute>=90){



clearInterval(timer);


timer=null;


addEvent(

"",

"🏁 ABPFIFF"

);



}


}

// START
// ================================

if(timer)
return;



paused=false;



addEvent(

"",

timer=setInterval(

<script>

// ======================================
// ERWEITERTE MATCH BERECHNUNG
// ======================================


function calculateResult(){


let home=getHomeTeam();

let away=getAwayTeam();



// eingegebene Wahrscheinlichkeiten


let homeWin=
Number(home.win);


let awayWin=
Number(away.win);


let draw=
100-homeWin-awayWin;



let zufall=Math.random()*100;



let winner;



if(zufall < homeWin){

winner="home";

}

else if(
zufall < homeWin+draw
){

winner="draw";

}

else{

winner="away";

}



return winner;


}




// ======================================
// TORTENDENZ
// ======================================


function calculateGoals(){



let low=
Number(
document.getElementById("lowGoals").value
);


let middle=
Number(
document.getElementById("midGoals").value
);


let high=
Number(
document.getElementById("highGoals").value
);



let r=Math.random()*100;



if(r<low){


return Math.floor(
Math.random()*2
);



}



if(r<low+middle){



return 2+
Math.floor(
Math.random()*2
);



}



return 4+
Math.floor(
Math.random()*3
);



}





// ======================================
// ENDERGEBNIS
// ======================================


function finishAnalysis(){



let home=getHomeTeam();

let away=getAwayTeam();



let totalGoals=
homeScore+awayScore;



let homeShots=
Math.floor(
home.xg*5+
Math.random()*8
);



let awayShots=
Math.floor(
away.xg*5+
Math.random()*8
);




let rating;



if(totalGoals>=4){

rating="★★★★★";

}

else if(totalGoals>=2){

rating="★★★★☆";

}

else{

rating="★★★☆☆";

}




let box=document.getElementById("ticker");



box.innerHTML += `


<br>

===========================

<br>

🏆 MATCHANALYSE

<br><br>


ERGEBNIS:

<br>

<b>
${home.name}
${homeScore}

:

${awayScore}
${away.name}
</b>

<br><br>


Expected Goals:

<br>

${home.xg.toFixed(2)}

:

${away.xg.toFixed(2)}


<br><br>


Torschüsse:

<br>

${homeShots}

:

${awayShots}



<br><br>


Spielqualität:

<br>

${rating}


<br>

===========================


`;



}




// ======================================
// SIMULATION ÜBERSCHREIBEN
// ======================================


let alteMinute=simulateMinute;



simulateMinute=function(){


alteMinute();



if(minute>=90){


setTimeout(()=>{


finishAnalysis();


},500);


}



};
