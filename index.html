<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fussball Match Simulator</title>
    <style>
        /* Globale Stile & Layout-Rettung */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            height: 100vh;
            overflow: hidden;
            box-sizing: border-box;
        }

        *, *:before, *:after {
            box-sizing: inherit;
        }

        /* Die Haupt-Zwei-Spalten-Struktur */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* LINKE SPALTE: Komplett isoliert */
        .sidebar-left {
            width: 340px;
            min-width: 340px;
            background-color: #1e293b;
            border-right: 2px solid #334155;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            height: 100%;
        }

        /* RECHTER BEREICH: Nimmt den restlichen Platz ein */
        .main-content {
            flex: 1;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            overflow-y: auto;
        }

        /* Boxen in der linken Sidebar */
        .control-box {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .control-box h3 {
            margin: 0 0 12px 0;
            font-size: 14px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #38bdf8;
            border-bottom: 1px solid #334155;
            padding-bottom: 6px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 10px;
        }

        .form-group label {
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .form-group input, .form-group select {
            padding: 8px 12px;
            border: 1px solid #475569;
            border-radius: 6px;
            font-size: 14px;
            background-color: #1e293b;
            color: #f8fafc;
            outline: none;
            width: 100%;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #38bdf8;
        }

        /* Kompaktes 2-Spalten-Raster für die Mannschaftsdaten-Eingabe */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .form-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
            border-bottom: 1px dashed #334155;
        }

        .prob-val {
            font-weight: bold;
            color: #38bdf8;
        }

        .divider {
            border: 0;
            border-top: 1px solid #334155;
            margin: 12px 0;
        }

        .btn-save {
            width: 100%;
            padding: 12px;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-save:hover {
            background-color: #059669;
        }

        /* Elemente der rechten Seite (Anzeigetafel & Ticker) */
        .scoreboard {
            background-color: #1e293b;
            border: 2px solid #334155;
            border-radius: 12px;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .score-team {
            font-size: 24px;
            font-weight: bold;
            min-width: 140px;
            text-align: center;
        }

        .score-display {
            font-size: 48px;
            font-family: monospace;
            font-weight: bold;
            background: #0f172a;
            padding: 5px 20px;
            border-radius: 8px;
            border: 1px solid #475569;
            color: #e2e8f0;
        }

        .simulation-controls {
            margin-bottom: 30px;
        }

        .btn-sim {
            padding: 12px 40px;
            font-size: 16px;
            font-weight: bold;
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-sim:hover {
            background-color: #0ea5e9;
        }

        .match-details {
            width: 100%;
            max-width: 600px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            min-height: 100px;
            max-height: 200px;
            overflow-y: auto;
        }

        .ticker-entry {
            font-size: 14px;
            padding: 6px 0;
            border-bottom: 1px solid #334155;
            color: #cbd5e1;
        }
        .ticker-entry:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- ==================== LINKE SEITE ==================== -->
        <div class="sidebar-left">
            
            <!-- Heim-Auswahl -->
            <div class="control-box">
                <h3>Heim</h3>
                <div class="form-group">
                    <label for="select-heim">Mannschaft:</label>
                    <select id="select-heim" onchange="updateMatchDisplay()"></select>
                </div>
            </div>

            <!-- Gast-Auswahl -->
            <div class="control-box">
                <h3>Gast</h3>
                <div class="form-group">
                    <label for="select-gast">Mannschaft:</label>
                    <select id="select-gast" onchange="updateMatchDisplay()"></select>
                </div>
            </div>

            <!-- Wahrscheinlichkeits-Anzeige -->
            <div class="control-box">
                <h3>Wahrscheinlichkeit</h3>
                <div class="form-row">
                    <span>Heimsieg:</span>
                    <span id="prob-heim" class="prob-val">0%</span>
                </div>
                <div class="form-row">
                    <span>Remis:</span>
                    <span id="prob-remis" class="prob-val">0%</span>
                </div>
                <div class="form-row">
                    <span>Gastspiel:</span>
                    <span id="prob-gast" class="prob-val">0%</span>
                </div>
            </div>

            <!-- Mannschaftsdaten-Formular -->
            <div class="control-box">
                <h3>Mannschaftsdaten</h3>
                
                <div class="form-group">
                    <label for="manage-team-select">Team wählen & pflegen:</label>
                    <select id="manage-team-select" onchange="loadTeamDataToForm()"></select>
                </div>

                <hr class="divider">

                <div class="form-grid">
                    <div class="form-group">
                        <label for="team-strength">Stärke (1-99):</label>
                        <input type="number" id="team-strength" min="1" max="99" value="80">
                    </div>

                    <div class="form-group">
                        <label for="team-home-bonus">Heimbonus (0-5):</label>
                        <input type="number" id="team-home-bonus" min="0" max="5" value="3">
                    </div>

                    <div class="form-group">
                        <label for="team-form">Form (5er):</label>
                        <input type="text" id="team-form" maxlength="5" placeholder="SSUSS" style="text-transform: uppercase;">
                    </div>

                    <div class="form-group">
                        <label for="team-stadium">Stadion:</label>
                        <input type="text" id="team-stadium" placeholder="Stadionname">
                    </div>

                    <div class="form-group">
                        <label for="team-capacity">Zuschauer:</label>
                        <input type="number" id="team-capacity" min="0" placeholder="75000">
                    </div>

                    <div class="form-group">
                        <label for="team-weather">Wetter:</label>
                        <select id="team-weather">
                            <option value="Sonne">☀ Sonne</option>
                            <option value="Bewölkt">☁ Bewölkt</option>
                            <option value="Regen">🌧 Regen</option>
                            <option value="Schnee">❄ Schnee</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="team-attack">Torfaktor:</label>
                        <input type="number" id="team-attack" step="0.01" min="0.5" max="2.0" value="1.00">
                    </div>

                    <div class="form-group">
                        <label for="team-defense">Defensiv:</label>
