<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bundesliga Sport Simulator</title>

<style>

body {
    background:#8b1111;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:30px;
}

.main {
    display:flex;
    justify-content:center;
    gap:50px;
    flex-wrap:wrap;
}

.box {
    background:#1a0a0a;
    padding:20px;
    border-radius:10px;
    width:380px;
    box-shadow:0 5px 15px black;
}

.row {
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

label {
    display:block;
    font-size:12px;
    color:#aaa;
    margin-bottom:5px;
}

input {
    background:#2b1b1b;
    color:white;
    border:1px solid #555;
    padding:8px;
    width:90px;
}

input[type="color"] {
    width:45px;
    height:35px;
    padding:0;
}

button {
    width:100%;
    padding:12px;
    margin-top:15px;
    font-weight:bold;
    cursor:pointer;
}

.update {
    background:none;
    color:#ff4444;
    border:1px solid #ff4444;
}

.start {
    background:#168044;
    color:white;
    border:none;
    width:200px;
    font-size:20px;
}

.start:disabled {
    background:#555;
}

.scoreboard {
    background:#222;
    border:3px solid #444;
    width:520px;
}

.teams {
    display:flex;
    height:130px;
}

.team {
    width:180px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:45px;
    font-weight:bold;
}

.middle {
    flex:1;
    display:flex;
    flex-direction:column;
}

.score {
    height:70px;
    background:white;
    color:black;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    font-weight:bold;
}

.time {
    flex:1;
    background:#ccc;
    color:black;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
}

.percent {
    display:flex;
    background:#111;
    padding:10px;
}

.percent div {
    flex:1;
    text-align:center;
}

.small {
    font-size:11px;
    color:#888;
}

.wheel-container {
    position: relative;
    width: 320px;
    height: 320px;
    border: 6px solid #b8860b;
    border-radius: 50%;
    background: #111;
    box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    margin-top: 30px;
}

.wheel-pointer {
    position: absolute;
    top: -15px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-top: 25px solid #ffcc00; 
    z-index: 10;
}

#wheel-canvas {
    border-radius: 50%;
}

</style>

</head>


<body>


<div class="main">


<div>


<div class="box">


<div class="row">

<div>
<label>Heim</label>
<input id="homeName" value="FCB" maxlength="8">
</div>

<div>
<label>Sieg %</label>
<input id="homePct" type="number" value="67" min="0" max="100">
</div>

<div>
<label>Farbe</label>
<input id="homeColor" type="color" value="#64b931">
</div>

</div>



<div class="row">

<div>
<label>Remis</label>
<input disabled value="Unentschieden">
</div>

<div>
<label>Remis %</label>
<input id="drawPct" type="number" value="13" min="0" max="100">
</div>

</div>



<div class="row">

<div>
<label>Gast</label>
<input id="awayName" value="SGE" maxlength="8">
</div>

<div>
<label>Sieg %</label>
<input id="awayPct" type="number" value="20" min="0" max="100">
</div>

<div>
<label>Farbe</label>
<input id="awayColor" type="color" value="#ff3333">
</div>

</div>


<button class="update" onclick="updateBoard()">
Aktualisieren
</button>


</div>



<button id="start" class="start" onclick="startGame()">
START
</button>


</div>





<div class="right-column" style="display: flex; flex-direction: column; align-items: center;">
    
    <div class="scoreboard">


    <div class="teams">


    <div id="homeView" class="team" style="background:#64b931">
    FCB
    </div>


    <div class="middle">

    <div id="score" class="score">
    ?:?
    </div>


    <div id="time" class="time">
    0'
    </div>


    </div>



    <div id="awayView" class="team" style="background:#ff3333">
    SGE
    </div>


    </div>



    <div class="percent">


    <div>
    <span class="small">Heim</span>
    <br>
    <span id="hp">67%</span>
    </div>


    <div>
    <span class="small">Remis</span>
    <br>
    <span id="dp">13%</span>
    </div>


    <div>
    <span class="small">Gast</span>
    <br>
    <span id="ap">20%</span>
    </div>


    </div>


    </div>

    <div class="wheel-container">
        <div class="wheel-pointer"></div>
        <canvas id="wheel-canvas" width="308" height="308"></canvas>
    </div>

</div>



</div>
<script>

let running = false;
let currentAngle = 0;
let wheelSectors = [];

document.addEventListener("DOMContentLoaded", function() {
    updateBoard();
});

function updateBoard(){

    if(running) return;

    let home = document.getElementById("homeName").value;
    let away = document.getElementById("awayName").value;

    let hp = Number(document.getElementById("homePct").value);
    let dp = Number(document.getElementById("drawPct").value);
    let ap = Number(document.getElementById("awayPct").value);

    if(hp + dp + ap !== 100){
        alert("Die Wahrscheinlichkeiten müssen zusammen 100% ergeben!");
        return;
    }

    document.getElementById("homeView").textContent = home;
    document.getElementById("awayView").textContent = away;

    document.getElementById("hp").textContent = hp + "%";
    document.getElementById("dp").textContent = dp + "%";
    document.getElementById("ap").textContent = ap + "%";

    let homeColor = document.getElementById("homeColor").value;
    let awayColor = document.getElementById("awayColor").value;
    let drawColor = "#444444"; 

    document.getElementById("homeView").style.background = homeColor;
    document.getElementById("awayView").style.background = awayColor;

    wheelSectors = [];
    for (let i = 0; i < hp; i++) wheelSectors.push({ color: homeColor });
    for (let i = 0; i < dp; i++) wheelSectors.push({ color: drawColor });
    for (let i = 0; i < ap; i++) wheelSectors.push({ color: awayColor });

    drawWheel(currentAngle);
}

function drawWheel(angleOffset) {
    const canvas = document.getElementById('wheel-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const radius = canvas.width / 2;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const sliceAngle = (2 * Math.PI) / 100;
    let startAngle = angleOffset;

    wheelSectors.forEach((sector) => {
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, startAngle, startAngle + sliceAngle);
        ctx.closePath();
        ctx.fillStyle = sector.color;
        ctx.fill();
        
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
        ctx.lineWidth = 0.5;
        ctx.stroke();

        startAngle += sliceAngle;
    });

    ctx.beginPath();
    ctx.arc(cx, cy, 8, 0, 2 * Math.PI);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
}

function randomGoals(){
    let goals = 0;
    for(let i=0;i<6;i++){
        if(Math.random() < 0.25){
            goals++;
        }
    }
    return goals;
}

function createResult(){
    let hp = Number(document.getElementById("homePct").value);
    let dp = Number(document.getElementById("drawPct").value);
    let ap = Number(document.getElementById("awayPct").value);

    let chance = Math.random()*100;
    let homeGoals;
    let awayGoals;

    if(chance < hp){
        homeGoals = randomGoals();
        awayGoals = randomGoals();
        if(homeGoals <= awayGoals){
            homeGoals = awayGoals + 1;
        }
    }
    else if(chance < hp + dp){
        let goals = randomGoals();
        homeGoals = goals;
        awayGoals = goals;
    }
    else{
        homeGoals = randomGoals();
        awayGoals = randomGoals();
        if(awayGoals <= homeGoals){
            awayGoals = homeGoals + 1;
        }
    }

    return { home: homeGoals, away: awayGoals };
}

function startGame(){
    if(running) return;
    running=true;

    let button=document.getElementById("start");
    let time=document.getElementById("time");
    let score=document.getElementById("score");

    button.disabled=true;
    score.textContent="0:0";

    let final=createResult();
    
    // --- OPTIMIERT: Tore werden vorab fest auf echte Minuten verteilt ---
    let homeGoalMinutes = [];
    let awayGoalMinutes = [];
    
    for(let i = 0; i < final.home; i++) {
        homeGoalMinutes.push(Math.floor(Math.random() * 88) + 1);
    }
    for(let i = 0; i < final.away; i++) {
        awayGoalMinutes.push(Math.floor(Math.random() * 88) + 1);
    }

    const duration = 10000; // Genau 10 Sekunden
    const startTime = performance.now();
    const startAngle = currentAngle;
    const totalRotation = (Math.random() * 4 + 8) * 2 * Math.PI; 

    // --- OPTIMIERT: Intervall auf 16ms (60 FPS) für maximale Flüssigkeit ---
    let timer = setInterval(function(){
        const elapsed = performance.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);

        // Rad drehen (Flüssiges Ease-Out)
        const easeOut = 1 - Math.pow(1 - progress, 3);
        currentAngle = startAngle + totalRotation * easeOut;
        drawWheel(currentAngle);

        // Minuten-Zeitraffer absolut flüssig hochzählen
        let minute = Math.floor(progress * 90);
        time.textContent = minute + "'";

        // Live-Tore basierend auf der aktuellen Minute direkt anzeigen
        let currentHomeScore = homeGoalMinutes.filter(m => m <= minute).length;
        let currentAwayScore = awayGoalMinutes.filter(m => m <= minute).length;
        score.textContent = currentHomeScore + ":" + currentAwayScore;

        if(progress >= 1 || minute >= 90){
            clearInterval(timer);

            score.textContent = final.home + ":" + final.away;
            time.textContent="90'";
