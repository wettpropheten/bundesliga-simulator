<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bundesliga Simulator</title>

<style>

body{
    background:#8b1111;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:30px;
}


.main{
    display:flex;
    justify-content:center;
    gap:50px;
    flex-wrap:wrap;
}


.box{
    background:#1a0a0a;
    padding:20px;
    width:300px;
    border-radius:10px;
    box-shadow:0 5px 15px black;
}


label{
    display:block;
    color:#aaa;
    font-size:12px;
    margin-bottom:5px;
}


select,input{
    background:#222;
    color:white;
    border:1px solid #555;
    padding:8px;
    width:100px;
    box-sizing: border-box; /*
}


.row{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}


button{
    width:100%;
    padding:12px;
    margin-top:12px;
    font-weight:bold;
    cursor:pointer;
}


.start{
    width:200px;
    background:#168044;
    color:white;
    border:none;
    font-size:22px;
}


.start:disabled{
    background:#555;
}


.update{
    background:#333;
    color:white;
    border:1px solid #777;
}


.reset{
    background:#700000;
    color:white;
    border:none;
}



.scoreboard{
    width:600px;
    background:#222;
    border:3px solid #444;
}


.teams{
    display:flex;
    height:130px;
}


.team{
    width:200px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:45px;
    font-weight:bold;
}



.middle{
    flex:1;
}


.score{
    height:70px;
    background:white;
    color:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:42px;
    font-weight:bold;
}


.time{
    height:60px;
    background:#ccc;
    color:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
}



.percent{
    display:flex;
    background:#111;
    padding:15px;
}


.percent div{
    flex:1;
    text-align:center;
}



.status{
    background:#111;
    text-align:center;
    padding:12px;
    font-size:22px;
    font-weight:bold;
}



.ticker{
    display:flex;
    background:#050505;
    min-height:150px;
    padding:15px;
}



.homeTicker{
    width:50%;
    text-align:left;
}


.awayTicker{
    width:50%;
    text-align:right;
}


.goal{
    color:#00ff66;
    font-weight:bold;
    font-size:18px;
}


</style>

</head>


<body>


<div class="main">


<div>


<div class="box">


<h3>Heim</h3>


<div class="row">

<div>

<label>Mannschaft</label>

<select id="homeTeam">

<option value="FCB">FCB</option>
<option value="BVB">BVB</option>
<option value="RBL">RBL</option>
<option value="VFB">VFB</option>
<option value="TSG">TSG</option>
<option value="B04">B04</option>
<option value="SCF">SCF</option>
<option value="SGE">SGE</option>
<option value="FCA">FCA</option>
<option value="M05">M05</option>
<option value="FCU">FCU</option>
<option value="BMG">BMG</option>
<option value="HSV">HSV</option>
<option value="KOE">KOE</option>
<option value="SVW">SVW</option>
<option value="S04">S04</option>
<option value="ELV">ELV</option>
<option value="SCP">SCP</option>

</select>

</div>


</div>





<h3>Gast</h3>


<div class="row">


<div>

<label>Mannschaft</label>


<select id="awayTeam">

<option value="BVB">BVB</option>
<option value="FCB">FCB</option>
<option value="RBL">RBL</option>
<option value="VFB">VFB</option>
<option value="TSG">TSG</option>
<option value="B04">B04</option>
<option value="SCF">SCF</option>
<option value="SGE">SGE</option>
<option value="FCA">FCA</option>
<option value="M05">M05</option>
<option value="FCU">FCU</option>
<option value="BMG">BMG</option>
<option value="HSV">HSV</option>
<option value="KOE">KOE</option>
<option value="SVW">SVW</option>
<option value="S04">S04</option>
<option value="ELV">ELV</option>
<option value="SCP">SCP</option>

</select>


</div>


</div>





<h3>Wahrscheinlichkeit</h3>


<div class="row">

<div>

<label>Heimsieg %</label>

<input id="homePct" value="50">

</div>


<div>

<label>Remis %</label>

<input id="drawPct" value="25">

</div>


<div>

<label>Gast %</label>

<input id="awayPct" value="25">

</div>


</div>



<button class="update" onclick="updateBoard()">

Aktualisieren

</button>



<button class="reset" onclick="resetGame()">

RESET

</button>


</div>



<button id="start" class="start" onclick="startGame()">

START

</button>


</div>
<div class="scoreboard">


<div class="teams">


<div id="homeView" class="team"></div>


<div class="middle">


<div id="score" class="score">
</div>


<div id="time" class="time">
</div>


</div>


<div id="awayView" class="team"></div>


</div>



<div class="percent">


<div>
Heim<br>
<span id="hp"></span>
</div>


<div>
Remis<br>
<span id="dp"></span>
</div>


<div>
Gast<br>
<span id="ap"></span>
</div>


</div>



<div id="status" class="status">
</div>



<div class="ticker">


<div id="homeTicker" class="homeTicker"></div>


<div id="awayTicker" class="awayTicker"></div>


</div>


</div>


</div>





<script>


let running=false;



const teams={


FCB:{
name:"FC Bayern München",
color:"#DC052D",
text:"#FFFFFF",
strength:92
},


BVB:{
name:"Borussia Dortmund",
color:"#FDE100",
text:"#000000",
strength:86
},


RBL:{
name:"RB Leipzig",
color:"#FFFFFF",
text:"#000000",
strength:84
},


VFB:{
name:"VfB Stuttgart",
color:"#FFFFFF",
text:"#000000",
strength:82
},


TSG:{
name:"TSG Hoffenheim",
color:"#0066CC",
text:"#000000",
strength:76
},


B04:{
name:"Bayer 04 Leverkusen",
color:"#E32221",
text:"#FFFFFF",
strength:90
},


SCF:{
name:"SC Freiburg",
color:"#E30613",
text:"#FFFFFF",
strength:78
},


SGE:{
name:"Eintracht Frankfurt",
color:"#000000",
text:"#FFFFFF",
strength:80
},


FCA:{
name:"FC Augsburg",
color:"#8B0000",
text:"#FFFFFF",
strength:72
},


M05:{
name:"1. FSV Mainz 05",
color:"#E30613",
text:"#FFFFFF",
strength:74
},


FCU:{
name:"1. FC Union Berlin",
color:"#E30613",
text:"#FFFFFF",
strength:74
},


BMG:{
name:"Borussia Mönchengladbach",
color:"#000000",
text:"#FFFFFF",
strength:75
},


HSV:{
name:"Hamburger SV",
color:"#005CA9",
text:"#FFFFFF",
strength:73
},


KOE:{
name:"1. FC Köln",
color:"#E30613",
text:"#FFFFFF",
strength:70
},


SVW:{
name:"SV Werder Bremen",
color:"#008000",
text:"#FFFFFF",
strength:75
},


S04:{
name:"FC Schalke 04",
color:"#005CA9",
text:"#FFFFFF",
strength:72
},


ELV:{
name:"SV Elversberg",
color:"#D4AF37",
text:"#000000",
strength:68
},


SCP:{
name:"SC Paderborn 07",
color:"#005CA9",
text:"#FFFFFF",
strength:68
}


};







function updateBoard(){


let home=
document.getElementById("homeTeam").value;


let away=
document.getElementById("awayTeam").value;



let h=teams[home];

let a=teams[away];



let homeView=document.getElementById("homeView");

let awayView=document.getElementById("awayView");



homeView.innerHTML=home;

awayView.innerHTML=away;



homeView.style.background=h.color;

homeView.style.color=h.text;



awayView.style.background=a.color;

awayView.style.color=a.text;



document.getElementById("hp").innerHTML=
document.getElementById("homePct").value+"%";


document.getElementById("dp").innerHTML=
document.getElementById("drawPct").value+"%";


document.getElementById("ap").innerHTML=
document.getElementById("awayPct").value+"%";


}








function resetGame(){


running=false;



document.getElementById("homeView").innerHTML="";

document.getElementById("awayView").innerHTML="";


document.getElementById("homeView").style.background="#555";

document.getElementById("awayView").style.background="#555";


document.getElementById("score").innerHTML="";

document.getElementById("time").innerHTML="";

document.getElementById("status").innerHTML="";


document.getElementById("homeTicker").innerHTML="";

document.getElementById("awayTicker").innerHTML="";


document.getElementById("hp").innerHTML="";

document.getElementById("dp").innerHTML="";

document.getElementById("ap").innerHTML="";


document.getElementById("start").disabled=false;


}







function poisson(lambda){


let L=Math.exp(-lambda);

let p=1;

let k=0;


do{

k++;

p*=Math.random();

}
while(p>L);



return k-1;

}







function createResult(){


let home=
teams[document.getElementById("homeTeam").value];


let away=
teams[document.getElementById("awayTeam").value];



let homeXg=
(home.strength+7)/45;


let awayXg=
away.strength/55;



let hs=poisson(homeXg);

let as=poisson(awayXg);





return{

home:Math.min(hs,6),

away:Math.min(as,6)

};


}







function startGame(){



if(running)return;


running=true;



let button=document.getElementById("start");

button.disabled=true;



let score=document.getElementById("score");

let time=document.getElementById("time");

let status=document.getElementById("status");


let homeTicker=document.getElementById("homeTicker");

let awayTicker=document.getElementById("awayTicker");



score.innerHTML="0:0";

time.innerHTML="0'";

status.innerHTML="⚽ ANPFIFF";



let result=createResult();



let goals=[];



for(let i=0;i<result.home;i++){

goals.push({
team:"home",
minute:Math.floor(Math.random()*90)+1
});

}



for(let i=0;i<result.away;i++){

goals.push({
team:"away",
minute:Math.floor(Math.random()*90)+1
});

}



goals.sort((a,b)=>a.minute-b.minute);



let minute=0;

let hs=0;

let as=0;




let timer=setInterval(()=>{


minute++;


time.innerHTML=minute+"'";



if(minute==45)
status.innerHTML="⏸ HALBZEIT";


if(minute==46)
status.innerHTML="▶ 2. HALBZEIT";




goals.forEach(g=>{


if(g.minute==minute){


if(g.team=="home"){


hs++;


homeTicker.innerHTML+=
"<div class='goal'>"+
minute+
"' ⚽ "+
document.getElementById("homeTeam").value+
"</div>";


}

else{


as++;


awayTicker.innerHTML+=
"<div class='goal'>"+
minute+
"' ⚽ "+
document.getElementById("awayTeam").value+
"</div>";


}



score.innerHTML=hs+":"+as;


}



});




if(minute>=90){


clearInterval(timer);



score.innerHTML=result.home+":"+result.away;

time.innerHTML="90+3'";

status.innerHTML="🏁 ENDE";


running=false;

button.disabled=false;


}



},160);


}






updateBoard();


</script>


</body>
</html>
