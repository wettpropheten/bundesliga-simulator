<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matchboard Schritt 2</title>
    <style>
        body {
            background-color: #8b1111; /* Roter Hintergrund */
            color: white;
            font-family: Arial, sans-serif;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px; /* Abstand zwischen Tafel und Button */
        }

        /* Die Anzeigetafel */
        .scoreboard {
            width: 100%;
            max-width: 500px;
            background-color: #222;
            border: 3px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .team-row {
            display: flex;
            height: 120px;
        }
        .team-box {
            width: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            font-weight: 900;
            background-color: #64b931; /* Grünes Startfeld */
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .score-container {
            flex: 1;
            background-color: #2a2a2a;
            display: flex;
            flex-direction: column;
            border-left: 2px solid #1a1a1a;
            border-right: 2px solid #1a1a1a;
        }
        .score-box {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 100%);
            color: black;
            border-bottom: 2px solid #666;
        }
        .time-box {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            background-color: #cccccc;
            color: black;
        }
        .pct-row {
            display: flex;
            background-color: #151515;
            padding: 10px 0;
            border-top: 2px solid #2a2a2a;
        }
        .pct-box {
            flex: 1;
            text-align: center;
        }
        .pct-box span {
            display: block;
            font-size: 10px;
            color: #777;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .pct-box div {
            font-size: 16px;
            font-weight: bold;
        }

        /* Der neue Start-Button */
        .btn-start {
            background-color: #1e7e4e;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            width: 180px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-start:hover {
            background-color: #155a37;
        }
        .btn-start:disabled {
            background-color: #444;
            color: #aaa;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <!-- Die Tafel -->
    <div class="scoreboard">
        <div class="team-row">
            <div class="team-box" id="view-name1">BVB</div>
            <div class="score-container">
                <div class="score-box" id="view-score">?:?</div>
                <div class="time-box" id="view-time">0'</div>
            </div>
            <div class="team-box" id="view-name3">BVB</div>
        </div>
        <div class="pct-row">
            <div class="pct-box"><span>Heim</span><div id="view-pct1">67%</div></div>
            <div class="pct-box"><span>Remis</span><div id="view-pct2">13%</div></div>
            <div class="pct-box"><span>Gast</span><div id="view-pct3">20%</div></div>
        </div>
    </div>

    <!-- Der Start-Button -->
    <button class="btn-start" id="start-btn" onclick="startTimer()">Start</button>

<script>
    let isRunning = false;

    function startTimer() {
        if (isRunning) return;
        isRunning = true;

        const btn = document.getElementById('start-btn');
        const timeBox = document.getElementById('view-time');
        const scoreBox = document.getElementById('view-score');

        btn.disabled = true;
        scoreBox.innerText = "0:0";

        let currentMinute = 0;
        
        // Intervall: Zählt die Minuten im Zeitraffer bis 90 hoch
        const interval = setInterval(() => {
            currentMinute++;
            timeBox.innerText = currentMinute + "'";

            if (currentMinute >= 90) {
                clearInterval(interval);
                isRunning = false;
                btn.disabled = false;
                
                // Am Ende ein zufälliges Fußball-Ergebnis anzeigen
                const goalsHome = Math.floor(Math.random() * 4);
                const goalsAway = Math.floor(Math.random() * 4);
                scoreBox.innerText = goalsHome + ":" + goalsAway;
            }
        }, 30); // Geschwindigkeit des Zeitraffers (ca. 3 Sekunden Gesamtdauer)
    }
</script>

</body>
</html>
