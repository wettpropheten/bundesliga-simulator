
<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Profi Sport Simulator</title>
<style>
body{margin:0;background:#0b0b0b;color:#fff;font-family:Segoe UI,sans-serif}
.wrap{max-width:760px;margin:30px auto;padding:20px}
.card{background:#181818;border:1px solid #333;border-radius:14px;padding:18px;margin-bottom:20px}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end}
.field{display:flex;flex-direction:column}.field label{font-size:12px;color:#aaa}
input{padding:8px;border-radius:8px;border:1px solid #444;background:#222;color:#fff}
input[type=color]{padding:0;width:50px;height:40px}
button{padding:12px 18px;border:0;border-radius:8px;font-weight:bold;cursor:pointer}
#sim{background:#1f9d55;color:#fff}#reset{background:#444;color:#fff}
.board{display:flex;height:170px;border:4px solid #b8860b}
.team{flex:1;display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:900}
.mid{width:190px;background:#fff;color:#000;text-align:center}
.score{font-size:54px;padding:25px 0;border-bottom:2px solid #888}.time{padding:20px;font-size:34px;background:#ddd}
#ticker{text-align:center;color:#bbb;margin-top:12px;font-weight:bold}
</style></head><body><div class=wrap>
<div class=card>
<div class=row>
<div class=field><label>Heim</label><input id=h value="FCB"></div>
<div class=field><label>%</label><input id=hp type=number value=60></div>
<div class=field><label>Farbe</label><input id=hc type=color value="#cc0000"></div>
</div>
<div class=row>
<div class=field><label>Remis %</label><input id=dp type=number value=20></div>
</div>
<div class=row>
<div class=field><label>Gast</label><input id=a value="SGE"></div>
<div class=field><label>%</label><input id=ap type=number value=20></div>
<div class=field><label>Farbe</label><input id=ac type=color value="#222222"></div>
</div>
<p id=err style="color:#ff6666"></p>
<button id=sim onclick=simulate()>Spiel simulieren</button>
<button id=reset onclick=resetResult()>Reset Ergebnis</button>
</div>
<div class="board">
<div class=team id=homeBox>FCB</div>
<div class=mid><div class=score id=sc>? - ?</div><div class=time>90:00</div></div>
<div class=team id=awayBox>SGE</div>
</div>
<div id=ticker>Bereit</div>
</div>
<script>
const H=["1:0","2:0","2:1","3:1","3:0","4:2"],D=["0:0","1:1","2:2"],A=["0:1","0:2","1:2","1:3","0:3"];
function update(){
homeBox.textContent=h.value||"Heim";awayBox.textContent=a.value||"Gast";
homeBox.style.background=hc.value;awayBox.style.background=ac.value;
}
["h","a","hc","ac"].forEach(id=>document.getElementById(id).addEventListener("input",update));
update();
function simulate(){
let x=+hp.value,y=+dp.value,z=+ap.value;
if(x+y+z!==100){err.textContent="Die Prozentwerte müssen genau 100 ergeben.";return;}
err.textContent="";update();ticker.textContent="Simulation läuft...";
let n=0;let iv=setInterval(()=>{sc.textContent=Math.floor(Math.random()*5)+" - "+Math.floor(Math.random()*5);
if(++n>18){clearInterval(iv);let r=Math.random()*100,res;
if(r<x)res=H[Math.floor(Math.random()*H.length)];
else if(r<x+y)res=D[Math.floor(Math.random()*D.length)];
else res=A[Math.floor(Math.random()*A.length)];
sc.textContent=res.replace(":"," - ");ticker.textContent="Simulation beendet.";}},90)}
function resetResult(){sc.textContent="? - ?";ticker.textContent="Bereit";}
</script></body></html>
