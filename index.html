<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bundesliga Match Simulator PRO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial,Helvetica,sans-serif;

background:linear-gradient(135deg,#06101d,#075c35);

color:white;

padding:20px;

}

.container{

max-width:1500px;
margin:auto;

}

h1{

text-align:center;
margin-bottom:25px;
font-size:42px;
text-shadow:0 10px 30px black;

}

.layout{

display:grid;
grid-template-columns:330px 1fr;
gap:25px;

}

.glass{

background:rgba(255,255,255,.12);

border:1px solid rgba(255,255,255,.25);

border-radius:25px;

padding:25px;

backdrop-filter:blur(15px);

box-shadow:0 25px 60px black;

}

label{

display:block;
margin-top:15px;
margin-bottom:5px;

}

input,
select{

width:100%;

padding:12px;

border:none;

border-radius:10px;

background:#111;

color:white;

}

button{

width:100%;

padding:14px;

margin-top:12px;

border:none;

border-radius:12px;

background:#009447;

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

transition:.2s;

}

button:hover{

transform:scale(1.02);

}

.pause{

background:#c58b00;

}

.reset{

background:#b00020;

}


/* MATCHCENTER */

.arena{

padding:35px;

border-radius:30px;

background:linear-gradient(145deg,rgba(255,255,255,.18),rgba(0,0,0,.45));

box-shadow:
inset 0 0 40px black,
0 20px 50px black;

}

.teams{

display:flex;

justify-content:space-between;

align-items:center;

}

.team{

text-align:center;

width:220px;

}

.team img{

width:120px;

height:120px;

object-fit:contain;

filter:drop-shadow(0 15px 15px black);

}

.team h3{

margin-top:10px;
font-size:24px;

}

.score{

font-size:90px;

font-weight:bold;

text-align:center;

}

.clock{

font-size:40px;

text-align:center;

color:#00ff66;

}


/* LIVETICKER */

.ticker{

margin-top:30px;

height:420px;

overflow:auto;

background:rgba(0,0,0,.75);

border-radius:20px;

padding:15px;

}

.event{

display:grid;

grid-template-columns:1fr 70px 1fr;

padding:14px;

border-bottom:1px solid rgba(255,255,255,.15);

font-size:18px;

}

.home{

text-align:left;

font-weight:bold;

}

.time{

text-align:center;

font-weight:bold;

color:#00ff66;

}

.away{

text-align:right;

font-weight:bold;

}


/* MANNSCHAFTSKARTEN */

.cards{

margin-top:35px;

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

}

.card{

background:rgba(0,0,0,.35);

padding:20px;

border-radius:20px;

}

.card img{

display:block;

margin:auto;

width:80px;

height:80px;

object-fit:contain;

}


@media(max-width:900px){

.layout{

grid-template-columns:1fr;

}

.cards{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="container">

<h1>
⚽ Bundesliga Match Simulator PRO
</h1>

<div class="layout">

<div class="glass">

<h2>⚙️ Einstellungen</h2>

<label>Heim Mannschaft</label>
<select id="homeSelect"></select>

<label>Gast Mannschaft</label>
<select id="awaySelect"></select>

<label>Stadion</label>
<input id="stadium" value="Allianz Arena">

<button onclick="startSimulation()">▶ START</button>

<button class="pause" onclick="pauseSimulation()">⏸ PAUSE</button>

<button onclick="turboSimulation()">⚡ ZEITRAFFER</button>

<button class="reset" onclick="resetSimulation()">🔄 RESET</button>

</div>

<div class="glass">

<div class="arena">

<div class="teams">

<div class="team">

<img id="homeLogo">

<h3 id="homeName">Heim</h3>

</div>

<div>

<div class="score">

<span id="homeGoals">0</span>
:
<span id="awayGoals">0</span>

</div>

<div class="clock">

<span id="minute">00</span>'

</div>

</div>

<div class="team">

<img id="awayLogo">

<h3 id="awayName">Gast</h3>

</div>

</div>

<div class="ticker" id="ticker">

</div>

</div>

</div>

</div>

<h2 style="margin-top:40px">
🏆 Mannschaftskarten
</h2>

<div class="cards" id="cards"></div>

<script>
// =======================================
// BUNDESLIGA DATENBANK
// =======================================

const teams={

"Bayern München":{
logo:"https://upload.wikimedia.org/wikipedia/commons/f/ff/FC_Bayern_M%C3%BCnchen_logo_%282017%29.svg",
win:65,
draw:20,
loss:15,
xg:2.10
},

"Borussia Dortmund":{
logo:"https://upload.wikimedia.org/wikipedia/commons/6/67/Borussia_Dortmund_logo.svg",
win:55,
draw:25,
loss:20,
xg:1.75
},

"Bayer 04 Leverkusen":{
logo:"https://upload.wikimedia.org/wikipedia/commons/5/59/Bayer_04_Leverkusen_logo.svg",
win:60,
draw:25,
loss:15,
xg:1.90
},

"RB Leipzig":{
logo:"https://upload.wikimedia.org/wikipedia/de/0/04/RB_Leipzig_2014_logo.svg",
win:50,
draw:25,
loss:25,
xg:1.60
},

"VfB Stuttgart":{
logo:"https://upload.wikimedia.org/wikipedia/commons/e/e8/VfB_Stuttgart_1893_Logo.svg",
win:45,
draw:30,
loss:25,
xg:1.55
},

"Eintracht Frankfurt":{
logo:"https://upload.wikimedia.org/wikipedia/commons/0/04/Eintracht_Frankfurt_Logo.svg",
win:45,
draw:30,
loss:25,
xg:1.50
},

"SC Freiburg":{
logo:"https://upload.wikimedia.org/wikipedia/de/6/6d/SC_Freiburg_Logo.svg",
win:40,
draw:30,
loss:30,
xg:1.25
},

"1. FSV Mainz 05":{
logo:"https://upload.wikimedia.org/wikipedia/commons/9/9e/Logo_Mainz_05.svg",
win:35,
draw:30,
loss:35,
xg:1.15
},

"Werder Bremen":{
logo:"https://upload.wikimedia.org/wikipedia/commons/b/be/SV-Werder-Bremen-Logo.svg",
win:35,
draw:30,
loss:35,
xg:1.20
},

"Borussia Mönchengladbach":{
logo:"https://upload.wikimedia.org/wikipedia/commons/8/81/Borussia_M%C3%B6nchengladbach_logo.svg",
win:35,
draw:30,
loss:35,
xg:1.20
},

"TSG Hoffenheim":{
logo:"https://upload.wikimedia.org/wikipedia/commons/e/e7/Logo_TSG_Hoffenheim.svg",
win:35,
draw:25,
loss:40,
xg:1.25
},

"1. FC Union Berlin":{
logo:"https://upload.wikimedia.org/wikipedia/commons/4/44/1._FC_Union_Berlin_logo.svg",
win:35,
draw:30,
loss:35,
xg:1.05
},

"1. FC Köln":{
logo:"https://upload.wikimedia.org/wikipedia/commons/5/53/1._FC_K%C3%B6ln_logo.svg",
win:35,
draw:30,
loss:35,
xg:1.10
},

"FC Augsburg":{
logo:"https://upload.wikimedia.org/wikipedia/commons/9/9c/FC_Augsburg_logo.svg",
win:30,
draw:30,
loss:40,
xg:1.05
},

"FC Schalke 04":{
logo:"https://upload.wikimedia.org/wikipedia/commons/8/81/FC_Schalke_04_Logo.svg",
win:30,
draw:30,
loss:40,
xg:1.00
},

"Hamburger SV":{
logo:"https://upload.wikimedia.org/wikipedia/commons/6/66/HSV_Logo.svg",
win:35,
draw:30,
loss:35,
xg:1.15
}

};
// =======================================
// AUSWAHLFELDER FÜLLEN
// =======================================

const homeSelect = document.getElementById("homeSelect");
const awaySelect = document.getElementById("awaySelect");

Object.keys(teams).forEach(name=>{

    let homeOption=document.createElement("option");
    homeOption.value=name;
    homeOption.textContent=name;
    homeSelect.appendChild(homeOption);

    let awayOption=document.createElement("option");
    awayOption.value=name;
    awayOption.textContent=name;
    awaySelect.appendChild(awayOption);

});

homeSelect.value="Bayern München";
awaySelect.value="Borussia Dortmund";



// =======================================
// MATCHCENTER AKTUALISIEREN
// =======================================

function updateMatch(){

    const home=teams[homeSelect.value];
    const away=teams[awaySelect.value];

    document.getElementById("homeName").textContent=homeSelect.value;
    document.getElementById("awayName").textContent=awaySelect.value;

    document.getElementById("homeLogo").src=home.logo;
    document.getElementById("awayLogo").src=away.logo;

}



// =======================================
// MANNSCHAFT WECHSEL
// =======================================

homeSelect.onchange=function(){

    updateMatch();

};

awaySelect.onchange=function(){

    updateMatch();

};



// erster Start

updateMatch();
// =======================================
// MANNSCHAFTSKARTEN
// =======================================

function createCards(){

    const box=document.getElementById("cards");

    box.innerHTML="";

    Object.keys(teams).forEach(name=>{

        const t=teams[name];

        box.innerHTML += `

<div class="card">

<h3>${name}</h3>

<img
id="logo_${name}"
src="${t.logo}"
>

<label>Logo URL</label>

<input
value="${t.logo}"
onchange="
teams['${name}'].logo=this.value;
document.getElementById('logo_${name}').src=this.value;
updateMatch();
">

<label>Sieg %</label>

<input
type="number"
value="${t.win}"
onchange="
teams['${name}'].win=Number(this.value);
">

<label>Remis %</label>

<input
type="number"
value="${t.draw}"
onchange="
teams['${name}'].draw=Number(this.value);
">

<label>Niederlage %</label>

<input
type="number"
value="${t.loss}"
onchange="
teams['${name}'].loss=Number(this.value);
">

<label>xG Stärke</label>

<input
type="number"
step="0.1"
value="${t.xg}"
onchange="
teams['${name}'].xg=Number(this.value);
">

</div>

`;

    });

}


// Mannschaftskarten beim Start erzeugen
createCards();
// =======================================
// MATCH ENGINE
// =======================================

let timer = null;

let minute = 0;

let homeScore = 0;

let awayScore = 0;

let paused = false;

let turbo = false;



// =======================================
// SPIEL ZURÜCKSETZEN
// =======================================

function resetGame(){

    minute = 0;

    homeScore = 0;
    awayScore = 0;

    document.getElementById("minute").textContent = "00";

    document.getElementById("homeGoals").textContent = "0";
    document.getElementById("awayGoals").textContent = "0";

    document.getElementById("ticker").innerHTML = "";

}



// =======================================
// TICKER
// =======================================

function addEvent(side,text){

    const box = document.getElementById("ticker");

    const row = document.createElement("div");

    row.className = "event";

    let left = "";
    let right = "";

    if(side==="home"){
        left = text;
    }

    if(side==="away"){
        right = text;
    }

    if(side==="system"){
        right = text;
    }

    row.innerHTML = `

<div class="home">
${left}
</div>

<div class="time">
${minute}'
</div>

<div class="away">
${right}
</div>

`;

    box.appendChild(row);

    box.scrollTop = box.scrollHeight;

}
// =======================================
// TORWAHRSCHEINLICHKEIT
// =======================================

function goalChance(team,opponent,isHome){

    let chance = team.xg / 100;

    // Heimvorteil
    if(isHome){
        chance *= 1.15;
    }

    // Gegnerstärke berücksichtigen
    chance *= (1.2 - opponent.xg / 5);

    // Maximalwert
    if(chance > 0.035){
        chance = 0.035;
    }

    return chance;

}



// =======================================
// TOR
// =======================================

function goal(side){

    if(side==="home"){

        homeScore++;

        addEvent(
            "home",
            "⚽ TOR"
        );

    }else{

        awayScore++;

        addEvent(
            "away",
            "⚽ TOR"
        );

    }

    document.getElementById("homeGoals").textContent = homeScore;
    document.getElementById("awayGoals").textContent = awayScore;

}



// =======================================
// EINE SPIELMINUTE
// =======================================

function simulateMinute(){

    if(paused){
        return;
    }

    minute++;

    document.getElementById("minute").textContent = minute;

    const home = teams[homeSelect.value];
    const away = teams[awaySelect.value];

    if(Math.random() < goalChance(home,away,true)){
        goal("home");
    }

    if(Math.random() < goalChance(away,home,false)){
        goal("away");
    }

    // Gelbe Karten
    if(Math.random() < 0.018){
        addEvent("home","🟨 KARTE");
    }

    if(Math.random() < 0.018){
        addEvent("away","🟨 KARTE");
    }

    // Halbzeit
    if(minute===45){
        addEvent("system","⏱ HALBZEIT");
    }

    // Spielende
    if(minute>=90){

        clearInterval(timer);
        timer = null;

        addEvent("system","🏁 ABPFIFF");

    }

}
// =======================================
// START BUTTON
// =======================================

function startSimulation(){

    if(timer){
        return;
    }

    resetGame();

    paused = false;

    turbo = false;

    updateMatch();

    addEvent(
        "system",
        "▶ START"
    );

    timer = setInterval(
        simulateMinute,
        turbo ? 100 : 1000
    );

}



// =======================================
// PAUSE BUTTON
// =======================================

function pauseSimulation(){

    paused = !paused;

}



// =======================================
// ZEITRAFFER
// =======================================

function turboSimulation(){

    turbo = !turbo;

    if(timer){

        clearInterval(timer);

        timer = setInterval(
            simulateMinute,
            turbo ? 100 : 1000
        );

    }

}



// =======================================
// RESET BUTTON
// =======================================

function resetSimulation(){

    clearInterval(timer);

    timer = null;

    turbo = false;

    paused = false;

    resetGame();

    updateMatch();

}
</script>

</body>

</html>
