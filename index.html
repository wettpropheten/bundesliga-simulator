<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Ergebnis-Rechner & Simulator</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; 
            background: #000000; 
            color: #ffffff; 
            padding: 20px; 
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #f5f5f7;
            margin-bottom: 25px;
        }
        .box { 
            background: #1a1a1a; 
            border: 1px solid #2d2d2d;
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
        }
        .input-row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 12px; 
            align-items: flex-end; 
            gap: 15px;
        }
        .field-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        .field-group label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: bold;
        }
        input[type="text"] { 
            width: 140px; 
            padding: 8px; 
            background: #2b2b2b; 
            color: #ffffff; 
            border: 1px solid #404040; 
            border-radius: 6px;
            font-weight: bold;
        }
        input[type="text"]:disabled { background: #1f1f1f; color: #777777; border: 1px solid #2a2a2a; }
        input[type="number"] { 
            width: 65px; 
            padding: 8px; 
            background: #2b2b2b; 
            color: #ffffff; 
            border: 1px solid #404040; 
            border-radius: 6px; 
            font-weight: bold;
            text-align: center;
        }
        input[type="color"] { width: 45px; height: 34px; border: 1px solid #404040; border-radius: 6px; cursor: pointer; background: transparent; padding: 0; }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        #spin-btn { 
            flex: 3;
            padding: 16px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            border-radius: 8px; 
            border: none; 
            background: #2f855a; 
            color: white; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #spin-btn:hover { background: #276749; }
        #spin-btn:disabled { background: #4a5568; cursor: not-allowed; opacity: 0.6; }

        #reset-btn {
            flex: 1;
            padding: 16px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            border: 1px solid #404040;
            background: #2b2b2b;
            color: #ef4444;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #reset-btn:hover { background: #3f3f46; border-color: #ef4444; }

        #error { color: #f56565; font-weight: bold; margin-bottom: 15px; display: none; font-size: 14px; text-align: center; }

        .dashboard {
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .dash-item { text-align: center; flex: 1; padding: 5px; }
        .dash-item:not(:last-child) { border-right: 1px solid #2d2d2d; }
        .dash-name { font-size: 12px; color: #a0aec0; text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
        .dash-pct { font-size: 20px; font-weight: bold; margin-bottom: 2px; }
        .dash-odds { font-size: 13px; color: #a0aec0; font-weight: bold; }

        .scoreboard-bundesliga {
            height: 150px;
            background: #000000;
            border: 4px solid #b8860b; 
            box-shadow: 0 0 15px rgba(184, 134, 11, 0.4);
            display: flex;
            flex-direction: row;
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        .team-block {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
            transition: background-color 0.3s;
        }
        #block-home { background-color: #dd0000; }
        #block-away { background-color: #1a1a1a; }

        .team-name {
            font-size: 42px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            font-family: Arial, sans-serif;
        }

        .center-block {
            width: 160px;
            background: #ffffff; 
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            border-left: 2px solid #000;
            border-right: 2px solid #000;
        }
        .score-row {
            height: 80px;
            line-height: 80px;
            font-size: 50px;
            font-weight: 900;
            color: #000000;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 100%);
            border-bottom: 2px solid #666;
            text-align: center;
        }
        .time-row {
            flex: 1;
            line-height: 65px;
            font-size: 36px;
            font-weight: bold;
            color: #000000;
            background: #cccccc; 
            font-family: Arial, sans-serif;
            text-align: center;
        }

        /* NEU: Das interaktive Glücksrad-Element */
        .wheel-container {
            position: relative;
            width: 340px;
            height: 340px;
            margin: 25px auto 10px auto;
            border: 8px solid #b8860b;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(184, 134, 11, 0.5);
            background: #111;
        }
        .wheel-pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 28px solid #ff0000;
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
        }
        #wheel {
            border-radius: 50%;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sport Ergebnis-Rechner & Simulator</h1>
    
    <!-- Anzeigetafel oben -->
    <div class="scoreboard-bundesliga">
        <div class="team-block" id="block-home">
            <div class="team-name" id="lbl-home">FCB</div>
        </div>
        <div class="center-block">
            <div class="score-row" id="lbl-score">?:?</div>
            <div class="time-row">90'</div>
        </div>
        <div class="team-block" id="block-away">
            <div class="team-name" id="lbl-away">SGE</div>
        </div>
    </div>

    <!-- Steuerung & Eingabefelder -->
    <div class="box">
        <div id="error">Die Prozentwerte müssen genau 100 ergeben.</div>
        <div class="input-row">
            <div class="field-group"><label>Heim-Name</label><input type="text" id="name1" value="FCB" oninput="syncAndDraw()"></div>
            <div class="field-group"><label>Chance</label><span><input type="number" id="pct1" value="68" min="0" max="100" oninput="syncAndDraw()"> %</span></div>
            <div class="field-group"><label>Farbe</label><input type="color" id="col1" value="#dd0000" onchange="syncAndDraw()"></div>
        </div>
        <div class="input-row">
            <div class="field-group"><label>Remis</label><input type="text" value="Unentschieden" disabled></div>
            <div class="field-group"><label>Chance</label><span><input type="number" id="pct2" value="20" min="0" max="100" oninput="syncAndDraw()"> %</span></div>
            <div class="field-group"><label>Farbe</label><input type="color" id="col2" value="#718096" onchange="syncAndDraw()"></div>
        </div>
        <div class="input-row">
            <div class="field-group"><label>Gast-Name</label><input type="text" id="name3" value="SGE" oninput="syncAndDraw()"></div>
            <div class="field-group"><label>Chance</label><span><input type="number" id="pct3" value="12" min="0" max="100" oninput="syncAndDraw()"> %</span></div>
            <div class="field-group"><label>Farbe</label><input type="color" id="col3" value="#1a1a1a" onchange="syncAndDraw()"></div>
        </div>
        
        <div class="btn-container">
            <button id="spin-btn" onclick="startSimulation()">Spiel simulieren</button>
            <button id="reset-btn" onclick="resetForm()">Reset</button>
        </div>
    </div>

    <!-- Dashboard Statistik / Quoten -->
    <div class="dashboard">
        <div class="dash-item">
            <div class="dash-name">Heim</div>
            <div class="dash-pct" id="dash-val1">68%</div>
            <div class="dash-odds" id="dash-odds1">Quote: 1.47</div>
        </div>
        <div class="dash-item">
            <div class="dash-name">Remis</div>
            <div class="dash-pct" id="dash-val2">20%</div>
            <div class="dash-odds" id="dash-odds2">Quote: 5.00</div>
        </div>
        <div class="dash-item">
            <div class="dash-name">Gast</div>
