<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bundesliga Match Simulator PRO 3D</title>


<style>


*{
box-sizing:border-box;
}


body{

margin:0;
padding:20px;

font-family:Arial,Helvetica,sans-serif;

background:
linear-gradient(135deg,#06101d,#075c35);

color:white;

}



.container{

max-width:1500px;
margin:auto;

}



h1{

text-align:center;

font-size:42px;

text-shadow:
0 10px 30px black;

}



.layout{

display:grid;

grid-template-columns:330px 1fr;

gap:25px;

}



.glass{

background:
rgba(255,255,255,.12);

border:
1px solid rgba(255,255,255,.25);

border-radius:25px;

padding:25px;

backdrop-filter:blur(15px);

box-shadow:
0 25px 60px black;

}



label{

display:block;

margin-top:15px;

}



select,
input{

width:100%;

padding:12px;

border-radius:10px;

border:none;

background:#111;

color:white;

}



button{

width:100%;

padding:14px;

margin-top:12px;

border-radius:12px;

border:none;

background:#009447;

color:white;

font-weight:bold;

cursor:pointer;

}



.pause{

background:#c58b00;

}



.reset{

background:#b00020;

}





/* MATCHCENTER */


.arena{

padding:35px;

border-radius:30px;

background:

linear-gradient(
145deg,
rgba(255,255,255,.18),
rgba(0,0,0,.5)
);

box-shadow:

inset 0 0 40px black,
0 20px 50px black;

}



.teams{

display:flex;

justify-content:space-between;

align-items:center;

}



.team{

text-align:center;

}



.team img{

width:130px;

height:130px;

object-fit:contain;

filter:drop-shadow(0 15px 15px black);

}



.team h3{

font-size:24px;

}



.score{

font-size:90px;

font-weight:bold;

}



.clock{

font-size:40px;

text-align:center;

color:#00ff66;

}




/* TICKER */


.ticker{

margin-top:30px;

height:400px;

overflow:auto;

background:

rgba(0,0,0,.75);

border-radius:20px;

padding:15px;

}



.event{

display:grid;

grid-template-columns:

1fr 70px 1fr;

padding:14px;

border-bottom:

1px solid rgba(255,255,255,.2);

}



.home{

text-align:left;

}



.time{

text-align:center;

color:#00ff66;

}



.away{

text-align:right;

}




</style>

</head>


<body>



<div class="container">


<h1>
⚽ Bundesliga Match Simulator PRO 3D
</h1>



<div class="layout">


<div class="glass">


<h2>
⚙️ Einstellungen
</h2>



<label>
Heim Mannschaft
</label>

<select id="homeSelect"></select>



<label>
Gast Mannschaft
</label>

<select id="awaySelect"></select>



<label>
Stadion
</label>

<input id="stadium" value="Allianz Arena">



<button onclick="startSimulation()">
▶ START
</button>


<button class="pause" onclick="pauseSimulation()">
⏸ PAUSE
</button>


<button onclick="turboSimulation()">
⚡ ZEITRAFFER
</button>


<button class="reset" onclick="resetSimulation()">
🔄 RESET
</button>



</div>





<div class="glass">


<div class="arena">


<div class="teams">


<div class="team">

<img id="homeLogo">

<h3 id="homeName">
Heim
</h3>

</div>




<div>


<div class="score">

<span id="homeGoals">
0
</span>

:

<span id="awayGoals">
0
</span>


</div>


<div class="clock">

<span id="minute">
00
</span>'

</div>


</div>





<div class="team">


<img id="awayLogo">


<h3 id="awayName">
Gast
</h3>


</div>



</div>





<div class="ticker" id="ticker">


<div class="event">


<div class="home">
SYSTEM
</div>


<div class="time">
00'
</div>


<div class="away">
Spiel bereit
</div>


</div>


</div>



</div>


</div>


</div>



<script>


// =======================================
// BUNDESLIGA DATENBANK MIT LOGOS
// =======================================


const teams={


"Bayern München":{

logo:"https://upload.wikimedia.org/wikipedia/commons/f/ff/FC_Bayern_M%C3%BCnchen_logo_%282017%29.svg",

xg:2.10

},



"Borussia Dortmund":{

logo:"https://upload.wikimedia.org/wikipedia/commons/6/67/Borussia_Dortmund_logo.svg",

xg:1.75

},



"Bayer 04 Leverkusen":{

logo:"https://upload.wikimedia.org/wikipedia/commons/5/59/Bayer_04_Leverkusen_logo.svg",

xg:1.90

},



"RB Leipzig":{

logo:"https://upload.wikimedia.org/wikipedia/de/0/04/RB_Leipzig_2014_logo.svg",

xg:1.60

},



"VfB Stuttgart":{

logo:"https://upload.wikimedia.org/wikipedia/commons/e/e8/VfB_Stuttgart_1893_Logo.svg",

xg:1.55

},



"Eintracht Frankfurt":{

logo:"https://upload.wikimedia.org/wikipedia/commons/0/04/Eintracht_Frankfurt_Logo.svg",

xg:1.50

},



"SC Freiburg":{

logo:"https://upload.wikimedia.org/wikipedia/de/6/6d/SC_Freiburg_Logo.svg",

xg:1.25

},



"1. FSV Mainz 05":{

logo:"https://upload.wikimedia.org/wikipedia/commons/9/9e/Logo_Mainz_05.svg",

xg:1.15

},



"Werder Bremen":{

logo:"https://upload.wikimedia.org/wikipedia/commons/b/be/SV-Werder-Bremen-Logo.svg",

xg:1.20

},



"Borussia Mönchengladbach":{

logo:"https://upload.wikimedia.org/wikipedia/commons/8/81/Borussia_M%C3%B6nchengladbach_logo.svg",

xg:1.20

},



"TSG Hoffenheim":{

logo:"https://upload.wikimedia.org/wikipedia/commons/e/e7/Logo_TSG_Hoffenheim.svg",

xg:1.25

},



"1. FC Union Berlin":{

logo:"https://upload.wikimedia.org/wikipedia/commons/4/44/1._FC_Union_Berlin_logo.svg",

xg:1.05

},



"1. FC Köln":{

logo:"https://upload.wikimedia.org/wikipedia/commons/5/53/1._FC_K%C3%B6ln_logo.svg",

xg:1.10

},



"FC Augsburg":{

logo:"https://upload.wikimedia.org/wikipedia/commons/9/9c/FC_Augsburg_logo.svg",

xg:1.05

},



"FC Schalke 04":{

logo:"https://upload.wikimedia.org/wikipedia/commons/8/81/FC_Schalke_04_Logo.svg",

xg:1.00

},



"Hamburger SV":{

logo:"https://upload.wikimedia.org/wikipedia/commons/6/66/HSV_Logo.svg",

xg:1.15

}



};




// =======================================
// MANNSCHAFTEN IN AUSWAHL LADEN
// =======================================


const homeSelect=document.getElementById("homeSelect");

const awaySelect=document.getElementById("awaySelect");



Object.keys(teams).forEach(team=>{


let homeOption=document.createElement("option");

homeOption.value=team;

homeOption.textContent=team;

homeSelect.appendChild(homeOption);



let awayOption=document.createElement("option");

awayOption.value=team;

awayOption.textContent=team;

awaySelect.appendChild(awayOption);


});



// Standardspiel


homeSelect.value="Bayern München";

awaySelect.value="Borussia Dortmund";



// =======================================
// MATCHCENTER AKTUALISIEREN
// =======================================


function updateMatch(){


let homeTeam =
teams[homeSelect.value];


let awayTeam =
teams[awaySelect.value];



// Namen ändern


document.getElementById("homeName").innerHTML =
homeSelect.value;



document.getElementById("awayName").innerHTML =
awaySelect.value;





// Logos setzen


document.getElementById("homeLogo").src =
homeTeam.logo;



document.getElementById("awayLogo").src =
awayTeam.logo;



}





// =======================================
// BEI MANNSCHAFTSWECHSEL AKTUALISIEREN
// =======================================


homeSelect.onchange=function(){

updateMatch();

};



awaySelect.onchange=function(){

updateMatch();

};





// erster Start


updateMatch();




// =======================================
// SPIEL VARIABLEN
// =======================================


let timer=null;


let minute=0;


let homeScore=0;


let awayScore=0;


let paused=false;


let turbo=false;




// =======================================
// TICKER FUNKTION
// NUR TOR / KARTE / HALBZEIT / ABPFIFF
// =======================================


function addEvent(side,text){


let box=document.getElementById("ticker");


let row=document.createElement("div");


row.className="event";



let left="";


let right="";



if(side==="home"){

left=text;

}



if(side==="away"){

right=text;

}



if(side==="system"){

right=text;

}





row.innerHTML=`

<div class="home">

${left}

</div>


<div class="time">

${minute}'

</div>


<div class="away">

${right}

</div>

`;



box.appendChild(row);


box.scrollTop=box.scrollHeight;


}



// =======================================
// RESET SPIEL
// =======================================


function resetGame(){


minute=0;


homeScore=0;


awayScore=0;



document.getElementById("minute").innerHTML="00";


document.getElementById("homeGoals").innerHTML="0";


document.getElementById("awayGoals").innerHTML="0";


document.getElementById("ticker").innerHTML="";


}






// =======================================
// TORWAHRSCHEINLICHKEIT
// =======================================


function goalChance(team,opponent,home){



let chance =
team.xg / 100;



// Heimvorteil


if(home){

chance *= 1.15;

}



// Gegnerstärke


chance *=
(1.2 - opponent.xg/5);





// keine unrealistischen Ergebnisse


if(chance>0.035){

chance=0.035;

}



return chance;



}







// =======================================
// TOR
// =======================================


function goal(side){



if(side==="home"){


homeScore++;


addEvent(
"home",
"⚽ TOR"
);


}



else{


awayScore++;


addEvent(
"away",
"⚽ TOR"
);


}





document.getElementById("homeGoals").innerHTML =
homeScore;



document.getElementById("awayGoals").innerHTML =
awayScore;



}







// =======================================
// EINE SPIELMINUTE
// =======================================


function simulateMinute(){



if(paused)

return;




minute++;



document.getElementById("minute").innerHTML =
minute;




let home =
teams[homeSelect.value];



let away =
teams[awaySelect.value];






// TORCHANCEN



if(Math.random() < goalChance(home,away,true)){


goal("home");


}




if(Math.random() < goalChance(away,home,false)){


goal("away");


}






// KARTE



if(Math.random()<0.018){


addEvent(
"home",
"🟨 KARTE"
);


}





if(Math.random()<0.018){


addEvent(
"away",
"🟨 KARTE"
);


}







// HALBZEIT



if(minute===45){


addEvent(
"system",
"⏱ HALBZEIT"
);


}







// ABPFIFF



if(minute>=90){


clearInterval(timer);


timer=null;



addEvent(
"system",
"🏁 ABPFIFF"
);



}




}



// =======================================
// START
// =======================================


function startSimulation(){



if(timer)

return;



resetGame();



paused=false;



addEvent(
"system",
"ANPFIFF"
);




timer=setInterval(

simulateMinute,

turbo ? 100 : 1000

);



}








// =======================================
// PAUSE
// =======================================


function pauseSimulation(){


paused=!paused;


}








// =======================================
// ZEITRAFFER
// =======================================


function turboSimulation(){



turbo=true;




if(timer){


clearInterval(timer);



timer=setInterval(

simulateMinute,

100

);


}

else{


startSimulation();


}



}








// =======================================
// RESET BUTTON
// =======================================


function resetSimulation(){



clearInterval(timer);



timer=null;



resetGame();



}








// =======================================
// MANNSCHAFTSKARTEN
// =======================================


function createCards(){


let box=document.getElementById("cards");


box.innerHTML="";



Object.keys(teams).forEach(name=>{


let team=teams[name];



box.innerHTML += `

<div class="card">


<h3>${name}</h3>



<img 
src="${team.logo}"
id="card_${name}"
>



<label>
Logo URL
</label>


<input

value="${team.logo}"

onchange="

teams['${name}'].logo=this.value;

document.getElementById('card_${name}').src=this.value;

updateMatch();

"

>



<label>
xG Stärke
</label>


<input

type="number"

step="0.1"

value="${team.xg}"

onchange="

teams['${name}'].xg=Number(this.value)

"

>


</div>


`;



});


}




createCards();


</script>


</body>


</html>
