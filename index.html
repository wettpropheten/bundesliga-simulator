<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matchboard Schritt 1</title>
    <style>
        body {
            background-color: #8b1111; /* Roter Hintergrund */
            color: white;
            font-family: Arial, sans-serif;
            padding: 30px;
            display: flex;
            justify-content: center;
        }

        /* Die Anzeigetafel */
        .scoreboard {
            width: 100%;
            max-width: 500px;
            background-color: #222;
            border: 3px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .team-row {
            display: flex;
            height: 120px;
        }
        .team-box {
            width: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            font-weight: 900;
            background-color: #64b931; /* Grünes Startfeld */
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .score-container {
            flex: 1;
            background-color: #2a2a2a;
            display: flex;
            flex-direction: column;
            border-left: 2px solid #1a1a1a;
            border-right: 2px solid #1a1a1a;
        }
        .score-box {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 100%);
            color: black;
            border-bottom: 2px solid #666;
        }
        .time-box {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            background-color: #cccccc;
            color: black;
        }
        .pct-row {
            display: flex;
            background-color: #151515;
            padding: 10px 0;
            border-top: 2px solid #2a2a2a;
        }
        .pct-box {
            flex: 1;
            text-align: center;
        }
        .pct-box span {
            display: block;
            font-size: 10px;
            color: #777;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .pct-box div {
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Nur die Tafel aus dem Bild -->
    <div class="scoreboard">
        <div class="team-row">
            <div class="team-box" id="view-name1">BVB</div>
            <div class="score-container">
                <div class="score-box" id="view-score">?:?</div>
                <div class="time-box" id="view-time">0'</div>
            </div>
            <div class="team-box" id="view-name3">BVB</div>
        </div>
        <div class="pct-row">
            <div class="pct-box"><span>Heim</span><div id="view-pct1">67%</div></div>
            <div class="pct-box"><span>Remis</span><div id="view-pct2">13%</div></div>
            <div class="pct-box"><span>Gast</span><div id="view-pct3">20%</div></div>
        </div>
    </div>

</body>
</html>
