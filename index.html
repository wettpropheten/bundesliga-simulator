<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bundesliga Match Simulator PRO</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;
padding:15px;

font-family:Arial,Helvetica,sans-serif;

background:
linear-gradient(135deg,#061525,#123d25);

color:white;

}



.container{

width:95%;
max-width:1400px;
margin:auto;

}



h1{

text-align:center;
font-size:32px;

}




.main{

display:grid;

grid-template-columns:35% 65%;

gap:15px;

}




.glass{

background:
rgba(255,255,255,0.12);

border-radius:20px;

padding:20px;

backdrop-filter:blur(10px);

box-shadow:
0 10px 40px black;

}



input,
select{

width:100%;

padding:10px;

margin-top:6px;

background:#111;

color:white;

border:none;

border-radius:8px;

}




label{

display:block;

margin-top:12px;

font-size:14px;

}



button{

width:100%;

padding:12px;

margin-top:10px;

border:none;

border-radius:10px;

font-weight:bold;

cursor:pointer;

background:#00a651;

color:white;

}


button:hover{

opacity:.8;

}



.pause{

background:#e9a400;

}



.reset{

background:#c62828;

}






/* MATCHCENTER */


.matchcenter{

text-align:center;

}



.teams{

display:flex;

justify-content:center;

align-items:center;

gap:30px;

}



.team img{

width:70px;
height:70px;

object-fit:contain;

}



.score{

font-size:55px;

font-weight:bold;

}



.clock{

font-size:30px;

margin:10px;

}



.pitch{

height:230px;

border-radius:20px;

background:

linear-gradient(
90deg,
#087f36,
#18a34a
);

position:relative;

overflow:hidden;

}



.pitch:after{

content:"";

position:absolute;

left:50%;

top:0;

height:100%;

border-left:2px solid white;

}



.ball{

position:absolute;

top:45%;
left:48%;

font-size:35px;

}



.ticker{

height:160px;

overflow:auto;

background:#050505;

padding:15px;

margin-top:15px;

border-radius:15px;

text-align:left;

}





/* KARTEN */


.cards{

margin-top:20px;

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:15px;

}



.teamcard{

background:
rgba(0,0,0,.35);

padding:15px;

border-radius:15px;

}



.teamcard img{

width:50px;
height:50px;

object-fit:contain;

}



@media(max-width:900px){

.main{

grid-template-columns:1fr;

}


.cards{

grid-template-columns:1fr;

}

}


</style>


</head>


<body>


<div class="container">

⚽ Bundesliga Match Simulator PRO

// MANNSCHAFTSKARTEN ERSTELLEN
// ===============================


function createTeamCards(){


let box=document.getElementById("teamCards");


box.innerHTML="";



Object.keys(teams).forEach(name=>{

>

// ===============================
// DROPDOWN LADEN
// ===============================



function loadTeams(){


let home=
document.getElementById("homeSelect");


let away=
document.getElementById("awaySelect");



home.innerHTML="";

away.innerHTML="";



Object.keys(teams).forEach(name=>{


home.innerHTML +=

`
<option>
${name}
</option>
`;



away.innerHTML +=

`
<option>
${name}
</option>
`;



});



home.value="Bayern München";

// ===============================
// MATCHCENTER AKTUALISIEREN
// ===============================



function updateMatch(){



let homeTeam=
document.getElementById("homeSelect").value;



let awayTeam=
document.getElementById("awaySelect").value;



let home=
teams[homeTeam];


let away=
teams[awayTeam];



document.getElementById("homeName")
.innerHTML=
homeTeam;



document.getElementById("awayName")
.innerHTML=
awayTeam;



document.getElementById("homeLogo")
.src=
home.logo;



document.getElementById("awayLogo")
.src=
away.logo;



document.getElementById("ticker")
.innerHTML=
`
<b>LIVETICKER</b>
<br><br>
${homeTeam} gegen ${awayTeam} bereit
`;



}





// ===============================
// START
// ===============================


createTeamCards();

loadTeams();

updateMatch();


// ======================================
// BUNDESLIGA SIMULATIONS ENGINE
// ======================================


let timer=null;

let minute=0;

let homeScore=0;

let awayScore=0;

let paused=false;



let events=[];





// ======================================
// FORM BERECHNUNG
// ======================================


function formBonus(form){


if(!form) return 0;


let value=0;


for(let x of form){


if(x==="S")
value+=2;


if(x==="U")
value+=0.5;


if(x==="N")
value-=1;


}


return value;


}





// ======================================
// SPIELSTÄRKE BERECHNUNG
// ======================================


function calculateTeam(team,isHome){



let value=0;



value += team.xg * 20;


value += team.win / 2;


value += formBonus(team.form);



if(isHome){

value += formBonus(team.homeForm);

}

else{

value += formBonus(team.awayForm);

}



return value;



}







// ======================================
// SPIELAUSGANG
// ======================================


function resultChance(){


let home=
Number(
teams[
document.getElementById("homeSelect").value
].win
);



let away=
Number(
teams[
document.getElementById("awaySelect").value
].win
);



let draw=
100-home-away;



if(draw<0)
draw=20;



let r=Math.random()*100;



if(r < home)
return "home";



if(r < home+draw)
return "draw";



return "away";



}







// ======================================
// TORCHANCE
// ======================================


function checkGoal(){



let home=
teams[
document.getElementById("homeSelect").value
];



let away=
teams[
document.getElementById("awaySelect").value
];



let homePower=
calculateTeam(home,true);



let awayPower=
calculateTeam(away,false);





let total=
homePower+awayPower;



let homeChance=
(homePower/total)*0.12;



let awayChance=
(awayPower/total)*0.10;





if(Math.random()<homeChance){


homeScore++;

addTicker(
"⚽ "+minute+"' TOR "+home.name+
"  "+homeScore+":"+awayScore
);


}




if(Math.random()<awayChance){


awayScore++;


addTicker(
"⚽ "+minute+"' TOR "+away.name+
"  "+homeScore+":"+awayScore
);


}





updateScore();


}







// ======================================
// SPIELEREIGNISSE
// ======================================


function randomEvent(){


let list=[


"Angriff über außen",

"Schuss aus der Distanz",

"Ecke",

"Freistoß",

"Großchance",

"Torwartparade",

"Ballbesitzphase",

"Konter läuft",

"VAR Prüfung"


];



return list[
Math.floor(Math.random()*list.length)
];


}








// ======================================
// SIMULATION START
// ======================================


function startSimulation(){



if(timer)
return;



paused=false;



addTicker("🏟 ANPFIFF");



timer=setInterval(()=>{



if(paused)
return;



minute++;



document.getElementById("minute")
.innerHTML=
minute;



if(minute<90){



if(Math.random()<0.35){


addTicker(
minute+"' "+randomEvent()
);


}



checkGoal();



}



if(minute===45){


addTicker(
"⏱ HALBZEIT"
);


}



if(minute>=90){



clearInterval(timer);

timer=null;


addTicker(
"🏁 ABPFIFF"
);



}



},1000);



}








// ======================================
// PAUSE
// ======================================


function pauseSimulation(){


paused=!paused;


if(paused)

addTicker("⏸ Simulation pausiert");


else

addTicker("▶ Simulation läuft weiter");



}









// ======================================
// RESET
// ======================================


function resetSimulation(){



clearInterval(timer);


timer=null;


minute=0;

homeScore=0;

awayScore=0;

paused=false;



document.getElementById("minute")
.innerHTML="00";



updateScore();



document.getElementById("ticker")
.innerHTML=
`
<b>LIVETICKER</b>
<br><br>
Spiel bereit...
`;



}









// ======================================
// SCORE ANZEIGE
// ======================================


function updateScore(){



document.getElementById("homeGoals")
.innerHTML=
homeScore;



document.getElementById("awayGoals")
.innerHTML=
awayScore;



}








// ======================================
// TICKER
// ======================================


function addTicker(text){



let box=
document.getElementById("ticker");



box.innerHTML +=

"<br>"+text;



box.scrollTop=
box.scrollHeight;


}






// Auswahländerung
document.getElementById("homeSelect")
.onchange=
updateMatch;



document.getElementById("awaySelect")
.onchange=
updateMatch;

</script>
