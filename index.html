<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bundesliga Match Simulator 3D</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
padding:20px;

font-family:Arial,Helvetica,sans-serif;

background:
linear-gradient(135deg,#06101d,#075c35);

color:white;

}

.container{

max-width:1500px;
margin:auto;

}

h1{

text-align:center;
font-size:42px;
text-shadow:0 10px 30px black;

}


.layout{

display:grid;
grid-template-columns:330px 1fr;
gap:25px;

}


.glass{

background:
rgba(255,255,255,.12);

border:
1px solid rgba(255,255,255,.25);

border-radius:25px;

padding:25px;

backdrop-filter:blur(15px);

box-shadow:
0 25px 60px black;

}


label{

display:block;
margin-top:15px;

}


input,
select{

width:100%;
padding:12px;

border-radius:10px;

border:none;

background:#111;

color:white;

}


button{

width:100%;
padding:14px;

margin-top:12px;

border-radius:12px;

border:none;

background:#009447;

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

}


.pause{

background:#c58b00;

}


.reset{

background:#b00020;

}


/* MATCHCENTER */

.arena{

padding:35px;

border-radius:30px;

background:
linear-gradient(
145deg,
rgba(255,255,255,.18),
rgba(0,0,0,.45)
);

box-shadow:

inset 0 0 40px black,
0 20px 50px black;

}


.teams{

display:flex;

justify-content:space-between;

align-items:center;

}


.team{

text-align:center;

}


.team img{

width:120px;

height:120px;

object-fit:contain;

filter:
drop-shadow(0 15px 15px black);

}


.team h3{

font-size:24px;

}


.score{

font-size:90px;

font-weight:bold;

}


.clock{

font-size:40px;

color:#00ff66;

text-align:center;

}


/* TICKER */

.ticker{

margin-top:30px;

height:420px;

overflow:auto;

background:
rgba(0,0,0,.75);

border-radius:20px;

padding:15px;

}


.event{

display:grid;

grid-template-columns:
1fr 70px 1fr;

padding:14px;

border-bottom:
1px solid rgba(255,255,255,.2);

font-size:18px;

}


.home{

text-align:left;
font-weight:bold;

}


.time{

text-align:center;
color:#00ff66;
font-weight:bold;

}


.away{

text-align:right;
font-weight:bold;

}


/* MANNSCHAFTSKARTEN BLEIBEN */

.cards{

margin-top:30px;

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:20px;

}


.card{

background:
rgba(0,0,0,.35);

padding:20px;

border-radius:20px;

}


.card img{

width:80px;

height:80px;

object-fit:contain;

display:block;

margin:auto;

}


@media(max-width:900px){

.layout{

grid-template-columns:1fr;

}


.cards{

grid-template-columns:1fr;

}

}


</style>

</head>
<body>


<div class="container">


<h1>
⚽ Bundesliga Match Simulator PRO 3D
</h1>



<div class="layout">



<!-- EINSTELLUNGEN -->

<div class="glass">

⚙️ Einstellungen
</h2>

Heim Mannschaft
</label>

<button onclick="startSimulation()">
▶ START
</button>



<button class="pause" onclick="pauseSimulation()">
⏸ PAUSE
</button>



<button onclick="turboSimulation()">
⚡ ZEITRAFFER
</button>



<button class="reset" onclick="resetSimulation()">
🔄 RESET
</button>



</div>





<!-- MATCHCENTER -->

<div class="glass">


<div class="arena">



<div class="teams">



<div class="team">


<img id="homeLogo">


<h3 id="homeName">
Heim
</h3>


</div>





<div>


<div class="score">


<span id="homeGoals">
0
</span>


:


<span id="awayGoals">
0
</span>


</div>




<div class="clock">


<span id="minute">
00
</span>'

</div>

<img id="awayLogo">

</div>






<!-- LIVETICKER -->


<div class="ticker" id="ticker">

</div>



<div class="time">
00'
</div>



<div class="away">
Spiel bereit
</div>



</div>


</div>




</div>


</div>



</div>





<!-- MANNSCHAFTSKARTEN -->

// =======================================
// AUSWAHLFELDER FÜLLEN
// =======================================


const homeSelect =
document.getElementById("homeSelect");


const awaySelect =
document.getElementById("awaySelect");





Object.keys(teams).forEach(name=>{


let homeOption =
document.createElement("option");


homeOption.value=name;

homeOption.textContent=name;


homeSelect.appendChild(homeOption);





let awayOption =
document.createElement("option");


awayOption.value=name;

awayOption.textContent=name;


awaySelect.appendChild(awayOption);



});





homeSelect.value =
"Bayern München";


awaySelect.value =
"Borussia Dortmund";






// =======================================
// MANNSCHAFTSKARTEN
// =======================================


function createCards(){



let box =
document.getElementById("cards");



box.innerHTML="";





Object.keys(teams).forEach(name=>{


let t =
teams[name];





box.innerHTML += `


<div class="card">


<h3>
${name}
</h3>



<img
id="logo_${name}"
src="${t.logo}"
>




<label>
Logo URL
</label>



<input

value="${t.logo}"

onchange="

teams['${name}'].logo=this.value;

document.getElementById('logo_${name}').src=this.value;

updateMatch();

"

>

</label>

</label>

type="number"

createCards();
// =======================================
// MATCHCENTER AKTUALISIEREN
// =======================================


function updateMatch(){


let home =
teams[homeSelect.value];


let away =
teams[awaySelect.value];





// Namen setzen


document.getElementById("homeName").innerHTML =
homeSelect.value;



document.getElementById("awayName").innerHTML =
awaySelect.value;





// Logos setzen


document.getElementById("homeLogo").src =
home.logo;



document.getElementById("awayLogo").src =
away.logo;



}






// =======================================
// MANNSCHAFT WECHSEL
// =======================================


homeSelect.onchange=function(){


updateMatch();


};





awaySelect.onchange=function(){


updateMatch();


};







// erster Start


updateMatch();
// =======================================
// MATCH ENGINE
// =======================================


let timer = null;

let minute = 0;

let homeScore = 0;

let awayScore = 0;

let paused = false;

let turbo = false;





// =======================================
// TICKER
// NUR TOR / KARTE / HALBZEIT / ABPFIFF
// =======================================


function addEvent(side,text){


let box =
document.getElementById("ticker");


let row =
document.createElement("div");


row.className="event";



let left="";

let right="";




if(side==="home"){

left=text;

}



if(side==="away"){

right=text;

}



if(side==="system"){

right=text;

}




row.innerHTML = `


<div class="home">

${left}

</div>



<div class="time">

${minute}'

</div>



<div class="away">

${right}

</div>


`;



box.appendChild(row);


box.scrollTop =
box.scrollHeight;


}






// =======================================
// TORWAHRSCHEINLICHKEIT
// =======================================


function goalChance(team,opponent,home){



let chance =
team.xg / 100;



if(home){

chance *= 1.15;

}



chance *=
(1.2 - opponent.xg / 5);





if(chance > 0.035){

chance = 0.035;

}



return chance;


}







// =======================================
// TOR
// =======================================


function goal(side){



if(side==="home"){


homeScore++;


addEvent(
"home",
"⚽ TOR"
);


}



else{


awayScore++;


addEvent(
"away",
"⚽ TOR"
);


}






document.getElementById("homeGoals").innerHTML =
homeScore;



document.getElementById("awayGoals").innerHTML =
awayScore;



}








// =======================================
// EINE SPIELMINUTE
// =======================================


function simulateMinute(){



if(paused)

return;





minute++;




document.getElementById("minute").innerHTML =
minute;





let home =
teams[homeSelect.value];



let away =
teams[awaySelect.value];






let homeChance =
goalChance(home,away,true);



let awayChance =
goalChance(away,home,false);







if(Math.random()<homeChance){

goal("home");

}



if(Math.random()<awayChance){

goal("away");

}







// Karten


if(Math.random()<0.018){


addEvent(
"home",
"🟨 KARTE"
);


}




if(Math.random()<0.018){


addEvent(
"away",
"🟨 KARTE"
);


}






// Halbzeit


if(minute===45){


addEvent(
"system",
"⏱ HALBZEIT"
);


}






// Abpfiff


if(minute>=90){



clearInterval(timer);


timer=null;



addEvent(
"system",
"🏁 ABPFIFF"
);



}



}
// =======================================
// SPIEL ZURÜCKSETZEN
// =======================================


function resetGame(){



minute=0;


homeScore=0;


awayScore=0;



document.getElementById("minute").innerHTML="00";


document.getElementById("homeGoals").innerHTML="0";


document.getElementById("awayGoals").innerHTML="0";



document.getElementById("ticker").innerHTML="";



}








// =======================================
// START BUTTON
// =======================================


function startSimulation(){



if(timer)

return;



resetGame();



paused=false;



addEvent(
"system",
"START"
);




timer=setInterval(


simulateMinute,


turbo ? 100 : 1000


);



}









// =======================================
// PAUSE BUTTON
// =======================================


function pauseSimulation(){



paused =
!paused;



}









// =======================================
// ZEITRAFFER
// =======================================


function turboSimulation(){



turbo=true;




if(timer){


clearInterval(timer);



timer=setInterval(


simulateMinute,


100


);


}

else{


startSimulation();


}



}









// =======================================
// RESET BUTTON
// =======================================


function resetSimulation(){



clearInterval(timer);



timer=null;



resetGame();



}
<script>

// HIER stehen Teil 1 bis Teil 7


// letzter Start
updateMatch();


</script>
