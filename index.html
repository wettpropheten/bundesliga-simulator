<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<title>Bundesliga 3D Match Simulator</title>

<style>

body{
    margin:0;
    background:
    linear-gradient(180deg,#081018,#1b2735);
    font-family:Arial,Helvetica,sans-serif;
    color:white;
}


.container{
    width:95%;
    max-width:1200px;
    margin:auto;
    padding:20px;
}


.panel{

    background:rgba(255,255,255,0.12);
    border-radius:25px;
    padding:25px;
    box-shadow:
    0 20px 50px black,
    inset 0 0 20px rgba(255,255,255,.1);

    transform:perspective(900px)
    rotateX(3deg);

}


h1{
text-align:center;
}


.team{

display:inline-block;
width:45%;
vertical-align:top;

background:rgba(0,0,0,.3);
padding:15px;
border-radius:15px;

}


input,select{

width:90%;
padding:10px;
margin:5px;

border-radius:10px;
border:none;

}


button{

padding:12px 25px;
margin:10px;

border-radius:15px;
border:none;

font-weight:bold;
cursor:pointer;

}


button:hover{

transform:scale(1.05);

}



.field{

margin-top:30px;

height:320px;

background:
linear-gradient(90deg,#16803c,#23a052);

border-radius:25px;

box-shadow:
inset 0 0 50px black;

position:relative;

overflow:hidden;

}



.line{

position:absolute;

border:3px solid white;
opacity:.7;

}



.ball{

position:absolute;

font-size:45px;

top:130px;
left:20%;

animation:

moveball 3s infinite alternate;

}



@keyframes moveball{

from{

left:15%;

}

to{

left:75%;

}

}



.score{

font-size:40px;
text-align:center;

}



.clock{

font-size:30px;
text-align:center;

}



.log{

background:black;

padding:20px;

height:250px;

overflow:auto;

border-radius:15px;

margin-top:20px;

}



</style>


</head>


<body>


<div class="container">


<div class="panel">


<h1>⚽ Bundesliga 3D Match Simulator</h1>



<div class="team">


<h2>🏠 Heim Mannschaft</h2>


Name:

<input id="homeName"
value="FC Bayern München">


Tabellenplatz:

<input id="homePlace"
value="1">


Punkte:

<input id="homePoints"
value="45">


Angriff:

<input id="homeAttack"
value="92">


Abwehr:

<input id="homeDefense"
value="86">


Expected Goals:

<input id="homeXG"
value="2.10">


Siegchance %

<input id="homeChance"
value="58">


Form:

<input id="homeForm"
value="SSSUS">


Heimform:

<input id="homeHomeForm"
value="SSSSU">


</div>





<div class="team">


<h2>✈️ Auswärts Mannschaft</h2>


Name:

<input id="awayName"
value="Borussia Dortmund">


Tabellenplatz:

<input id="awayPlace"
value="4">


Punkte:

<input id="awayPoints"
value="34">


Angriff:

<input id="awayAttack"
value="86">


Abwehr:

<input id="awayDefense"
value="82">


Expected Goals:

<input id="awayXG"
value="1.35">


Siegchance %

<input id="awayChance"
value="22">


Form:

<input id="awayForm"
value="SUSNS">


Auswärtsform:

<input id="awayAwayForm"
value="SUSN">


</div>



<br>



<button onclick="startGame()">
▶ START
</button>


<button onclick="resetGame()">
⟳ RESET
</button>


<button onclick="updateData()">
🔄 AKTUALISIEREN
</button>




<div class="field">

<div class="line"
style="
left:50%;
height:100%;
">
</div>


<div class="ball">
⚽
</div>

</div>




<div class="clock"
id="clock">
00:00
</div>


<div class="score"
id="score">
0 : 0
</div>



<div class="log"
id="log">

Simulator bereit...

</div>



</div>


</div>





<script>


let minute=0;

let homeGoals=0;

let awayGoals=0;

let timer;



function write(text){

let log=document.getElementById("log");

log.innerHTML +=

"<br>"+minute+
":00 - "+
text;

log.scrollTop=log.scrollHeight;

}





function startGame(){


clearInterval(timer);


write("⚽ ANPFIFF");



let homeXG=
parseFloat(
document.getElementById("homeXG").value
);



let awayXG=
parseFloat(
document.getElementById("awayXG").value
);



timer=setInterval(function(){


minute++;


document.getElementById("clock").innerHTML=
minute+":00";



let chance=Math.random();



if(chance < homeXG/200){


homeGoals++;


write(
"⚽ TOR "+
document.getElementById("homeName").value
);


}



if(chance >0.75 &&
chance <0.75+(awayXG/200)){


awayGoals++;


write(
"⚽ TOR "+
document.getElementById("awayName").value
);


}



document.getElementById("score").innerHTML=

homeGoals+
" : "+
awayGoals;



if(minute>=90){


clearInterval(timer);


write("⏱ ABPFIFF");


write(
"ENDSTAND "+
homeGoals+
":"+
awayGoals
);


}



},300);



}





function resetGame(){


clearInterval(timer);


minute=0;

homeGoals=0;

awayGoals=0;



document.getElementById("clock").innerHTML="00:00";

document.getElementById("score").innerHTML="0 : 0";


document.getElementById("log").innerHTML=

"Simulation zurückgesetzt...";


}





function updateData(){


document.getElementById("log").innerHTML=

"✅ Daten aktualisiert<br><br>"+

document.getElementById("homeName").value+

" gegen "+

document.getElementById("awayName").value;



}



</script>


</body>

</html>
