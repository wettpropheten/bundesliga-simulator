<!DOCTYPE html><html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Ergebnis-Rechner & Simulator</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; 
            background: #000000; 
            color: #ffffff; 
            padding: 20px; 
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #f5f5f7;
            margin-bottom: 25px;
        }
        .box { 
            background: #1a1a1a; 
            border: 1px solid #2d2d2d;
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
        }
        .input-row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 12px; 
            align-items: flex-end; 
            gap: 15px;
        }
        .field-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        .field-group label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: bold;
        }
        input[type="text"] { 
            width: 140px; 
            padding: 8px; 
            background: #2b2b2b; 
            color: #ffffff; 
            border: 1px solid #404040; 
            border-radius: 6px;
            font-weight: bold;
        }
        input[type="text"]:disabled { background: #1f1f1f; color: #777777; border: 1px solid #2a2a2a; }
        input[type="number"] { 
            width: 65px; 
            padding: 8px; 
            background: #2b2b2b; 
            color: #ffffff; 
            border: 1px solid #404040; 
            border-radius: 6px; 
            font-weight: bold;
            text-align: center;
        }
        input[type="color"] { width: 45px; height: 34px; border: 1px solid #404040; border-radius: 6px; cursor: pointer; background: transparent; padding: 0; }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        #spin-btn { 
            flex: 3;
            padding: 16px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            border-radius: 8px; 
            border: none; 
            background: #2f855a; 
            color: white; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #spin-btn:hover { background: #276749; }
        #spin-btn:disabled { background: #4a5568; cursor: not-allowed; opacity: 0.6; }

        #reset-btn {
            flex: 1;
            padding: 16px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            border: 1px solid #404040;
            background: #2b2b2b;
            color: #ef4444;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #reset-btn:hover { background: #3f3f46; border-color: #ef4444; }

        #error { color: #f56565; font-weight: bold; margin-bottom: 15px; display: none; font-size: 14px; text-align: center; }

        .dashboard {
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .dash-item { text-align: center; flex: 1; padding: 5px; }
        .dash-item:not(:last-child) { border-right: 1px solid #2d2d2d; }
        .dash-name { font-size: 12px; color: #a0aec0; text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
        .dash-pct { font-size: 22px; font-weight: bold; }

        .scoreboard-bundesliga {
            height: 150px;
            background: #000000;
            border: 4px solid #b8860b; 
            box-shadow: 0 0 15px rgba(184, 134, 11, 0.4);
            display: flex;
            flex-direction: row;
            overflow: hidden;
        }
        .team-block {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
        }
        #block-home { background-color: #dd0000; }
        #block-away { background-color: #1a1a1a; }

        .team-name {
            font-size: 42px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            font-family: Arial, sans-serif;
        }

        .center-block {
            width: 160px;
            background: #ffffff; 
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            border-left: 2px solid #000;
            border-right: 2px solid #000;
        }
        .score-row {
            height: 80px;
            line-height: 80px;
            font-size: 50px;
            font-weight: 900;
            color: #000000;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 100%);
            border-bottom: 2px solid #666;
            text-align: center;
        }
        .time-row {
            flex: 1;
            line-height: 65px;
            font-size: 34px;
            font-weight: bold;
            color: #000000;
            background: #cccccc; 
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .status-bar {
            margin-top: 15px;
            font-size: 14px;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sport Ergebnis-Rechner & Simulator</h1>
    
    <div class="box">
        <div id="error">Die Prozentwerte müssen genau 100 ergeben.</div>
        <div class="input-row">
            <div class="field-group"><label>Heim-Name</label><input type="text" id="name1" value="FCB"></div>
            <div class="field-group"><label>Chance</label><span><input type="number" id="pct1" value="64"> %</span></div>
            <div class="field-group"><label>Farbe</label><input type="color" id="col1" value="#dd0000"></div>
        </div>
        <div class="input-row">
            <div class="field-group"><label>Remis</label><input type="text" value="Unentschieden" disabled></div>
            <div class="field-group"><label>Chance</label><span><input type="number" id="pct2" value="24"> %</span></div>
            <div class="field-group"><label>Farbe</label><input type="color" id="col2" value="#718096"></div>
        </div>
        <div class="input-row">
            <div class="field-group"><label>Gast-Name</label><input type="text" id="name3" value="SGE"></div>
            <div class="field-group"><label>Chance</label><span><input type="number" id="pct3" value="12"> %</span></div>
            <div class="field-group"><label>Farbe</label><input type="color" id="col3" value="#1a1a1a"></div>
        </div>
        
        <div class="btn-container">
            <button id="spin-btn" onclick="simulate()">Spiel simulieren</button>
            <button id="reset-btn" onclick="resetResult()">Reset</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="dash-item"><div class="dash-name">Heim</div><div class="dash-pct" id="dash-val1">64%</div></div>
        <div class="dash-item"><div class="dash-name">Remis</div><div class="dash-pct" id="dash-val2">24%</div></div>
        <div class="dash-item"><div class="dash-name">Gast</div><div class="dash-pct" id="dash-val3">12%</div></div>
    </div>

    <div class="scoreboard-bundesliga">
        <div class="team-block" id="block-home"><div class="team-name" id="display-name-home">FCB</div></div>
        <div class="center-block">
            <div class="score-row" id="result-score">? - ?</div>
            <div class="time-row" id="display-time">90:00</div>
        </div>
        <div class="team-block" id="block-away"><div class="team-name" id="display-name-away">SGE</div></div>
    </div>
    
    <div class="status-bar" id="status-text">Bereit</div>
</div>

<script>
    function updateLiveView() {
        const nameHome = document.getElementById('name1').value;
        const nameAway = document.getElementById('name3').value;
        
        const pct1 = parseInt(document.getElementById('pct1').value) || 0;
        const pct2 = parseInt(document.getElementById('pct2').value) || 0;
        const pct3 = parseInt(document.getElementById('pct3').value) || 0;

        const colHome = document.getElementById('col1').value;
        const colAway = document.getElementById('col3').value;

        document.getElementById('display-name-home').innerText = nameHome;
        document.getElementById('display-name-away').innerText = nameAway;
        
        document.getElementById('dash-val1').innerText = pct1 + '%';
        document.getElementById('dash-val2').innerText = pct2 + '%';
        document.getElementById('dash-val3').innerText = pct3 + '%';

        document.getElementById('block-home').style.backgroundColor = colHome;
        document.getElementById('block-away').style.backgroundColor = colAway;

        if (pct1 + pct2 + pct3 === 100) {
            document.getElementById('error').style.display = 'none';
        }
    }

    function getRandomGoals() {
        const rand = Math.random();
        if (rand < 0.25) return 0;
        if (rand < 0.55) return 1;
        if (rand < 0.80) return 2;
        if (rand < 0.93) return 3;
        return Math.floor(Math.random() * 3) + 4;
