.pause{

.reset{

.score{

font-weight:bold;

}



.clock{

font-size:32px;

color:#00ff66;

margin:10px;

}



/* LIVETICKER */


.ticker{

height:600px;

overflow:auto;

background:
rgba(0,0,0,.75);

border-radius:15px;

padding:15px;

}



.event{

display:grid;

grid-template-columns:

160px 70px 1fr;

padding:10px;

border-bottom:
1px solid #ffffff22;

font-size:17px;

}



.event .home{

text-align:right;

font-weight:bold;

}


.event .time{

text-align:center;

color:#00ff66;

font-weight:bold;

}


.event .text{

text-align:left;

}



/* MANNSCHAFTSKARTEN */


.cards{

margin-top:25px;

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:15px;

}



.card{

background:
rgba(0,0,0,.35);

border-radius:15px;

padding:15px;

}



.logoPreview{

width:60px;

height:60px;

object-fit:contain;

}



@media(max-width:900px){

.layout{

grid-template-columns:1fr;

}


.cards{

grid-template-columns:1fr;

}

}

let a=teams[awaySelect.value];

// ================================
// TEIL 3
// SIMULATIONS ENGINE
// ================================


let timer=null;

let minute=0;

let homeScore=0;

let awayScore=0;

let paused=false;




// ================================
// TEAM DATEN HOLEN
// ================================


function getHomeTeam(){

return teams[homeSelect.value];

}


function getAwayTeam(){

return teams[awaySelect.value];

}




// ================================
// FORM AUSWERTUNG
// ================================


function formValue(form){


let wert=0;


for(let x of form){


if(x==="S")
wert+=3;


if(x==="U")
wert+=1;


if(x==="N")
wert-=2;


}


return wert;


}





// ================================
// SPIELSTÄRKE
// ================================


function calculatePower(team,isHome){


let power=

(team.xg*30)

+

formValue(team.form)

+

formValue(
isHome ?
team.homeForm:
team.awayForm
);



return power;


}






// ================================
// LIVETICKER
// ================================


function addEvent(left,text){


let box=document.getElementById("ticker");


let row=document.createElement("div");


row.className="event";


row.innerHTML=`

<div class="home">

${left}

</div>


<div class="time">

${minute}'

</div>


<div class="text">

${text}

</div>


`;



box.appendChild(row);


box.scrollTop=
box.scrollHeight;


}






// ================================
// TOR
// ================================


function goal(team){


if(team==="home"){


homeScore++;


addEvent(
homeSelect.value,
"⚽ TOR!"
);


}


else{


awayScore++;


addEvent(
awaySelect.value,
"⚽ TOR!"
);


}



document.getElementById("homeGoals")
.innerHTML=
homeScore;



document.getElementById("awayGoals")
.innerHTML=
awayScore;


}








// ================================
// MINUTE BERECHNUNG
// ================================


function simulateMinute(){



if(paused)
return;



minute++;



document.getElementById("minute")
.innerHTML=
minute;



let home=getHomeTeam();

let away=getAwayTeam();



let hp=
calculatePower(home,true);



let ap=
calculatePower(away,false);



let total=
hp+ap;



let homeChance=
(hp/total)*0.10;



let awayChance=
(ap/total)*0.10;




// normale Aktionen


let event=Math.random();



if(event<0.15){


addEvent(
homeSelect.value,
"Angriff über die Außenbahn"
);


}


else if(event<0.30){


addEvent(
awaySelect.value,
"Konterchance"
);


}


else if(event<0.40){


addEvent(
"",
"Schuss aufs Tor"
);


}


else if(event<0.48){


addEvent(
"",
"Ecke"
);


}



else if(event<0.52){


addEvent(
"",
"Torwartparade"
);


}





// Tore prüfen


if(Math.random()<homeChance){


goal("home");


}



if(Math.random()<awayChance){


goal("away");


}





// Halbzeit


if(minute===45){


addEvent(
"",
"⏱ HALBZEIT"
);


}





// Ende


if(minute>=90){



clearInterval(timer);


timer=null;



addEvent(
"",
"🏁 ABPFIFF"
);



showAnalysis();


}



}

// =================================
// AUSGANGSWAHRSCHEINLICHKEIT
// =================================


function calculateWinner(){


let home=getHomeTeam();

let away=getAwayTeam();



let homeChance=
Number(home.win);



let awayChance=
Number(away.win);



let drawChance=
Number(home.draw);



let total=
homeChance+
drawChance+
awayChance;



let zufall=
Math.random()*total;



if(zufall < homeChance){


return "home";


}


else if(
zufall < homeChance+drawChance
){


return "draw";


}


else{


return "away";


}


}







// =================================
// TORTENDENZ
// =================================


function goalAmount(team){



let r=
Math.random()*100;



let low=
team.goals.low;



let mid=
team.goals.mid;



if(r < low){


return Math.floor(
Math.random()*2
);


}



else if(
r < low+mid
){


return 2+
Math.floor(
Math.random()*2
);


}



else{


return 4+
Math.floor(
Math.random()*3
);


}



}








// =================================
// xG TOR ANPASSUNG
// =================================


function calculateExpectedGoals(team){



let basis=
team.xg;



let formBonus=
formValue(team.form)/50;



let zufall=
(Math.random()*0.6)-0.3;



let result=
basis+
formBonus+
zufall;



if(result<0.2)

result=0.2;



return result;



}








// =================================
// REALISTISCHE TORPRÜFUNG
// =================================


function improvedGoalCheck(){



let home=getHomeTeam();

let away=getAwayTeam();



let homePower=
calculatePower(home,true);



let awayPower=
calculatePower(away,false);



let total=
homePower+
awayPower;



let homeProbability=
(homePower/total)*0.12;



let awayProbability=
(awayPower/total)*0.12;



// Heimtor


if(Math.random()<homeProbability){


goal("home");


}



// Auswärtstor


if(Math.random()<awayProbability){


goal("away");


}



}
