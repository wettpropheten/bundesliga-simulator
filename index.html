<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Ergebnis-Rechner & Simulator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #a61c1c;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .main-container {
            display: flex;
            width: 100%;
            max-width: 1000px;
            gap: 20px;
            margin-bottom: 20px;
        }
        /* Linkes Control Panel */
        .control-panel {
            background-color: #0b0b0b;
            width: 35%;
            padding: 20px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .control-panel h2 {
            font-size: 16px;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 10px;
            line-height: 1.3;
        }
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .field-group label {
            font-size: 10px;
            color: #aaa;
            text-transform: uppercase;
        }
        .select-field {
            background-color: #222;
            color: white;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 4px;
            width: 100%;
            cursor: pointer;
        }
        .btn {
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
        }
        .btn-update { background-color: #a61c1c; color: white; }
        .btn-reset { background-color: #333; color: #aaa; }
        .btn-start { background-color: #222; color: #555; }
        .btn-start.active { background-color: #d97706; color: white; }

        /* Rechtes Grafik Panel */
        .graph-panel {
            background-color: #1a1a1a;
            width: 65%;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
        }
        .bars-container {
            height: 120px;
            display: flex;
            background-color: #555;
        }
        .bar-wrapper {
            flex: 1;
            display: flex;
            align-items: flex-end;
            position: relative;
            background-color: #333;
            border-right: 2px solid #1a1a1a;
        }
        .bar-wrapper:last-child { border-right: none; }
        .bar-wrapper:nth-child(2) { background-color: #e5e5e5; }
        .bar {
            width: 100%;
            height: 0%;
            transition: height 0.5s ease;
        }
        .bar-heim { background-color: #444; }
        .bar-remis { background-color: #ccc; }
        .bar-gast { background-color: #444; }
        
        .labels-container {
            background-color: #0b0b0b;
            display: flex;
            padding: 10px 0;
            text-align: center;
        }
        .label-box {
            flex: 1;
        }
        .label-title {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 2px;
        }
        .label-percent {
            font-size: 18px;
            font-weight: bold;
        }
        .simulation-output {
            background-color: #222;
            flex-grow: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 150px;
            font-size: 14px;
            color: #ccc;
            text-align: center;
        }
        .result-highlight {
            font-size: 24px;
            font-weight: bold;
            color: #d97706;
            margin-top: 10px;
        }

        /* Unterer Bereich: Mannschaftskarten */
        .bottom-section {
            width: 100%;
            max-width: 1000px;
        }
        .bottom-title {
            text-align: center;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        .cards-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .team-card {
            background-color: #044e3a;
            padding: 15px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .team-badge {
            background-color: #022c21;
            padding: 8px 15px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 4px;
            min-width: 70px;
            text-align: center;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex: 1;
            min-width: 100px;
        }
        .input-group label {
            font-size: 10px;
            color: #a3e635;
            text-transform: uppercase;
        }
        .input-group input {
            background-color: #022c21;
            color: white;
            border: 1px solid #047857;
            padding: 6px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- LINKES PANEL: EINSTELLUNGEN -->
        <div class="control-panel">
            <h2>Sport Ergebnis-Rechner &<br>Simulator</h2>
            
            <div class="field-group">
                <label>Heim-Name</label>
                <select id="select-heim" class="select-field">
                    <option value="FCB" selected>FCB</option>
                    <option value="BVB">BVB</option>
                </select>
            </div>

            <div class="field-group">
                <label>Gast-Name</label>
                <select id="select-gast" class="select-field">
                    <option value="FCB">FCB</option>
                    <option value="BVB" selected>BVB</option>
                </select>
            </div>

            <button class="btn btn-update" onclick="aktualisieren()">Aktualisieren</button>
            <button class="btn btn-reset" onclick="resetForm()">Reset</button>
            <button id="btn-start" class="btn btn-start" onclick="simulieren()" disabled>Start</button>
        </div>

        <!-- RECHTES PANEL: GRAFIK & SIMULATION -->
        <div class="graph-panel">
            <div class="bars-container">
                <div class="bar-wrapper"><div id="bar-heim" class="bar bar-heim"></div></div>
                <div class="bar-wrapper"><div id="bar-remis" class="bar bar-remis"></div></div>
                <div class="bar-wrapper"><div id="bar-gast" class="bar bar-gast"></div></div>
            </div>
            
            <div class="labels-container">
                <div class="label-box">
                    <div class="label-title">Heim</div>
                    <div id="txt-heim" class="label-percent">0%</div>
                </div>
                <div class="label-box">
                    <div class="label-title">Remis</div>
                    <div id="txt-remis" class="label-percent">0%</div>
                </div>
                <div class="label-box">
                    <div class="label-title">Gast</div>
                    <div id="txt-gast" class="label-percent">0%</div>
                </div>
            </div>

            <div id="simulation-text" class="simulation-output">
                Klicke zuerst auf "Aktualisieren", um die Daten zu laden.
            </div>
        </div>
    </div>

    <!-- UNTERER BEREICH: MANNSCHAFTSKARTEN -->
    <div class="bottom-section">
        <div class="bottom-title">Aktuelle Daten Eingabe der Mannschaften</div>
        
        <div class="cards-grid">
            <!-- Karte FCB -->
            <div class="team-card" id="card-FCB">
                <div class="team-badge">FCB</div>
                <div class="input-group">
                    <label>Angriff (1-100)</label>
                    <input type="number" class="val-angriff" value="75" min="1" max="100">
                </div>
                <div class="input-group">
                    <label>Abwehr (1-100)</label>
                    <input type="number" class="val-abwehr" value="70" min="1" max="100">
                </div>
                <div class="input-group">
                    <label>Form (1-5)</label>
                    <input type="number" class="val-form" value="4" min="1" max="5">
                </div>
                <div class="input-group">
                    <label>Heimvorteil (+)</label>
                    <input type="number" class="val-heimvorteil" value="5" min="0" max="20">
                </div>
            </div>

            <!-- Karte BVB -->
            <div class="team-card" id="card-BVB">
                <div class="team-badge">BVB</div>
                <div class="input-group">
                    <label>Angriff (1-100)</label>
                    <input type="number" class="val-angriff" value="72" min="1" max="100">
                </div>
                <div class="input-group">
                    <label>Abwehr (1-100)</label>
                    <input type="number" class="val-abwehr" value="68" min="1" max="100">
                </div>
                <div class="input-group">
                    <label>Form (1-5)</label>
                    <input type="number" class="val-form" value="3" min="1" max="5">
                </div>
                <div class="input-group">
