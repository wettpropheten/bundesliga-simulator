<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bundesliga Simulator PRO</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;

padding:25px;

font-family:Arial,Helvetica,sans-serif;

background:
radial-gradient(circle at top,#1b3d2a,#050505 70%);

color:white;

}


/* Kopfbereich */

.header{

text-align:center;

margin-bottom:35px;

}


.header h1{

font-size:48px;

letter-spacing:3px;

margin:0;

text-shadow:
0 5px 15px black;

}


.header p{

color:#aaa;

font-size:18px;

}






/* Allgemeine Boxen */

.box{

background:
linear-gradient(145deg,#222,#0d0d0d);

border-radius:25px;

padding:25px;

margin:25px auto;

max-width:1600px;

border:1px solid #444;

box-shadow:

10px 10px 25px black,

inset 0 0 20px rgba(255,255,255,0.05);

}







/* Auswahlbereich */


.selection{

display:grid;

grid-template-columns:1fr 1fr;

gap:30px;

}





select,
input{

width:100%;

padding:12px;

margin-top:8px;

background:#111;

color:white;

border:

1px solid #555;

border-radius:12px;

font-size:17px;

}








/* 3D Karten */


.teamPanel{

background:

linear-gradient(145deg,#333,#111);

border-radius:20px;

padding:25px;

margin-top:20px;

box-shadow:

8px 8px 20px black,

inset 0 0 15px rgba(255,255,255,.1);

border:1px solid #555;

}



.teamPanel h2{

text-align:center;

font-size:28px;

}





/* Stadion */

.stadium{

background:

linear-gradient(
135deg,
#064d22,
#021b0b
);

border:

3px solid #148f45;

}





.matchTitle{

text-align:center;

font-size:30px;

margin-bottom:30px;

}





.scoreArea{

display:grid;

grid-template-columns:1fr auto 1fr;

align-items:center;

text-align:center;

gap:40px;

}




.clubName{

font-size:32px;

font-weight:bold;

}




.scoreBoard{


background:#050505;

font-size:70px;

padding:30px 50px;

border-radius:25px;

box-shadow:

0 0 30px black,

inset 0 0 15px #444;

}





.clock{

text-align:center;

font-size:35px;

margin-top:25px;

background:#111;

padding:15px;

border-radius:15px;

}





/* Statistik */


.statistics{

display:grid;

grid-template-columns:repeat(6,1fr);

gap:15px;

}




.stat{

background:#181818;

border-radius:15px;

padding:20px;

text-align:center;

font-size:18px;

box-shadow:

5px 5px 15px black;

}




.stat span{

display:block;

font-size:30px;

margin-top:10px;

color:#00cc66;

}








/* Buttons */


button{

width:100%;

padding:18px;

margin-top:15px;

border:none;

border-radius:15px;

background:

linear-gradient(#00a651,#006b35);

color:white;

font-size:20px;

font-weight:bold;

cursor:pointer;

box-shadow:

5px 5px 15px black;

}


button:hover{

transform:scale(1.02);

}








@media(max-width:900px){


.selection{

grid-template-columns:1fr;

}



.scoreArea{

grid-template-columns:1fr;

}



.statistics{

grid-template-columns:repeat(2,1fr);

}


}


</style>


</head>


<body>

</h1>


<p>

</p>


</div>
<!-- =============================== -->

<!-- =============================== -->

<section class="box stadium">


<div class="matchTitle">

LIVE SPIEL

</div>




<div class="scoreArea">



<div class="clubName" id="homeName">

</div>



<div class="scoreBoard">


<span id="homeScore">

0

</span>

<span id="awayScore">

</span>

</div>

Ballbesitz

</span>

</div>



<div class="stat">

Schüsse

0:0

</span>

</div>



<div class="stat">

Ecken

</span>

</div>

Gelbe Karten

</span>

</div>

</span>

</div>



<div class="stat">

Chance

50%

</span>

</div>


</section>








<!-- =============================== -->

<!-- =============================== -->


<section class="box">


<h2 style="text-align:center">

Spielgeschehen

</h2>



<div style="
display:grid;
grid-template-columns:1fr 100px 1fr;
gap:20px;
font-weight:bold;
text-align:center;
margin-bottom:15px;
">


<div>
HEIM
</div>


<div>
ZEIT
</div>


<div>
GAST
</div>


</div>





<div id="ticker"

style="
display:grid;
grid-template-columns:1fr 100px 1fr;
gap:10px;
align-items:center;

border-radius:15px;

</section>








<!-- =============================== -->

<section class="box">

<section class="box">

Mannschaftseinstellungen

</h2>

style="
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
">

<script>


// =====================================
// AUSWAHLEN FÜLLEN
// =====================================


function loadTeams(){


let home=document.getElementById("homeTeam");

let away=document.getElementById("awayTeam");



Object.keys(teams).forEach(id=>{


home.innerHTML +=

`
<option value="${id}">
${id} - ${teams[id].name}
</option>
`;



away.innerHTML +=

`
<option value="${id}">
${id} - ${teams[id].name}
</option>
`;



});



createTeamCards();


updateMatchTeams();


}








// =====================================
// TEAM KARTEN ERSTELLEN
// =====================================



function createTeamCards(){


let box=document.getElementById("teamEditor");


box.innerHTML="";



Object.keys(teams).forEach(id=>{


let t=teams[id];



box.innerHTML +=


`

<div class="teamPanel">


<h2>

${id}

<br>

${t.name}

</h2>




<label>
Siegchance %
</label>


<input type="number"

value="${t.win}"

onchange="teams['${id}'].win=Number(this.value)">





<label>
Tor Tendenz (0-3)
</label>


<input type="number"

value="${t.goalTrend}"

min="0"

max="3"

onchange="teams['${id}'].goalTrend=Number(this.value)">






<label>
xGoals
</label>


<input type="number"

step="0.01"

value="${t.xg}"

onchange="teams['${id}'].xg=Number(this.value)">





<label>
Wahrscheinlichkeit %
</label>


<input type="number"

value="${t.probability}"

onchange="teams['${id}'].probability=Number(this.value)">





<label>
Form
</label>


<input type="text"

value="${t.form.join(" ")}"

onchange="
teams['${id}'].form=this.value.split(' ')
">





<label>
Heimform
</label>


<input type="text"

value="${t.homeForm.join(" ")}"

onchange="
teams['${id}'].homeForm=this.value.split(' ')
">





<label>
Auswärtsform
</label>


<input type="text"

value="${t.awayForm.join(" ")}"

onchange="
teams['${id}'].awayForm=this.value.split(' ')
">

`;

// =====================================
// HEIM / GAST ANZEIGE

let h=

teams[

];



let a=

teams[
document.getElementById("awayTeam").value
];

h.name;



document.getElementById("awayName").innerHTML=

a.name;

`

Siegchance: ${h.win}%<br>

xGoals: ${h.xg}<br>

`;

`

xGoals: ${a.xg}<br>

`;



}

<script>


// =======================================
// FORM BERECHNUNG
// =======================================


function calculateForm(form){


let points=0;


form.forEach(x=>{


if(x=="S") points+=3;


if(x=="U") points+=1;


if(x=="N") points-=1;


});


return points;

}








// =======================================
// SPIELSTÄRKE BERECHNUNG
// =======================================


function calculateMatchPower(team,isHome){


let power=0;



power += team.win * 0.45;



power += calculateForm(team.form) * 0.05;



if(isHome){


power += calculateForm(team.homeForm)*0.08;


}
else{


power += calculateForm(team.awayForm)*0.08;


}




power += team.goalTrend * 3;



power += team.xg * 10;



return power;


}








// =======================================
// WAHRSCHEINLICHKEITEN
// =======================================



function calculateProbability(){



let home=

teams[
document.getElementById("homeTeam").value
];



let away=

teams[
document.getElementById("awayTeam").value
];





let homePower=

calculateMatchPower(home,true);



let awayPower=

calculateMatchPower(away,false);






let total=

homePower+awayPower+10;





let homeChance=

Math.round(
(homePower+10)/total*100
);




let awayChance=

Math.round(
awayPower/total*100
);




let drawChance=

100-homeChance-awayChance;






document.getElementById("winChance").innerHTML=

homeChance+
"% / "+
drawChance+
"% / "+
awayChance+
"%";





return {


homeChance,

drawChance,

awayChance


};


}









// =======================================
// XGOALS BERECHNUNG
// =======================================



function calculateXGoals(){



let home=

teams[
document.getElementById("homeTeam").value
];



let away=

teams[
document.getElementById("awayTeam").value
];






let homeX=

home.xg;



let awayX=

away.xg;





// Form beeinflusst Tore


homeX += calculateForm(home.homeForm)*0.02;


awayX += calculateForm(away.awayForm)*0.02;





if(homeX<0.3)
homeX=0.3;


if(awayX<0.3)
awayX=0.3;







document.getElementById("xGoals").innerHTML=

homeX.toFixed(2)+

" : "

+

awayX.toFixed(2);





return {


homeX,

awayX


};


}









// =======================================
// SPIEL VORBEREITUNG
// =======================================



function prepareMatch(){


calculateProbability();


calculateXGoals();


}




</script>
<script>


// =======================================
// SIMULATION VARIABLEN
// =======================================


let timer;

let minute=0;

let homeGoals=0;

let awayGoals=0;


let matchStats={

homeShots:0,

awayShots:0,

homeCorners:0,

awayCorners:0,

homeCards:0,

awayCards:0

};









// =======================================
// SPIEL STARTEN
// =======================================


function startSimulation(){



clearInterval(timer);



prepareMatch();



minute=0;

homeGoals=0;

awayGoals=0;



document.getElementById("homeScore").innerHTML=0;

document.getElementById("awayScore").innerHTML=0;



document.getElementById("ticker").innerHTML="";




timer=setInterval(playMinute,700);



}








// =======================================
// EINZELNE SPIELMINUTE
// =======================================


function playMinute(){



minute++;





document.getElementById("matchMinute").innerHTML=

minute+
":00";






let home=

teams[
document.getElementById("homeTeam").value
];



let away=

teams[
document.getElementById("awayTeam").value
];





let xg=

calculateXGoals();







// Heimchance


let homeChance=

xg.homeX/90;





if(Math.random()<homeChance){


homeGoals++;


addEvent(

home.name,

"Tor"

);


}








// Gastchance


let awayChance=

xg.awayX/90;





if(Math.random()<awayChance){


awayGoals++;


addEvent(

away.name,

"Tor"

);


}









// Schüsse


if(Math.random()<0.35){


matchStats.homeShots++;

}


if(Math.random()<0.35){


matchStats.awayShots++;

}








// Ecken


if(Math.random()<0.15){


matchStats.homeCorners++;

}


if(Math.random()<0.15){


matchStats.awayCorners++;

}









// Karten


if(Math.random()<0.04){


matchStats.homeCards++;


addEvent(

home.name,

"Gelbe Karte"

);


}





if(Math.random()<0.04){


matchStats.awayCards++;


addEvent(

away.name,

"Gelbe Karte"

);


}







updateScore();





if(minute>=90){


clearInterval(timer);


addEvent(

"",

"Spiel beendet"

);


}



}









// =======================================
// LIVETICKER 3 SPALTEN
// =======================================



function addEvent(team,event){



let ticker=

document.getElementById("ticker");



let left="";

let right="";




if(team==teams[document.getElementById("homeTeam").value].name){


left=

event+" "+team;


}

else{


right=

event+" "+team;


}




ticker.innerHTML +=



`

<div>

${left}

</div>


<div style="text-align:center">

${minute}'

</div>


<div>

${right}

</div>


`;





ticker.scrollTop=ticker.scrollHeight;



}









// =======================================
// ANZEIGE AKTUALISIEREN
// =======================================



function updateScore(){



document.getElementById("homeScore").innerHTML=

homeGoals;



document.getElementById("awayScore").innerHTML=

awayGoals;






document.getElementById("shots").innerHTML=

matchStats.homeShots+

" : "

+

matchStats.awayShots;







document.getElementById("corners").innerHTML=

matchStats.homeCorners+

" : "

+

matchStats.awayCorners;







document.getElementById("yellowCards").innerHTML=

matchStats.homeCards+

" : "

+

matchStats.awayCards;





}









// =======================================
// RESET
// =======================================



function resetSimulation(){



clearInterval(timer);



minute=0;

homeGoals=0;

awayGoals=0;



document.getElementById("homeScore").innerHTML=0;

document.getElementById("awayScore").innerHTML=0;



document.getElementById("matchMinute").innerHTML="00:00";


document.getElementById("ticker").innerHTML="";



}









// =======================================
// SPEICHERN
// =======================================



function saveData(){



localStorage.setItem(

"bundesligaPro",

JSON.stringify(teams)

);



alert("Daten gespeichert");

}



</script>
