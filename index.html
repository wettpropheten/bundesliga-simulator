<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Ergebnis-Rechner & Simulator</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; 
            background: #000000; 
            color: #ffffff; 
            padding: 20px; 
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #f5f5f7;
            margin-bottom: 25px;
        }
        .box { 
            background: #1a1a1a; 
            border: 1px solid #2d2d2d;
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
        }
        .input-row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 12px; 
            align-items: flex-end; 
            gap: 15px;
        }
        .field-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        .field-group label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: bold;
        }
        input[type="text"] { 
            width: 140px; 
            padding: 8px; 
            background: #2b2b2b; 
            color: #ffffff; 
            border: 1px solid #404040; 
            border-radius: 6px;
            font-weight: bold;
        }
        input[type="text"]:disabled { background: #1f1f1f; color: #777777; border: 1px solid #2a2a2a; }
        input[type="number"] { 
            width: 65px; 
            padding: 8px; 
            background: #2b2b2b; 
            color: #ffffff; 
            border: 1px solid #404040; 
            border-radius: 6px; 
            font-weight: bold;
            text-align: center;
        }
        input[type="color"] { width: 45px; height: 34px; border: 1px solid #404040; border-radius: 6px; cursor: pointer; background: transparent; padding: 0; }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        #spin-btn { 
            flex: 3;
            padding: 16px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            border-radius: 8px; 
            border: none; 
            background: #2f855a; 
            color: white; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #spin-btn:hover { background: #276749; }
        #spin-btn:disabled { background: #4a5568; cursor: not-allowed; opacity: 0.6; }

        #reset-btn {
            flex: 1;
            padding: 16px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            border: 1px solid #404040;
            background: #2b2b2b;
            color: #ef4444;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #reset-btn:hover { background: #3f3f46; border-color: #ef4444; }

        #error { color: #f56565; font-weight: bold; margin-bottom: 15px; display: none; font-size: 14px; text-align: center; }

        .dashboard {
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .dash-item { text-align: center; flex: 1; padding: 5px; }
        .dash-item:not(:last-child) { border-right: 1px solid #2d2d2d; }
        .dash-name { font-size: 12px; color: #a0aec0; text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
        .dash-pct { font-size: 22px; font-weight: bold; }

        .scoreboard-bundesliga {
            height: 150px;
            background: #000000;
            border: 4px solid #b8860b; 
            box-shadow: 0 0 15px rgba(184, 134, 11, 0.4);
            display: flex;
            flex-direction: row;
            overflow: hidden;
        }
        .team-block {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
        }
        #block-home { background-color: #dd0000; }
        #block-away { background-color: #1a1a1a; }

        .team-name {
            font-size: 42px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            font-family: Arial, sans-serif;
        }

        .center-block {
            width: 160px;
            background: #ffffff; 
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            border-left: 2px solid #000;
            border-right: 2px solid #000;
        }
        .score-row {
            height: 80px;
            line-height: 80px;
            font-size: 50px;
            font-weight: 900;
            color: #000000;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 100%);
            border-bottom: 2px solid #666;
            text-align: center;
        }
        .time-row {
            flex: 1;
            line-height: 65px;
            font-size: 36px;
            font-weight: bold;
            color: #000000;
            background: #cccccc; 
            font-family: Arial, sans-serif;
            text-align: center;
        }
    </style>
    <script>
        // DIE ABSOLUT SICHERE LOGIK - STARTET GARANTIERT ERST WENN DIE SEITE BEREIT IST
        const torePoolHeim = ["1:0", "2:0", "2:1", "3:0", "3:1", "3:2", "4:0"];
        const torePoolRemis = ["0:0", "1:1", "2:2"];
        const torePoolGast = ["0:1", "0:2", "1:2", "0:3", "1:3", "2:3", "0:4"];
        let tickerInterval = null;
        let isRunning = false;

        function liveUpdateDashboard() {
            const spinBtn = document.getElementById('spin-btn');
            const errorDiv = document.getElementById('error');
            
            const p1 = parseInt(document.getElementById('pct1').value) || 0;
            const p2 = parseInt(document.getElementById('pct2').value) || 0;
            const p3 = parseInt(document.getElementById('pct3').value) || 0;

            if ((p1 + p2 + p3) !== 100) {
                errorDiv.style.display = 'block';
                spinBtn.disabled = true;
                return;
            } else {
                errorDiv.style.display = 'none';
                spinBtn.disabled = false;
            }

            const n1 = document.getElementById('name1').value || "Heim";
            const n3 = document.getElementById('name3').value || "Gast";
            const c1 = document.getElementById('col1').value;
            const c3 = document.getElementById('col3').value;

            document.getElementById('display-name-home').innerText = n1;
            document.getElementById('display-name-away').innerText = n3;
            document.getElementById('block-home').style.backgroundColor = c1;
            document.getElementById('block-away').style.backgroundColor = c3;

            document.getElementById('dash-val1').innerText = p1 + "%";
            document.getElementById('dash-val2').innerText = p2 + "%";
            document.getElementById('dash-val3').innerText = p3 + "%";
            
            document.getElementById('dash-val1').style.color = c1;
            document.getElementById('dash-val3').style.color = c3;

            const checkTextBrightness = (hex) => {
                const r = parseInt(hex.substring(1,3),16);
                const g = parseInt(hex.substring(3,5),16);
                const b = parseInt(hex.substring(5,7),16);
                return ((r*299)+(g*587)+(b*114))/1000 >= 128 ? '#000000' : '#ffffff';
            };
            document.getElementById('display-name-home').style.color = checkTextBrightness(c1);
            document.getElementById('display-name-away').style.color = checkTextBrightness(c3);
        }

        function resetErgebnisNur() {
            if (isRunning) return;
            clearInterval(tickerInterval);
            document.getElementById('result-score').innerText = "? - ?";
            document.getElementById('result-time').innerText = "90:00";
            document.getElementById('result-ticker').innerText = "Bereit für Simulation";
        }

        function simulieren() {
            if (isRunning) return;
            isRunning = true;
            
            const spinBtn = document.getElementById('spin-btn');
            const tickerDiv = document.getElementById('result-ticker');
            const scoreDiv = document.getElementById('result-score');
            const timeDiv = document.getElementById('result-time');

            spinBtn.disabled = true;
            tickerDiv.innerText = "⚡ SPIEL LÄUFT...";
            timeDiv.innerText = "00:00";
            
            const p1 = parseInt(document.getElementById('pct1').value) || 68;
            const p2 = parseInt(document.getElementById('pct2').value) || 20;

            const zufall = Math.floor(Math.random() * 100) + 1;
            let winnerType = "draw";
            let winnerName = "Unentschieden";

            if (zufall <= p1) {
                winnerType = "heim";
                winnerName = document.getElementById('name1').value || "Heim";
            } else if (zufall <= p1 + p2) {
                winnerType = "draw";
                winnerName = "Unentschieden";
            } else {
                winnerType = "gast";
