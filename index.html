<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bundesliga Simulator</title>
    <style>
        body { font-family: Arial; text-align: center; background: #000; color: #fff; padding: 20px; }
        .box { background: #1a1a1a; padding: 20px; border-radius: 12px; max-width: 450px; margin: 0 auto 20px; border: 1px solid #2d2d2d; }
        .row { display: flex; justify-content: space-between; margin-bottom: 12px; align-items: center; }
        input[type="text"] { width: 120px; padding: 6px; background: #2b2b2b; color: #fff; border: 1px solid #404040; border-radius: 6px; font-weight: bold; }
        input[type="number"] { width: 60px; padding: 6px; background: #2b2b2b; color: #fff; border: 1px solid #404040; border-radius: 6px; text-align: center; font-weight: bold; }
        input[type="color"] { width: 40px; height: 30px; border-radius: 6px; border: 1px solid #404040; background: transparent; cursor: pointer; }
        #btn { width: 100%; padding: 14px; background: #2f855a; color: #fff; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        #btn:hover { background: #276749; }
        .board { max-width: 450px; height: 140px; margin: 20px auto; border: 4px solid #b8860b; display: flex; overflow: hidden; box-shadow: 0 0 15px rgba(184,134,11,0.4); }
        .team { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 900; text-shadow: 2px 2px 4px rgba(0,0,0,0.6); }
        #home { background: #00a37e; }
        #away { background: #facc15; color: #000; text-shadow: none; }
        .center { width: 140px; background: #fff; display: flex; flex-direction: column; border-left: 2px solid #000; border-right: 2px solid #000; }
        #score { height: 80px; line-height: 80px; font-size: 45px; font-weight: 900; color: #000; border-bottom: 2px solid #666; }
        #time { flex: 1; line-height: 55px; font-size: 32px; font-weight: bold; color: #000; background: #ccc; }
        #error { color: #f56565; font-weight: bold; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>Sport Ergebnis-Rechner</h1>
    <div class="box">
        <div id="error">⚠️ Werte müssen genau 100% ergeben!</div>
        <div class="row">
            <div style="text-align:left"><label style="font-size:11px;color:#888;display:block">Heim-Name</label><input type="text" id="n1" value="FCB" oninput="up()"></div>
            <div style="text-align:left"><label style="font-size:11px;color:#888;display:block">Chance</label><input type="number" id="p1" value="68" oninput="up()"> %</div>
            <div style="text-align:left"><label style="font-size:11px;color:#888;display:block">Farbe</label><input type="color" id="c1" value="#dd0000" onchange="up()"></div>
        </div>
        <div class="row">
            <div style="text-align:left"><label style="font-size:11px;color:#888;display:block">Remis</label><input type="text" value="Unentschieden" disabled></div>
            <div style="text-align:left"><label style="font-size:11px;color:#888;display:block">Chance</label><input type="number" id="p2" value="20" oninput="up()"> %</div>
            <div style="text-align:left"><label style="font-size:11px;color:#888;display:block">Farbe</label><input type="color" id="c2" value="#718096" onchange="up()"></div>
        </div>
        <div class="row">
            <div style="text-align:left"><label style="font-size:11px;color:#888;display:block">Gast-Name</label><input type="text" id="n3" value="SGE" oninput="up()"></div>
            <div style="text-align:left"><label style="font-size:11px;color:#888;display:block">Chance</label><input type="number" id="p3" value="12" oninput="up()"> %</div>
            <div style="text-align:left"><label style="font-size:11px;color:#888;display:block">Farbe</label><input type="color" id="c3" value="#1a1a1a" onchange="up()"></div>
        </div>
        <button id="btn" onclick="sim()">Spiel simulieren</button>
    </div>

    <div class="board">
        <div class="team" id="home">FCB</div>
        <div class="center">
            <div id="score">0 - 0</div>
            <div id="time">90:00</div>
        </div>
        <div class="team" id="away">SGE</div>
    </div>

<script>
    const hPool = ["1:0", "2:0", "2:1", "3:0", "3:1", "3:2", "4:0"];
    const rPool = ["0:0", "1:1", "2:2"];
    const gPool = ["0:1", "0:2", "1:2", "0:3", "1:3", "2:3", "0:4"];

    function up() {
        const v1 = parseInt(document.getElementById('p1').value) || 0;
        const v2 = parseInt(document.getElementById('p2').value) || 0;
        const v3 = parseInt(document.getElementById('p3').value) || 0;
        const err = document.getElementById('error');
        const b = document.getElementById('btn');

        if ((v1 + v2 + v3) !== 100) { err.style.display = 'block'; b.disabled = true; return; }
        else { err.style.display = 'none'; b.disabled = false; }

        const nameH = document.getElementById('n1').value || "Heim";
        const nameG = document.getElementById('n3').value || "Gast";
        const colH = document.getElementById('c1').value;
        const colG = document.getElementById('c3').value;

        document.getElementById('home').innerText = nameH;
        document.getElementById('away').innerText = nameG;
        document.getElementById('home').style.backgroundColor = colH;
        document.getElementById('away').style.backgroundColor = colG;

        const l = (hex) => {
            const r = parseInt(hex.substring(1,3),16);
            const g = parseInt(hex.substring(3,5),16);
            const b = parseInt(hex.substring(5,7),16);
            return ((r*299)+(g*587)+(b*114))/1000 >= 128 ? '#000' : '#fff';
        };
        document.getElementById('home').style.color = l(colH);
        document.getElementById('away').style.color = l(colG);
    }

    function sim() {
        const b = document.getElementById('btn');
        const sc = document.getElementById('score');
        const ti = document.getElementById('time');

        b.disabled = true;
        ti.innerText = "00:00";
        
        const v1 = parseInt(document.getElementById('p1').value) || 68;
        const v2 = parseInt(document.getElementById('p2').value) || 20;

        const rnd = Math.floor(Math.random() * 100) + 1;
        let type = "draw";

        if (rnd <= v1) type = "home";
        else if (rnd <= v1 + v2) type = "draw";
        else type = "away";

        let steps = 0;
        const run = setInterval(() => {
            sc.innerText = Math.floor(Math.random()*5) + " - " + Math.floor(Math.random()*5);
            let mins = Math.floor((steps / 20) * 90);
            ti.innerText = (mins < 10 ? "0" : "") + mins + ":00";
            steps++;
            if (steps > 20) { 
                clearInterval(run);
                let res = "1 - 1";
                if (type === "home") res = hPool[Math.floor(Math.random()*hPool.length)].replace(":", " - ");
                else if (type === "draw") res = rPool[Math.floor(Math.random()*rPool.length)].replace(":", " - ");
                else res = gPool[Math.floor(Math.random()*gPool.length)].replace(":", " - ");
                sc.innerText = res;
                ti.innerText = "90:00";
                b.disabled = false;
            }
        }, 80);
    }
    up();
</script>
</body>
</html>
