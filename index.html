<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bundesliga Match Simulator PRO</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;
padding:20px;

font-family:Arial,Helvetica,sans-serif;

background:
linear-gradient(135deg,#07111f,#075c32);

color:white;

}


.container{

max-width:1500px;
margin:auto;

}


h1{

text-align:center;
font-size:38px;

text-shadow:
0 5px 20px black;

}


.layout{

display:grid;

grid-template-columns:

330px 1fr;

gap:25px;

}



.glass{

background:

rgba(255,255,255,.12);

border:

1px solid rgba(255,255,255,.25);

border-radius:25px;

padding:25px;

backdrop-filter:

blur(15px);

box-shadow:

0 20px 50px black;

}



h2{

border-bottom:

1px solid rgba(255,255,255,.3);

padding-bottom:10px;

}



label{

display:block;

margin-top:12px;

}



input,
select{


width:100%;

padding:12px;

margin-top:5px;

border-radius:10px;

border:none;

background:#111;

color:white;

}



button{

width:100%;

padding:14px;

margin-top:12px;

border:none;

border-radius:12px;

background:#008f45;

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

}


button:hover{

transform:scale(1.03);

}



.pause{

background:#c58b00;

}


.reset{

background:#b00020;

}



/* MATCHCENTER */


.matchcenter{

text-align:center;

}



.teams{

display:flex;

justify-content:space-between;

align-items:center;

}



.team img{

width:110px;

height:110px;

object-fit:contain;

filter:

drop-shadow(0 8px 10px black);

}



.team h3{

font-size:22px;

}



.score{

font-size:80px;

font-weight:bold;

}



.clock{

font-size:38px;

color:#00ff66;

margin-top:10px;

}




/* LIVETICKER */


.ticker{

margin-top:30px;

height:550px;

overflow:auto;

background:

rgba(0,0,0,.75);

border-radius:20px;

padding:20px;

}



.event{

display:grid;

grid-template-columns:

1fr 80px 1fr;

padding:12px;

border-bottom:

1px solid rgba(255,255,255,.15);

font-size:18px;

}



.homeEvent{

text-align:left;

font-weight:bold;

}



.eventTime{

text-align:center;

color:#00ff66;

font-weight:bold;

}



.awayEvent{

text-align:right;

font-weight:bold;

}




/* KARTEN */


.cards{

margin-top:30px;

display:grid;

grid-template-columns:

repeat(3,1fr);

gap:20px;

}



.card{

background:

rgba(0,0,0,.35);

border-radius:20px;

padding:20px;

}



.card img{

width:80px;

height:80px;

object-fit:contain;

display:block;

margin:auto;

}




@media(max-width:900px){

.layout{

grid-template-columns:1fr;

}


.cards{

grid-template-columns:1fr;

}


}



</style>

</head>

// =======================================
// DROPDOWNS ERSTELLEN
// =======================================


const homeSelect =

const awaySelect =
document.getElementById("awaySelect");



Object.keys(teams).forEach(name=>{


let h=document.createElement("option");

h.value=name;

h.textContent=name;

Object.keys(teams).forEach(name=>{

// =======================================
// SIMULATION ENGINE
// =======================================


let timer=null;

let minute=0;

let homeScore=0;

let awayScore=0;

let paused=false;



function getHomeTeam(){

return teams[homeSelect.value];

}



function getAwayTeam(){

return teams[awaySelect.value];

}





// =======================================
// FORMEL FÜR MANNSCHAFTSSTÄRKE
// =======================================


function formPoints(form){


let p=0;


for(let x of form){


if(x==="S")
p+=3;


if(x==="U")
p+=1;


if(x==="N")
p-=2;


}


return p;

}





function teamStrength(team,home){


let strength=


(team.xg*25)


+

formPoints(team.form)


+

formPoints(
home ?
team.homeForm :
team.awayForm
);



if(home)

strength+=5;



return strength;


}





// =======================================
// LIVETICKER
// =======================================


function addEvent(side,text){


let box=document.getElementById("ticker");


let row=document.createElement("div");


row.className="event";



let left="";

let right="";



if(side==="home"){

left=text;

}


if(side==="away"){

right=text;

}



if(side==="center"){

left="";

right=text;

}



row.innerHTML=`

<div class="homeEvent">

${left}

</div>


<div class="eventTime">

${minute}'

</div>


<div class="awayEvent">

${right}

</div>

`;



box.appendChild(row);


box.scrollTop=

box.scrollHeight;


}





// =======================================
// TORWAHRSCHEINLICHKEIT
// =======================================


function goalChance(team){


let chance=

(team.xg/90)*0.55;



return chance;


}







// =======================================
// TOR
// =======================================


function makeGoal(side){


if(side==="home"){


homeScore++;


addEvent(
"home",
"⚽ TOR"
);


}


else{


awayScore++;


addEvent(
"away",
"⚽ TOR"
);


}



document.getElementById("homeGoals")
.innerHTML=homeScore;


document.getElementById("awayGoals")
.innerHTML=awayScore;


}





// =======================================
// SPIELMINUTE
// =======================================


function simulateMinute(){


if(paused)

return;



minute++;


document.getElementById("minute")
.innerHTML=minute;



let home=getHomeTeam();

let away=getAwayTeam();



let hp=

teamStrength(home,true);


let ap=

teamStrength(away,false);



let total=

hp+ap;



let homeMod=

hp/total;


let awayMod=

ap/total;





// Spielaktionen


let action=Math.random();



if(action<0.12){


addEvent(
"home",
"Angriff"

);


}


else if(action<0.24){


addEvent(
"away",
"Angriff"

);


}




// Tore berechnen


if(Math.random() < goalChance(home)*homeMod){


makeGoal("home");


}



if(Math.random() < goalChance(away)*awayMod){


makeGoal("away");


}






// Karten


if(Math.random()<0.025){


addEvent(
"home",
"🟨 Gelbe Karte"

);


}


if(Math.random()<0.025){


addEvent(
"away",
"🟨 Gelbe Karte"

);


}




// Halbzeit


if(minute===45){


addEvent(
"center",
"⏱ HALBZEIT"

);


}





// Ende


if(minute>=90){


clearInterval(timer);


timer=null;


addEvent(
"center",
"🏁 ABPFIFF"

);



finishGame();


}



}





// =======================================
// START
// =======================================


function startSimulation(){


if(timer)

return;



resetScores();



addEvent(
"center",
"▶ ANPFIFF"

);



timer=setInterval(

simulateMinute,

900

);



}





function resetScores(){


homeScore=0;

awayScore=0;

minute=0;



document.getElementById("homeGoals")
.innerHTML="0";


document.getElementById("awayGoals")
.innerHTML="0";


document.getElementById("minute")
.innerHTML="00";


}







function pauseSimulation(){


paused=!paused;



addEvent(
"center",
paused ?
"⏸ PAUSE":
"▶ WEITER"

);


}






function resetSimulation(){


clearInterval(timer);


timer=null;


resetScores();


document.getElementById("ticker").innerHTML="";


addEvent(
"center",
"Spiel bereit"

);


}


// =======================================
// MATCHCENTER AKTUALISIEREN
// =======================================


function updateMatch(){


let home=getHomeTeam();

let away=getAwayTeam();



// Namen anzeigen


document.getElementById("homeName")
.innerHTML=
homeSelect.value;



document.getElementById("awayName")
.innerHTML=
awaySelect.value;





// Logos aus Mannschaftskarten


document.getElementById("homeLogo")
.src=
home.logo;



document.getElementById("awayLogo")
.src=
away.logo;






// eigene Logo Eingabe aus Einstellungen


let hLogo=

document.getElementById("homeLogoInput")
.value;



let aLogo=

document.getElementById("awayLogoInput")
.value;



if(hLogo!==""){


home.logo=hLogo;


document.getElementById("homeLogo")
.src=hLogo;


}



if(aLogo!==""){


away.logo=aLogo;


document.getElementById("awayLogo")
.src=aLogo;


}



}





// =======================================
// SPIELENDE
// =======================================


function finishGame(){



let home=getHomeTeam();

let away=getAwayTeam();



addEvent(
"center",

"🏁 ENDSTAND "+

homeSelect.value+

" "+

homeScore+

" : "+

awayScore+

" "+

awaySelect.value

);



}





// =======================================
// DROPDOWN AKTUALISIERUNG
// =======================================


homeSelect.onchange=function(){

};



awaySelect.onchange=function(){

};





// =======================================
// STARTANSICHT
// =======================================


window.onload=function(){


updateMatch();


};
