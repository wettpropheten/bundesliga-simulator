<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Simulator Layout</title>
    <style>
        body {
            background-color: #8b1111; /* Roter Hintergrund aus dem Screenshot */
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 30px;
        }

        /* Das Haupt-Raster, das die Seite in zwei Hälften teilt */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Linke Spalte */
        .left-column {
            display: flex;
            flex-direction: column;
            gap: 150px; /* Großer Abstand nach unten zum Start-Button */
        }

        /* Rechte Spalte */
        .right-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        /* Eingabemaske (Oben Links) */
        .input-box {
            background-color: #1a0a0a;
            border: 2px solid #2d1515;
            border-radius: 8px;
            padding: 20px;
            width: 380px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .input-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            align-items: flex-end;
            gap: 10px;
        }
        .field-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        .field-group label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 130px;
            padding: 8px;
            background: #2b1b1b;
            color: white;
            border: 1px solid #443333;
            border-radius: 4px;
            font-weight: bold;
        }
        input[type="text"]:disabled {
            background: #1f1515;
            color: #665555;
        }
        input[type="number"] {
            width: 60px;
            padding: 8px;
            background: #2b1b1b;
            color: white;
            border: 1px solid #443333;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
        }
        input[type="color"] {
            width: 40px;
            height: 34px;
            border: 1px solid #443333;
            border-radius: 4px;
            cursor: pointer;
            background: transparent;
            padding: 0;
        }
        .btn-update {
            background-color: transparent;
            border: 1px solid #ff3333;
            color: #ff3333;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-update:hover {
            background-color: rgba(255,51,51,0.1);
        }

        /* Start-Button (Unten Links) */
        .btn-start {
            background-color: #1e7e4e;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            width: 150px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-transform: uppercase;
            align-self: flex-end; /* Schiebt ihn nach rechts rüber zum Rad */
            margin-right: -40px;
        }
        .btn-start:hover {
            background-color: #155a37;
        }
        .btn-start:disabled {
            background-color: #444;
            cursor: not-allowed;
        }

        /* Anzeigetafel (Oben Rechts) */
        .scoreboard {
            width: 100%;
            max-width: 500px;
            background-color: #222;
            border: 3px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .team-row {
            display: flex;
            height: 120px;
        }
        .team-box {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            font-weight: 900;
            background-color: #64b931; /* Grünes BVB-Feld aus deinem Screenshot */
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .score-box {
            width: 140px;
            background-color: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            font-weight: bold;
            border-left: 2px solid #1a1a1a;
            border-right: 2px solid #1a1a1a;
        }
        .pct-row {
            display: flex;
            background-color: #151515;
            padding: 10px 0;
            border-top: 2px solid #2a2a2a;
        }
        .pct-box {
            flex: 1;
            text-align: center;
        }
        .pct-box span {
            display: block;
            font-size: 10px;
            color: #777;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .pct-box div {
            font-size: 16px;
            font-weight: bold;
        }

        /* Glücksrad (Unten Rechts) */
        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            border: 6px solid #b8860b;
            border-radius: 50%;
            background: #111;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }
        .wheel-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 25px solid #ffcc00; /* Gelber Pfeil oben */
            z-index: 10;
        }
        #wheel-canvas {
            border-radius: 50%;
        }
        
        #error-msg {
            color: #ff3333;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="main-grid">
        
        <!-- LINKE SEITE -->
        <div class="left-column">
            <!-- Eingabemaske -->
            <div class="input-box">
                <div id="error-msg">Die Chancen müssen zusammen 100% ergeben!</div>
                
                <div class="input-row">
                    <div class="field-group"><label>Heim-Name</label><input type="text" id="inp-name1" value="FCB"></div>
                    <div class="field-group"><label>Chance</label><input type="number" id="inp-pct1" value="68"></div>
                    <div class="field-group"><label>Farbe</label><input type="color" id="inp-col1" value="#64b931"></div>
                </div>
                
                <div class="input-row">
                    <div class="field-group"><label>Remis</label><input type="text" value="Unentschieden" disabled></div>
                    <div class="field-group"><label>Chance</label><input type="number" id="inp-pct2" value="20"></div>
                    <div class="field-group"><label>Farbe</label><input type="color" id="inp-col2" value="#444444"></div>
                </div>
                
                <div class="input-row">
                    <div class="field-group"><label>Gast-Name</label><input type="text" id="inp-name3" value="SGE"></div>
                    <div class="field-group"><label>Chance</label><input type="number" id="inp-pct3" value="12"></div>
                    <div class="field-group"><label>Farbe</label><input type="color" id="inp-col3" value="#64b931"></div>
                </div>

                <button class="btn-update" onclick="applySettings()">Aktualisieren</button>
            </div>

            <!-- Start Button -->
            <button class="btn-start" id="start-btn" onclick="startSpin()">Start</button>
        </div>

        <!-- RECHTE SEITE -->
        <div class="right-column">
            <!-- Anzeigetafel -->
            <div class="scoreboard">
                <div class="team-row">
                    <div class="team-box" id="view-name1">BVB</div>
                    <div class="score-box" id="view-score">?:?</div>
                    <div class="team-box" id="view-name3">BVB</div>
                </div>
                <div class="pct-row">
                    <div class="pct-box"><span>Heim</span><div id="view-pct1">68%</div></div>
                    <div class="pct-row" style="width:2px; background:#333;"></div>
                    <div class="pct-box"><span>Remis</span><div id="view-pct2">20%</div></div>
                    <div class="pct-row" style="width:2px; background:#333;"></div>
                    <div class="pct-box"><span>Gast</span><div id="view-pct3">12%</div></div>
                </div>
            </div>

            <!-- Glücksrad -->
            <div class="wheel-container">
                <div class="wheel-pointer"></div>
                <canvas id="wheel-canvas" width="308" height="308"></canvas>
            </div>
        </div>

    </div>

<script>
    const canvas = document.getElementById('wheel-canvas');
    const ctx = canvas.getContext('2d');
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const radius = canvas.width / 2;

    let currentAngle = 0;
    let isSpinning = false;
    let wheelSectors = [];

    // Direkt beim Start einmal aufbauen
    applySettings();

    // Verarbeitet die Eingaben erst beim Klick auf "Aktualisieren"
