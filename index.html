.warning{

.clock{

.pitch{

border-radius:25px;

background:

linear-gradient(
90deg,
#16803c,
#1fa04b
);

position:relative;

overflow:hidden;

box-shadow:
inset 0 0 50px black;

}



.pitch:before{

content:"";

position:absolute;

left:50%;

top:0;

height:100%;

border-left:3px solid white;

}



.ball{

position:absolute;

font-size:45px;

top:150px;

left:20%;

}



.ticker{

margin-top:20px;

background:black;

border-radius:20px;

padding:20px;

height:250px;

overflow:auto;

text-align:left;

}



.small{

font-size:13px;

opacity:.8;

}

<!-- =========================
     SIMULATIONS ENGINE
========================= -->


<script>


let gameMinute = 0;

let homeGoals = 0;

let awayGoals = 0;

let simulationTimer = null;

let paused = false;



// Zufallshelfer


function random(min,max){

return Math.random()*(max-min)+min;

}




// Form berechnen


function formValue(form){


if(!form)
return 0;



let value=0;



for(let x of form){


if(x==="S")
value += 1;


if(x==="U")
value += 0.5;


if(x==="N")
value -= 0.5;


}



return value;



}







// Spielwahrscheinlichkeit


function calculateStrength(){


let homeXG =
parseFloat(
document.getElementById("homeXG").value
);



let awayXG =
parseFloat(
document.getElementById("awayXG").value
);



let homeWin =
parseFloat(
document.getElementById("homeWin").value
);



let awayWin =
parseFloat(
document.getElementById("awayWin").value
);




let homeForm =
formValue(
document.getElementById("homeForm").value
);



let awayForm =
formValue(
document.getElementById("awayForm").value
);



return {

home:
homeXG*2+
homeWin/10+
homeForm,


away:
awayXG*2+
awayWin/10+
awayForm


};


}







// Spielausgang


function decideWinner(){


let h =
parseFloat(
document.getElementById("homeWin").value
);


let d =
100-
h-
parseFloat(
document.getElementById("awayWin").value
);



let a =
parseFloat(
document.getElementById("awayWin").value
);



let r=Math.random()*100;



if(r<h)
return "home";


if(r<h+d)
return "draw";


return "away";


}







// Torwahrscheinlichkeit


function checkGoal(){



let power =
calculateStrength();



let chanceHome =
power.home/800;



let chanceAway =
power.away/800;



let r=Math.random();



if(r<chanceHome)
scoreGoal("home");



if(r>0.70 &&
r<0.70+chanceAway)

scoreGoal("away");



}







function scoreGoal(team){


if(team==="home"){


homeGoals++;


addTicker(
"⚽ TOR "+
homeSelect.value+
" "+homeGoals+":"+awayGoals
);



}



else{


awayGoals++;


addTicker(
"⚽ TOR "+
awaySelect.value+
" "+homeGoals+":"+awayGoals
);



}



document.getElementById("score")
.innerHTML =
homeGoals+
" : "+
awayGoals;



}








function createEvent(){


let events=[


"Ballbesitzphase",

"Angriff über außen",

"Schuss aufs Tor",

"Ecke",

"Freistoß",

"Großchance",

"Torwartparade",

"VAR Prüfung"


];



return events[
Math.floor(
Math.random()*events.length
)
];


}








function startSimulation(){


if(simulationTimer)
return;



updateMatch();


addTicker(
"⚽ ANPFIFF"
);



simulationTimer =
setInterval(()=>{



if(paused)
return;



gameMinute++;



document.getElementById("clock")
.innerHTML =
gameMinute+
":00";





// normale Ereignisse


if(Math.random()<0.35){


addTicker(
gameMinute+
"' "+
createEvent()
);


}




checkGoal();






if(gameMinute===45){


addTicker(
"⏱ HALBZEIT"
);


}






if(gameMinute>=90){


clearInterval(simulationTimer);


simulationTimer=null;


addTicker(
"🏁 ABPFIFF"
);


showFinalResult();



}



},1000);



}









function pauseSimulation(){


paused=!paused;


if(paused)

addTicker(
"⏸ Simulation pausiert"
);


else

addTicker(
"▶ Simulation läuft weiter"
);



}









function resetSimulation(){



clearInterval(simulationTimer);


simulationTimer=null;



gameMinute=0;

homeGoals=0;

awayGoals=0;

paused=false;



document.getElementById("clock")
.innerHTML="00:00";



document.getElementById("score")
.innerHTML="0 : 0";



document.getElementById("ticker")
.innerHTML=
"LIVETICKER<br><br>Spiel bereit...";



}





</script>

<script>



function showFinalResult(){



let home =
homeSelect.value;


let away =
awaySelect.value;



let homeXG =
parseFloat(
document.getElementById("homeXG").value
);



let awayXG =
parseFloat(
document.getElementById("awayXG").value
);



let homeShots =
Math.floor(
homeXG*5+
Math.random()*8
);



let awayShots =
Math.floor(
awayXG*5+
Math.random()*8
);




let quality;



let total =
homeGoals+
awayGoals;



if(total>=4)

quality="★★★★★";


else if(total>=2)

quality="★★★★☆";


else

quality="★★★☆☆";







addTicker(
"<br>===================="
);



addTicker(
"🏆 ENDRESULTAT"
);



addTicker(
home+
" "+

homeGoals+

" : "+

awayGoals+

" "+

away
);



addTicker(
"xG: "+
homeXG+
" : "+
awayXG
);



addTicker(
"Schüsse: "+
homeShots+
" : "+
awayShots
);



addTicker(
"Spielqualität: "+
quality
);



}






</script>
